<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Gerar código | Inovando Juntos</title>

  <style>
    :root{
      --bg:#000;
      --card:#0b0b0b;
      --edge:rgba(255,255,255,.10);
      --edge2:rgba(255,255,255,.18);
      --text:rgba(255,255,255,.88);
      --muted:rgba(255,255,255,.56);
      --soft:rgba(255,255,255,.36);
      --accent:rgba(255,255,255,.90);
      --danger:#ff6b6b;
      --ok:#7ee787;
      --shadow:rgba(0,0,0,.78);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html,body{
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      width:100%;
      min-height:100dvh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:32px 16px calc(40px + env(safe-area-inset-bottom,0px));
      background:
        radial-gradient(70% 40% at 50% 0%, rgba(255,255,255,.10), rgba(255,255,255,.025) 48%, rgba(0,0,0,0) 78%),
        #000;
    }

    .wrap{ width:min(560px,100%); }

    .card{
      width:100%;
      border:1px solid var(--edge);
      border-radius:26px;
      padding:26px 22px 22px;
      background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)), var(--card);
      box-shadow:0 28px 80px var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .head{ text-align:center; margin-bottom:22px; }
    .head .logo{ width:62px; height:62px; object-fit:contain; opacity:.95; }
    .kicker{
      color:#fff; font-size:12px; letter-spacing:3px; font-weight:800;
      text-transform:uppercase; margin-top:12px;
    }
    .sub{ color:var(--soft); font-size:11.5px; letter-spacing:1.5px; margin-top:6px; text-transform:uppercase; }
    h1{ font-size:21px; font-weight:850; margin:16px 0 4px; text-align:center; letter-spacing:-.01em; }
    .who{ color:var(--muted); font-size:12.5px; text-align:center; margin:0; }

    .form{ display:flex; flex-direction:column; gap:14px; margin-top:22px; }
    .field{ display:flex; flex-direction:column; gap:7px; }
    .label{
      padding-left:2px; color:var(--soft); font-size:12px; font-weight:800;
      letter-spacing:.04em; text-transform:uppercase;
    }
    input, select{
      width:100%; min-height:52px; border:1px solid var(--edge); border-radius:16px;
      outline:none; background:rgba(255,255,255,.06); color:var(--text);
      padding:0 15px; font-size:16px; font-weight:600;
      transition:border-color .14s ease, background .14s ease, box-shadow .14s ease;
      appearance:none;
    }
    select{ cursor:pointer; }
    select option{ background:#111; color:#fff; }
    input::placeholder{ color:rgba(255,255,255,.32); font-weight:500; }
    input:focus, select:focus{
      border-color:rgba(255,255,255,.30); background:rgba(255,255,255,.085);
      box-shadow:0 0 0 4px rgba(255,255,255,.055);
    }

    .primaryBtn{
      width:100%; min-height:54px; margin-top:6px; border:0; border-radius:999px;
      background:var(--accent); color:#000; cursor:pointer; font-size:15px; font-weight:900;
      letter-spacing:-.01em; box-shadow:0 16px 34px rgba(0,0,0,.42);
      transition:transform .10s ease, opacity .12s ease;
    }
    .primaryBtn:active{ transform:scale(.99); }
    .primaryBtn:disabled{ opacity:.45; cursor:not-allowed; transform:none; }

    .backBtn{
      display:inline-flex; align-items:center; gap:8px; margin:10px auto 2px;
      border:1px solid var(--edge2); border-radius:999px; background:rgba(255,255,255,.06);
      color:var(--text); cursor:pointer; font-size:13.5px; font-weight:800;
      padding:11px 20px; letter-spacing:-.01em;
      transition:background .14s ease, border-color .14s ease, transform .10s ease;
    }
    .backBtn:hover{ background:rgba(255,255,255,.10); border-color:rgba(255,255,255,.30); }
    .backBtn:active{ transform:scale(.98); }

    .status{
      display:none; margin-top:16px; border:1px solid var(--edge); border-radius:14px;
      padding:12px 13px; background:rgba(255,255,255,.055); color:var(--muted);
      font-size:13px; line-height:1.4;
    }
    .status.show{ display:block; }
    .status.error{ border-color:rgba(255,107,107,.28); color:var(--danger); background:rgba(255,107,107,.08); }
    .status.ok{ border-color:rgba(126,231,135,.26); color:var(--ok); background:rgba(126,231,135,.07); }

    /* Resultado del código */
    .result{ display:none; margin-top:22px; text-align:center; }
    .result.show{ display:block; }
    .result .codeBox{
      display:inline-block; background:#fff; color:#000; padding:20px 30px; border-radius:16px;
      font-size:28px; font-weight:900; letter-spacing:4px; margin:6px 0 12px;
    }
    .result .copyBtn{
      border:1px solid var(--edge2); background:transparent; color:var(--text);
      border-radius:999px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer;
    }
    .result .sent{ color:var(--muted); font-size:13px; margin-top:12px; }
    .result .newBtn{
      margin-top:16px; border:0; background:transparent; color:var(--muted);
      text-decoration:underline; text-underline-offset:4px; font-size:13px; font-weight:700; cursor:pointer;
    }

    /* Acceso restringido / loader */
    .gate{ text-align:center; padding:30px 8px; color:var(--muted); }
    .gate h2{ color:var(--text); font-size:18px; margin:0 0 8px; }
    .hidden{ display:none !important; }

    /* Lista de últimos códigos */
    .recent{ margin-top:24px; }
    .recent h3{
      font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--soft);
      font-weight:800; margin:0 0 12px; padding-left:2px;
    }
    .recent .row{
      border:1px solid var(--edge); border-radius:14px; padding:11px 13px; margin-bottom:8px;
      background:rgba(255,255,255,.03);
    }
    .recent .row .top{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .recent .row .rcode{ font-weight:800; letter-spacing:1px; font-size:14px; }
    .recent .row .uses{ font-size:11.5px; color:var(--soft); white-space:nowrap; }
    .recent .row .meta{ color:var(--muted); font-size:12px; margin-top:4px; line-height:1.4; }
    .recent .empty{ color:var(--soft); font-size:13px; padding:6px 2px; }

    @media (max-width:420px){
      .card{ border-radius:22px; padding:22px 17px 18px; }
      .result .codeBox{ font-size:24px; letter-spacing:3px; padding:18px 22px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="wrap">
      <section class="card">
        <div class="head">
          <img class="logo" src="images/logo.png" alt="Inovando Juntos" onerror="this.style.display='none'" />
          <div class="kicker">Inovando Juntos</div>
          <div class="sub">Painel · Emissão de códigos</div>
        </div>

        <!-- Loader inicial -->
        <div id="loader" class="gate">Carregando…</div>

        <!-- Acceso restringido -->
        <div id="denied" class="gate hidden">
          <h2>Acesso restrito</h2>
          <p>Sua conta não tem permissão para emitir códigos de ativação.</p>
        </div>

        <!-- Contenido autorizado -->
        <div id="content" class="hidden">
          <h1>Gerar código de ativação</h1>
          <p class="who" id="whoami"></p>
          <div style="text-align:center">
            <button type="button" class="backBtn" id="backBtn">
              <span aria-hidden="true">←</span> Voltar ao app
            </button>
          </div>

          <form class="form" id="genForm" novalidate>
            <div class="field">
              <label class="label" for="distributor">Distribuidor</label>
              <select id="distributor" name="distributor" required></select>
            </div>

            <div class="field">
              <label class="label" for="buyerName">Nome do comprador</label>
              <input id="buyerName" name="buyerName" type="text" placeholder="Nome completo" autocomplete="off" required />
            </div>

            <div class="field">
              <label class="label" for="buyerEmail">E-mail do comprador</label>
              <input id="buyerEmail" name="buyerEmail" type="email" placeholder="comprador@email.com" autocomplete="off" required />
            </div>

            <div class="field">
              <label class="label" for="invoiceRef">Referência da venda</label>
              <input id="invoiceRef" name="invoiceRef" type="text" placeholder="Nota fiscal / nº do pedido" autocomplete="off" />
            </div>

            <button class="primaryBtn" id="submitBtn" type="submit">Gerar código</button>
          </form>

          <div class="status" id="statusBox" role="status" aria-live="polite"></div>

          <!-- Resultado -->
          <div class="result" id="resultBox">
            <div class="label" style="text-align:center">Código gerado</div>
            <div class="codeBox" id="codeValue">—</div>
            <div>
              <button class="copyBtn" id="copyBtn" type="button">Copiar código</button>
            </div>
            <div class="sent" id="sentMsg"></div>
            <button class="newBtn" id="newBtn" type="button">Gerar outro código</button>
          </div>

          <!-- Últimos emitidos -->
          <div class="recent" id="recent">
            <h3>Últimos códigos emitidos</h3>
            <div id="recentList"><div class="empty">Carregando…</div></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://rsordtljnvxonaygyuxd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const $ = (id) => document.getElementById(id);
    const loader = $("loader"), denied = $("denied"), content = $("content");
    const statusBox = $("statusBox"), resultBox = $("resultBox");

    const ERROR_MSG = {
      not_authenticated: "Sessão expirada. Faça login novamente.",
      not_authorized: "Sua conta não tem permissão para emitir códigos.",
      invalid_email: "E-mail do comprador inválido.",
      invalid_buyer_name: "Informe o nome do comprador.",
      invalid_distributor: "Distribuidor inválido ou inativo.",
      code_generation_failed: "Não foi possível gerar um código único. Tente novamente.",
      resend_not_configured: "Envio de e-mail não configurado (RESEND_API_KEY ausente).",
      resend_failed: "Falha ao enviar o e-mail. O código foi gerado mesmo assim.",
    };
    const msgFor = (e) => ERROR_MSG[e] || ("Erro: " + e);

    function setStatus(text, kind) {
      statusBox.textContent = text;
      statusBox.className = "status show" + (kind ? " " + kind : "");
    }
    function clearStatus(){ statusBox.className = "status"; statusBox.textContent = ""; }

    function fmtDate(s){
      try { return new Date(s).toLocaleString("pt-BR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" }); }
      catch { return s; }
    }

    // ---- Auth gate ----
    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        const redirect = encodeURIComponent(location.pathname + location.search);
        location.replace("/login.html?redirect=" + redirect);
        return;
      }

      let canIssue = false;
      try {
        const { data, error } = await supabase.rpc("current_user_can_issue_codes");
        if (!error) canIssue = data === true;
      } catch (_) {}

      loader.classList.add("hidden");
      if (!canIssue) { denied.classList.remove("hidden"); return; }

      content.classList.remove("hidden");
      $("whoami").textContent = session.user?.email ? ("Conectado como " + session.user.email) : "";

      await loadDistributors();
      await loadRecent();
    }

    async function loadDistributors() {
      const sel = $("distributor");
      sel.innerHTML = "";
      const { data, error } = await supabase.rpc("list_active_distributors");
      if (error || !data || !data.length) {
        const opt = document.createElement("option");
        opt.textContent = "Nenhum distribuidor ativo";
        opt.value = ""; sel.appendChild(opt); sel.disabled = true;
        return;
      }
      for (const d of data) {
        const opt = document.createElement("option");
        opt.value = d.id; opt.textContent = d.name;
        sel.appendChild(opt);
      }
    }

    async function loadRecent() {
      const list = $("recentList");
      const { data, error } = await supabase.rpc("list_recent_codes", { p_limit: 15 });
      if (error) { list.innerHTML = '<div class="empty">Não foi possível carregar.</div>'; return; }
      if (!data || !data.length) { list.innerHTML = '<div class="empty">Nenhum código emitido ainda.</div>'; return; }
      list.innerHTML = "";
      for (const r of data) {
        const row = document.createElement("div");
        row.className = "row";
        const buyer = r.buyer_name ? r.buyer_name : "—";
        const email = r.buyer_email ? r.buyer_email : "";
        const inv = r.invoice_ref ? (" · " + r.invoice_ref) : "";
        row.innerHTML =
          '<div class="top"><span class="rcode"></span><span class="uses"></span></div>' +
          '<div class="meta"></div>';
        row.querySelector(".rcode").textContent = r.code;
        row.querySelector(".uses").textContent = (r.used_count ?? 0) + "/" + (r.max_uses ?? 2) + " usos";
        row.querySelector(".meta").textContent = buyer + (email ? " · " + email : "") + inv + " · " + fmtDate(r.created_at);
        list.appendChild(row);
      }
    }

    // ---- Submit ----
    $("genForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearStatus();
      resultBox.classList.remove("show");

      const distributor_id = $("distributor").value;
      const buyerName = $("buyerName").value.trim();
      const buyerEmail = $("buyerEmail").value.trim();
      const invoiceRef = $("invoiceRef").value.trim();

      if (!distributor_id) { setStatus("Selecione um distribuidor.", "error"); return; }
      if (!buyerName) { setStatus("Informe o nome do comprador.", "error"); return; }
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(buyerEmail)) { setStatus("E-mail do comprador inválido.", "error"); return; }

      const btn = $("submitBtn");
      btn.disabled = true; btn.textContent = "Gerando…";
      setStatus("Gerando código…");

      try {
        const { data, error } = await supabase.rpc("admin_create_activation_code", {
          p_distributor_id: distributor_id,
          p_buyer_name: buyerName,
          p_buyer_email: buyerEmail,
          p_invoice_ref: invoiceRef,
          p_order_ref: null
        });
        if (error) { setStatus(msgFor((error.message || "").replace(/^.*?:\s*/, "").trim() || error.message), "error"); return; }
        if (!data || !data.ok) { setStatus("Não foi possível gerar o código.", "error"); return; }

        const code = data.code;
        $("codeValue").textContent = code;

        // Enviar email vía edge function
        setStatus("Código gerado. Enviando e-mail…");
        let emailOk = false, emailErr = "";
        try {
          const { data: ed, error: ee } = await supabase.functions.invoke("send-activation-code", {
            body: { to: buyerEmail, name: buyerName, code }
          });
          if (ee) { emailErr = ee.message || "send_failed"; }
          else if (ed && ed.ok) { emailOk = true; }
          else { emailErr = (ed && ed.error) ? ed.error : "send_failed"; }
        } catch (ex) { emailErr = String(ex); }

        resultBox.classList.add("show");
        if (emailOk) {
          $("sentMsg").textContent = "E-mail enviado para " + buyerEmail;
          setStatus("Código gerado e e-mail enviado com sucesso.", "ok");
        } else {
          $("sentMsg").textContent = "⚠ O código foi gerado, mas o e-mail não foi enviado (" + msgFor(emailErr) + "). Envie o código manualmente.";
          setStatus("Código gerado. Falha no envio do e-mail.", "error");
        }

        $("genForm").reset();
        await loadDistributors();
        await loadRecent();
      } catch (ex) {
        setStatus("Erro inesperado: " + String(ex), "error");
      } finally {
        btn.disabled = false; btn.textContent = "Gerar código";
      }
    });

    $("copyBtn").addEventListener("click", async () => {
      const code = $("codeValue").textContent;
      try { await navigator.clipboard.writeText(code); $("copyBtn").textContent = "Copiado!"; setTimeout(() => $("copyBtn").textContent = "Copiar código", 1500); }
      catch { /* ignore */ }
    });

    $("newBtn").addEventListener("click", () => {
      resultBox.classList.remove("show");
      clearStatus();
      $("buyerName").focus();
    });

    // Voltar: regresa a la pestaña/página anterior (mismo tab, sin abrir nuevas)
    $("backBtn").addEventListener("click", () => {
      const sameOriginRef = document.referrer && document.referrer.startsWith(location.origin);
      if (sameOriginRef && history.length > 1) {
        history.back();
      } else {
        // No hay historial propio: navega en el MISMO tab al app
        location.replace("/play.html");
      }
    });

    init();
  </script>
</body>
</html>
