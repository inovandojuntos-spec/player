<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Contrato | Inovando Juntos</title>

  <style>
    :root{
      --bg:#000000;
      --panel:#0b0b0b;
      --panel2:#101010;
      --edge:rgba(255,255,255,0.08);
      --edge2:rgba(255,255,255,0.14);
      --text:rgba(255,255,255,0.82);
      --muted:rgba(255,255,255,0.62);
      --soft:rgba(255,255,255,0.42);
      --danger:#ff5c5c;
      --ok:#83f0a1;
      --shadow:rgba(0,0,0,0.78);
    }

    html,body{
      height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    .app{
      height:100dvh;
      width:100vw;
      display:flex;
      align-items:stretch;
      justify-content:center;
      background:#000;
    }

    .shell{
      width:min(560px,100%);
      min-height:100dvh;
      height:100dvh;
      background:#000;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      position:relative;
      isolation:isolate;
    }

    .topbar{
      flex:0 0 auto;
      padding:10px 14px 4px;
      background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0));
      z-index:2;
    }

    .logo-center{ display:flex; align-items:center; justify-content:center; }
    .logo-center img{ width:75px; height:75px; object-fit:contain; opacity:.92; }

    .content{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:8px 18px calc(104px + env(safe-area-inset-bottom,0px));
      background:
        radial-gradient(120% 55% at 50% 0%, rgba(255,255,255,0.07), rgba(255,255,255,0.01) 52%, rgba(255,255,255,0) 76%),
        linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.55) 28%, rgba(0,0,0,0.95) 100%);
    }

    .hero{
      border-radius:24px;
      padding:20px 18px 18px;
      border:1px solid var(--edge);
      background:
        radial-gradient(90% 80% at 50% 0%, rgba(255,255,255,0.08), transparent 58%),
        rgba(255,255,255,0.025);
      box-shadow:0 24px 60px rgba(0,0,0,0.50), inset 0 0 0 1px rgba(255,255,255,0.025);
    }

    .kicker{
      margin:0 0 8px;
      color:var(--soft);
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      color:rgba(255,255,255,.88);
      font-size:30px;
      line-height:1.06;
      letter-spacing:-.035em;
      font-weight:950;
    }

    .subtitle{
      margin:12px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.48;
    }

    .progressRow{
      margin-top:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .stepInfo{
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
    }

    .bar{
      flex:1;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.13);
      overflow:hidden;
    }
    .barFill{ width:0%; height:100%; background:rgba(255,255,255,.84); transition:width .22s ease; }

    .questionCard{
      margin-top:16px;
      border-radius:22px;
      border:1px solid var(--edge);
      background:rgba(11,11,11,.86);
      padding:18px;
      box-shadow:0 20px 48px rgba(0,0,0,.45);
    }

    .questionTitle{
      margin:0;
      font-size:23px;
      line-height:1.12;
      letter-spacing:-.025em;
      font-weight:920;
      color:rgba(255,255,255,.88);
    }

    .questionDesc{
      margin:10px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.48;
    }

    .fieldArea{ margin-top:18px; display:flex; flex-direction:column; gap:10px; }

    .option{
      width:100%;
      display:flex;
      gap:12px;
      align-items:flex-start;
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      background:rgba(255,255,255,.035);
      padding:13px 13px;
      cursor:pointer;
      transition:background .12s ease, border-color .12s ease, transform .10s ease;
    }
    .option:hover{ background:rgba(255,255,255,.055); border-color:rgba(255,255,255,.16); transform:translateY(-1px); }
    .option input{ margin-top:2px; accent-color:white; }
    .optionText{ flex:1; min-width:0; font-size:15px; line-height:1.32; color:rgba(255,255,255,.80); font-weight:650; }

    textarea,
    input[type="text"]{
      width:100%;
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      outline:none;
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.90);
      padding:14px;
      font-size:16px;
      line-height:1.4;
      font-family:inherit;
    }
    textarea{ min-height:150px; resize:vertical; }
    textarea:focus,input[type="text"]:focus{ border-color:rgba(255,255,255,.24); background:rgba(255,255,255,.08); }


    .signatureWrap{
      margin-top:14px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.96);
      overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
    }

    .signatureCanvas{
      width:100%;
      height:230px;
      display:block;
      touch-action:none;
      background:#fff;
    }

    .signatureTools{
      margin-top:12px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .miniBtn{
      min-height:38px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.82);
      padding:0 14px;
      font-size:13px;
      font-weight:850;
      cursor:pointer;
    }

    .signaturePreview{
      margin-top:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.035);
      padding:10px;
    }

    .signaturePreview img{
      width:100%;
      max-height:120px;
      object-fit:contain;
      display:block;
      background:#fff;
      border-radius:10px;
    }

    .pdfBox{
      margin-top:14px;
      border-radius:16px;
      border:1px solid rgba(131,240,161,.22);
      background:rgba(131,240,161,.08);
      padding:12px;
      color:rgba(230,255,236,.92);
      font-size:13px;
      line-height:1.35;
    }

    .pdfBox a{
      color:#fff;
      font-weight:900;
      text-decoration:underline;
    }

    .reviewBox{
      margin-top:14px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.035);
      padding:14px;
      white-space:pre-wrap;
      color:rgba(255,255,255,.76);
      font-size:13px;
      line-height:1.45;
      max-height:42dvh;
      overflow:auto;
    }

    .errorBox{
      margin-top:12px;
      display:none;
      border-radius:14px;
      padding:11px 12px;
      border:1px solid rgba(255,92,92,.24);
      background:rgba(255,92,92,.10);
      color:#ffd3d3;
      font-size:13px;
      line-height:1.35;
    }
    .errorBox.show{ display:block; }

    .saveState{
      margin-top:12px;
      min-height:18px;
      color:var(--soft);
      font-size:12px;
      font-weight:700;
    }
    .saveState.ok{ color:rgba(131,240,161,.85); }
    .saveState.err{ color:rgba(255,92,92,.9); }

    .footer{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:5;
      min-height:82px;
      padding:10px 14px calc(12px + env(safe-area-inset-bottom,0px));
      background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.84) 28%,rgba(0,0,0,.99));
      border-top:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      display:grid;
      grid-template-columns:1fr 1.45fr;
      gap:10px;
      align-items:center;
    }

    button{
      font-family:inherit;
    }

    .btn{
      min-height:50px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:rgba(255,255,255,.80);
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      transition:transform .10s ease, opacity .12s ease, background .12s ease;
    }
    .btn:active{ transform:scale(.99); }
    .btn:disabled{ opacity:.42; cursor:not-allowed; }
    .btn.primary{ background:rgba(255,255,255,.88); color:#000; border-color:transparent; }
    .btn.ghost{ background:transparent; }

    .toast{
      position:absolute;
      left:14px;
      right:14px;
      bottom:calc(94px + env(safe-area-inset-bottom,0px));
      padding:11px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(20,20,20,.94);
      color:var(--text);
      font-size:12px;
      display:none;
      box-shadow:0 16px 38px rgba(0,0,0,.55);
      z-index:20;
    }
    .toast.show{ display:block; }

    @media (max-width:390px){
      .logo-center img{ width:64px; height:64px; }
      .content{ padding-left:15px; padding-right:15px; }
      h1{ font-size:27px; }
      .questionTitle{ font-size:21px; }
      .footer{ grid-template-columns:1fr 1.25fr; }
    }
  
.closeBtn{
  position:absolute;
  top:calc(12px + env(safe-area-inset-top,0px));
  right:12px;
  width:12px;
  height:12px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.65);
  color:#fff;
  font-size:24px;
  font-weight:700;
  cursor:pointer;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.closeBtn:hover{
  background:rgba(255,255,255,.12);
}

</style>
</head>
<body>
  <div class="app">
    <main class="shell" aria-live="polite">
      <button id="closeBtn" class="closeBtn" type="button" aria-label="Fechar contrato">✕</button>
      <header class="topbar">
        <div class="logo-center">
          <img src="images/logo.png" alt="Inovando Juntos" />
        </div>
      </header>

      <section class="content">
        <div class="hero">
          <p class="kicker">DESAFIO 19</p>
          <h1 id="appTitle">EXPLORANDO LIMITES</h1>
          <p class="subtitle" id="appSubtitle">Conversem abertamente sobre seus desejos, preferências e limites. Aproveitem este momento para alinhar expectativas e deixar claro o que gostariam de explorar juntos. Todas as escolhas podem ser revisadas antes da assinatura do contrato.</p>
          <div class="progressRow">
            <div class="bar" aria-hidden="true"><div class="barFill" id="barFill"></div></div>
            <div class="stepInfo" id="stepInfo">0/0</div>
          </div>
        </div>

        <article class="questionCard" id="questionBox">
          <p class="questionDesc">Carregando perguntas...</p>
        </article>

        <div class="errorBox" id="errorBox"></div>
        <div class="saveState" id="saveState"></div>
      </section>

      <footer class="footer">
        <button class="btn ghost" id="backBtn" type="button">Voltar</button>
        <button class="btn primary" id="nextBtn" type="button">Continuar</button>
      </footer>

      <div class="toast" id="toast"></div>
    </main>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    import SignaturePad from "https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/+esm";
    import { PDFDocument, StandardFonts, rgb } from "https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/+esm";

    (() => {
      const SUPABASE_URL = "https://rsordtljnvxonaygyuxd.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const questionBox = document.getElementById("questionBox");
      const stepInfo = document.getElementById("stepInfo");
      const barFill = document.getElementById("barFill");
      const backBtn = document.getElementById("backBtn");
      const nextBtn = document.getElementById("nextBtn");
      const errorBox = document.getElementById("errorBox");
      const saveState = document.getElementById("saveState");
      const toast = document.getElementById("toast");
      const closeBtn = document.getElementById("closeBtn");

      let authUserId = null;
      let desafioSlug = "";
      let questions = [];
      let answers = {};
      let currentIndex = 0;
      let isSignatureStep = false;
      let isReviewStep = false;
      let signaturePad = null;
      let signatureDataUrl = "";
      let pdfUrl = "";
      let saveTimer = null;
      let saving = false;


      function renderCompletedContract() {

        stepInfo.textContent = "✓";
        barFill.style.width = "100%";

        questionBox.innerHTML = `
          <h2 class="questionTitle">Contrato já assinado</h2>

          <p class="questionDesc">
            Este contrato já foi concluído e assinado eletronicamente.
          </p>

          <div class="pdfBox">
            <a href="${escapeHtml(pdfUrl)}"
              target="_blank"
              rel="noopener noreferrer">
              Baixar contrato em PDF
            </a>
          </div>
        `;

        backBtn.disabled = true;

        nextBtn.textContent = "Voltar ao desafio";

        nextBtn.onclick = () => {
          window.location.href = `/play/${encodeURIComponent(desafioSlug)}`;
          
        };
      }

      function showToast(msg){
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1600);
      }

      function showError(msg){
        errorBox.textContent = msg || "";
        errorBox.classList.toggle("show", !!msg);
      }

      function setSaveState(msg, mode = ""){
        saveState.textContent = msg || "";
        saveState.className = `saveState ${mode}`.trim();
      }

      function escapeHtml(value){
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getDesafioSlug(){
        const params = new URLSearchParams(window.location.search);
        const fromQuery = params.get("desafio") || params.get("id") || params.get("slug");
        if (fromQuery) return fromQuery.trim();
        const parts = window.location.pathname.split("/").map(p => p.trim()).filter(Boolean);
        return parts[parts.length - 1] || "desafio_20";
      }

      async function requireAuth(){
        const { data, error } = await supabase.auth.getUser();
        if (error) console.error("[AUTH ERROR]", error);
        authUserId = data?.user?.id || null;
        if (!authUserId){
          const redirectUrl = window.location.pathname + window.location.search;
          window.location.replace(`/login.html?redirect=${encodeURIComponent(redirectUrl)}`);
          return false;
        }
        return true;
      }

      async function loadQuestions(slug){
        const { data, error } = await supabase
          .from("contract_questions")
          .select("id,desafio_slug,step_order,question_key,title,description,question_type,options,required")
          .eq("desafio_slug", slug)
          .eq("is_active", true)
          .order("step_order", { ascending:true });
        if (error) throw error;
        return Array.isArray(data) ? data : [];
      }

      async function loadExistingResponse(slug){
        const { data, error } = await supabase
          .from("contract_responses")
          .select("answers,status,rendered_text,submitted_at,signature_image,signed_at,pdf_url")
          .eq("desafio_slug", slug)
          .maybeSingle();
        if (error) throw error;
        return data || null;
      }

      function normalizeOptions(options){
        if (!options) return [];
        if (Array.isArray(options)) return options;
        try{ return JSON.parse(options); }catch{ return []; }
      }

      function resizeSignatureCanvas(){
        const canvas = document.getElementById("signatureCanvas");
        if (!canvas) return;

        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const rect = canvas.getBoundingClientRect();

        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));

        const ctx = canvas.getContext("2d");
        ctx.scale(ratio, ratio);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);

        if (signatureDataUrl){
          const img = new Image();
          img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
          img.src = signatureDataUrl;
        }
      }

      function initSignaturePad(){
        const canvas = document.getElementById("signatureCanvas");
        if (!canvas) return;

        resizeSignatureCanvas();

        signaturePad = new SignaturePad(canvas, {
          backgroundColor: "rgb(255,255,255)",
          penColor: "rgb(0,0,0)",
          minWidth: 0.7,
          maxWidth: 2.4,
          throttle: 12
        });

        if (signatureDataUrl){
          signaturePad.fromDataURL(signatureDataUrl, {
            ratio: Math.max(window.devicePixelRatio || 1, 1)
          });
        }

        signaturePad.addEventListener("endStroke", () => {
          signatureDataUrl = signaturePad.toDataURL("image/png");
          showError("");
          scheduleDraftSave();
        });

        document.getElementById("clearSignatureBtn")?.addEventListener("click", () => {
          signaturePad.clear();
          signatureDataUrl = "";
          showError("");
          scheduleDraftSave();
        });
      }

      function renderSignatureStep(){
        questionBox.innerHTML = `
          <h2 class="questionTitle">Assinatura eletrônica</h2>
          <p class="questionDesc">Assine com o dedo ou mouse dentro do quadro branco. Esta assinatura será anexada ao contrato final.</p>
          <div class="signatureWrap">
            <canvas id="signatureCanvas" class="signatureCanvas" aria-label="Campo de assinatura"></canvas>
          </div>
          <div class="signatureTools">
            <button class="miniBtn" id="clearSignatureBtn" type="button">Limpar assinatura</button>
            <span class="questionDesc" style="margin:0;">Use uma assinatura legível.</span>
          </div>
        `;

        requestAnimationFrame(initSignaturePad);
      }

      function getAnswer(key){ return answers[key]; }

      function setAnswer(key, value){
        answers = { ...answers, [key]: value };
        showError("");
        scheduleDraftSave();
      }

      function renderText(q){
        const current = getAnswer(q.question_key) || "";
        return `
          <textarea id="fieldText" maxlength="1500" placeholder="Escreva aqui...">${escapeHtml(current)}</textarea>
        `;
      }

      function renderSingle(q){
        const opts = normalizeOptions(q.options);
        const current = String(getAnswer(q.question_key) || "");
        return opts.map(opt => {
          const value = String(opt.value ?? opt.label ?? "");
          return `
            <label class="option">
              <input type="radio" name="${escapeHtml(q.question_key)}" value="${escapeHtml(value)}" ${current === value ? "checked" : ""} />
              <span class="optionText">${escapeHtml(opt.label ?? value)}</span>
            </label>
          `;
        }).join("");
      }

      function renderMultiple(q){
        const opts = normalizeOptions(q.options);
        const current = Array.isArray(getAnswer(q.question_key)) ? getAnswer(q.question_key) : [];
        return opts.map(opt => {
          const value = String(opt.value ?? opt.label ?? "");
          return `
            <label class="option">
              <input type="checkbox" name="${escapeHtml(q.question_key)}" value="${escapeHtml(value)}" ${current.includes(value) ? "checked" : ""} />
              <span class="optionText">${escapeHtml(opt.label ?? value)}</span>
            </label>
          `;
        }).join("");
      }

      function renderYesNo(q){
        const current = String(getAnswer(q.question_key) || "");
        return [
          { value:"yes", label:"Sim" },
          { value:"no", label:"Não" }
        ].map(opt => `
          <label class="option">
            <input type="radio" name="${escapeHtml(q.question_key)}" value="${opt.value}" ${current === opt.value ? "checked" : ""} />
            <span class="optionText">${opt.label}</span>
          </label>
        `).join("");
      }

      function renderQuestionInput(q){
        if (q.question_type === "text") return renderText(q);
        if (q.question_type === "single") return renderSingle(q);
        if (q.question_type === "multiple") return renderMultiple(q);
        if (q.question_type === "yes_no") return renderYesNo(q);
        return `<p class="questionDesc">Tipo de pergunta não suportado.</p>`;
      }

      function attachQuestionListeners(q){
        if (q.question_type === "text"){
          const el = document.getElementById("fieldText");
          el?.addEventListener("input", () => setAnswer(q.question_key, el.value.trim()));
          return;
        }

        questionBox.querySelectorAll("input").forEach(input => {
          input.addEventListener("change", () => {
            if (q.question_type === "multiple"){
              const selected = [...questionBox.querySelectorAll("input:checked")].map(el => el.value);
              setAnswer(q.question_key, selected);
            } else {
              const selected = questionBox.querySelector("input:checked")?.value || "";
              setAnswer(q.question_key, selected);
            }
          });
        });
      }

      function renderStep(){
        showError("");
        const totalSteps = questions.length + 2;
        const displayStep = isReviewStep ? totalSteps : isSignatureStep ? questions.length + 1 : currentIndex + 1;
        stepInfo.textContent = `${displayStep}/${totalSteps}`;
        barFill.style.width = `${Math.round((displayStep / totalSteps) * 100)}%`;

        backBtn.disabled = currentIndex === 0 && !isSignatureStep && !isReviewStep;
        nextBtn.textContent = isReviewStep ? "Finalizar e gerar PDF" : "Continuar";

        if (isReviewStep){
          questionBox.innerHTML = `
            <h2 class="questionTitle">Revisão final</h2>
            <p class="questionDesc">Confira as respostas e a assinatura antes de finalizar. Depois de concluir, o contrato será salvo e o PDF será gerado.</p>
            <div class="reviewBox">${escapeHtml(buildContractText())}</div>
            ${signatureDataUrl ? `<div class="signaturePreview"><img src="${signatureDataUrl}" alt="Assinatura do usuário"></div>` : ""}
            ${pdfUrl ? `<div class="pdfBox">PDF gerado: <a href="${escapeHtml(pdfUrl)}" target="_blank" rel="noopener noreferrer">Baixar contrato em PDF</a></div>` : ""}
          `;
          return;
        }

        if (isSignatureStep){
          renderSignatureStep();
          return;
        }

        const q = questions[currentIndex];
        questionBox.innerHTML = `
          <h2 class="questionTitle">${escapeHtml(q.title)}</h2>
          ${q.description ? `<p class="questionDesc">${escapeHtml(q.description)}</p>` : ""}
          <div class="fieldArea">${renderQuestionInput(q)}</div>
        `;
        attachQuestionListeners(q);
      }

      function validateCurrentStep(){
        if (isReviewStep) return true;
        if (isSignatureStep) return !!signatureDataUrl;
        const q = questions[currentIndex];
        if (!q?.required) return true;
        const value = getAnswer(q.question_key);
        if (q.question_type === "multiple") return Array.isArray(value) && value.length > 0;
        return String(value ?? "").trim().length > 0;
      }

      function getOptionLabel(q, value){
        if (q.question_type === "yes_no") return value === "yes" ? "Sim" : value === "no" ? "Não" : "";
        const opt = normalizeOptions(q.options).find(o => String(o.value ?? o.label ?? "") === String(value));
        return opt?.label ?? value;
      }

      function buildContractText(){
        const lines = [];
        lines.push("CONTRATO INTERATIVO DO DESAFIO");
        lines.push(`Desafio: ${desafioSlug}`);
        lines.push(`Data: ${new Date().toLocaleString("pt-BR")}`);
        lines.push("");
        questions.forEach((q, idx) => {
          const raw = getAnswer(q.question_key);
          let rendered = "";
          if (Array.isArray(raw)) rendered = raw.map(v => getOptionLabel(q, v)).join(", ");
          else rendered = getOptionLabel(q, raw);
          if (!rendered) rendered = "Não informado";
          lines.push(`${idx + 1}. ${q.title}`);
          lines.push(rendered);
          lines.push("");
        });
        lines.push(`Assinatura eletrônica: ${signatureDataUrl ? "coletada" : "não coletada"}`);
        lines.push("Status: enviado eletronicamente pelo usuário autenticado.");
        return lines.join("\n");
      }

      async function saveDraft(){
        if (!authUserId || !questions.length || saving) return;
        saving = true;
        setSaveState("Salvando rascunho...");
        try{
          const { error } = await supabase.rpc("save_contract_response", {
            p_desafio_slug: desafioSlug,
            p_answers: answers,
            p_rendered_text: buildContractText(),
            p_submit: false,
            p_signature_image: signatureDataUrl || null,
            p_pdf_url: pdfUrl || null
          });
          if (error) throw error;
          setSaveState("Rascunho salvo", "ok");
        }catch(err){
          console.error("[SAVE DRAFT ERROR]", err);
          setSaveState("Erro ao salvar rascunho", "err");
        }finally{
          saving = false;
        }
      }

      function scheduleDraftSave(){
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveDraft, 550);
      }


      function splitPdfLines(text, maxChars = 82){
        const out = [];
        String(text || "").split("\n").forEach(line => {
          const words = line.split(/\s+/);
          let current = "";
          words.forEach(word => {
            if ((current + " " + word).trim().length > maxChars){
              if (current) out.push(current);
              current = word;
            } else {
              current = (current + " " + word).trim();
            }
          });
          out.push(current || "");
        });
        return out;
      }

      async function createContractPdfBytes(){
        const pdfDoc = await PDFDocument.create();
        const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const bold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

        const margin = 48;
        const pageWidth = 595.28;
        const pageHeight = 841.89;
        let page = pdfDoc.addPage([pageWidth, pageHeight]);
        let y = pageHeight - margin;

        const drawLine = (text, size = 10, useBold = false) => {
          if (y < margin + 70){
            page = pdfDoc.addPage([pageWidth, pageHeight]);
            y = pageHeight - margin;
          }

          page.drawText(String(text || ""), {
            x: margin,
            y,
            size,
            font: useBold ? bold : font,
            color: rgb(0.08, 0.08, 0.08)
          });
          y -= size + 7;
        };

        drawLine("INOVANDO JUNTOS", 18, true);
        drawLine("Contrato interativo assinado eletronicamente", 13, true);
        y -= 8;

        splitPdfLines(buildContractText(), 88).forEach(line => {
          const isTitle = /^(\d+\.|CONTRATO|Desafio:|Data:|Assinatura|Status:)/.test(line);
          drawLine(line, isTitle ? 10.8 : 9.8, isTitle);
        });

        if (signatureDataUrl){
          if (y < 170){
            page = pdfDoc.addPage([pageWidth, pageHeight]);
            y = pageHeight - margin;
          }

          y -= 10;
          drawLine("Assinatura:", 11, true);

          const pngImage = await pdfDoc.embedPng(signatureDataUrl);
          const imgWidth = 260;
          const imgHeight = Math.min(105, (pngImage.height / pngImage.width) * imgWidth);

          page.drawRectangle({
            x: margin,
            y: y - imgHeight - 10,
            width: imgWidth + 20,
            height: imgHeight + 18,
            borderColor: rgb(0.75, 0.75, 0.75),
            borderWidth: 1,
            color: rgb(1, 1, 1)
          });

          page.drawImage(pngImage, {
            x: margin + 10,
            y: y - imgHeight - 1,
            width: imgWidth,
            height: imgHeight
          });

          y -= imgHeight + 26;
          drawLine(`Assinado em: ${new Date().toLocaleString("pt-BR")}`, 9.5, false);
        }

        return await pdfDoc.save();
      }

      async function uploadContractPdf(){
        const pdfBytes = await createContractPdfBytes();
        const filePath = `${authUserId}/${desafioSlug}-${Date.now()}.pdf`;
        const file = new File([pdfBytes], `${desafioSlug}-contrato.pdf`, { type: "application/pdf" });

        const { error: uploadError } = await supabase.storage
          .from("contracts")
          .upload(filePath, file, {
            contentType: "application/pdf",
            upsert: true
          });

        if (uploadError) throw uploadError;

        const { data } = supabase.storage.from("contracts").getPublicUrl(filePath);
        return data?.publicUrl || filePath;
      }

      async function updatePdfUrl(finalPdfUrl){
        const { error } = await supabase.rpc("save_contract_response", {
          p_desafio_slug: desafioSlug,
          p_answers: answers,
          p_rendered_text: buildContractText(),
          p_submit: true,
          p_signature_image: signatureDataUrl || null,
          p_pdf_url: finalPdfUrl || null
        });

        if (error) throw error;
      }

      async function submitContract(){
        nextBtn.disabled = true;
        backBtn.disabled = true;
        setSaveState("Finalizando contrato...");
        try{
          const { error } = await supabase.rpc("save_contract_response", {
            p_desafio_slug: desafioSlug,
            p_answers: answers,
            p_rendered_text: buildContractText(),
            p_submit: true,
            p_signature_image: signatureDataUrl || null,
            p_pdf_url: pdfUrl || null
          });
          if (error) throw error;

          setSaveState("Gerando PDF...");
          pdfUrl = await uploadContractPdf();
          await updatePdfUrl(pdfUrl);

          setSaveState("Contrato finalizado e PDF gerado", "ok");
          showToast("Contrato finalizado");

          questionBox.innerHTML = `
            <h2 class="questionTitle">Contrato finalizado</h2>
            <p class="questionDesc">Seu contrato foi salvo com assinatura eletrônica e PDF final.</p>
            <div class="pdfBox">
              <a href="${escapeHtml(pdfUrl)}" target="_blank" rel="noopener noreferrer">Baixar contrato em PDF</a>
            </div>
          `;
          isReviewStep = false;
          isSignatureStep = false;
          nextBtn.textContent = "Voltar ao desafio";
          nextBtn.disabled = false;
          backBtn.disabled = true;
          nextBtn.onclick = () => {
            window.location.href = `/play/${encodeURIComponent(desafioSlug)}`;
          };
        }catch(err){
          console.error("[SUBMIT ERROR]", err);
          nextBtn.disabled = false;
          backBtn.disabled = false;
          setSaveState("Erro ao finalizar", "err");
          showError("Não foi possível finalizar ou gerar o PDF. Verifique Storage/RLS e tente novamente.");
        }
      }

      backBtn.addEventListener("click", async () => {
        if (isReviewStep){
          isReviewStep = false;
          isSignatureStep = true;
          renderStep();
          return;
        }

        if (isSignatureStep){
          isSignatureStep = false;
          currentIndex = Math.max(0, questions.length - 1);
          renderStep();
          return;
        }

        if (currentIndex > 0){
          currentIndex--;
          renderStep();
        }
      });

      nextBtn.addEventListener("click", async () => {
        if (isReviewStep){
          await submitContract();
          return;
        }

        if (!validateCurrentStep()){
          showError(isSignatureStep ? "A assinatura é obrigatória para finalizar." : "Esta resposta é obrigatória para continuar.");
          return;
        }

        await saveDraft();

        if (isSignatureStep){
          isSignatureStep = false;
          isReviewStep = true;
          renderStep();
          return;
        }

        if (currentIndex < questions.length - 1){
          currentIndex++;
          renderStep();
        } else {
          isSignatureStep = true;
          renderStep();
        }
      });

      
      closeBtn?.addEventListener("click", () => {
        const goBack = () => {
          window.location.href = `/play/${encodeURIComponent(desafioSlug)}`;
        };

        if (Object.keys(answers || {}).length > 0 || signatureDataUrl) {
          if (confirm("Tem certeza que deseja sair? As respostas já salvas permanecerão armazenadas.")) {
            goBack();
          }
        } else {
          goBack();
        }
      });


      async function init(){
        try{
          const ok = await requireAuth();
          if (!ok) return;
          desafioSlug = getDesafioSlug();
          questions = await loadQuestions(desafioSlug);
          if (!questions.length){
            questionBox.innerHTML = `
              <h2 class="questionTitle">Sem perguntas configuradas</h2>
              <p class="questionDesc">Não existem perguntas ativas para ${escapeHtml(desafioSlug)}.</p>
            `;
            nextBtn.disabled = true;
            stepInfo.textContent = "0/0";
            return;
          }
          const existing = await loadExistingResponse(desafioSlug);
          answers = existing?.answers && typeof existing.answers === "object" ? existing.answers : {};
          signatureDataUrl = existing?.signature_image || "";
          pdfUrl = existing?.pdf_url || "";
          if (existing?.status === "submitted" && pdfUrl) {
            renderCompletedContract();
            return;
          }
          if (existing?.status === "submitted") setSaveState("Contrato já enviado. Você pode revisar e reenviar se necessário.", "ok");
          renderStep();
        }catch(err){
          console.error("[INIT ERROR]", err);
          questionBox.innerHTML = `
            <h2 class="questionTitle">Erro ao carregar</h2>
            <p class="questionDesc">Não foi possível abrir o contrato.</p>
          `;
          nextBtn.disabled = true;
          showError("Erro carregando contrato. Revise Supabase, RLS e conexão.");
        }
      }

      window.addEventListener("resize", () => {
        if (isSignatureStep) resizeSignatureCanvas();
      });

      init();
    })();
  </script>
</body>
