<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Redirecionando...</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://rsordtljnvxonaygyuxd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const parts = window.location.pathname
      .split("/")
      .map(p => p.trim())
      .filter(Boolean);

    const slug = parts[parts.length - 1];

    const INTRO_URL = "/play.html?id=intro";
    const INTRO_PUBLIC_URL = "/play/intro";

    function goNotFound(){
      document.body.innerHTML = "Página no encontrada";
    }

    async function main(){
      if (parts[0] !== "play" || !slug) {
        goNotFound();
        return;
      }

      const targetUrl = `/play.html?id=${encodeURIComponent(slug)}`;

      try {
        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;

        const isLogged = !!data?.session?.user;
        const isIntro = slug.toLowerCase() === "intro";

        // Caso 1: /play/intro
        // Si no está logueado, puede crear cuenta.
        // Luego login.html lo devuelve a INTRO_URL.
        if (isIntro) {
          if (isLogged) {
            window.location.replace(INTRO_URL);
            return;
          }

          window.location.replace(
            `/login.html?mode=register&redirect=${encodeURIComponent(INTRO_URL)}`
          );
          return;
        }

        // Caso 2: /play/desafio_xx
        // Solo redirecciona al desafío si ya está logueado.
        if (isLogged) {
          window.location.replace(targetUrl);
          return;
        }

        // Si intenta entrar directo a un desafío sin login,
        // debe pasar primero por intro.
        window.location.replace(INTRO_PUBLIC_URL);

      } catch (err) {
        console.error("[404 AUTH CHECK ERROR]", err);
        window.location.replace(INTRO_PUBLIC_URL);
      }
    }

    main();
  </script>
</head>

<body>
  Redirecionando...
</body>
</html>
