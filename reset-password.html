<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redefinir senha | Inovando Juntos</title>

  <style>
    body{
      margin:0;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      color:rgba(255,255,255,.88);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      padding:20px;
    }

    .card{
      width:min(420px,100%);
      border:1px solid rgba(255,255,255,.12);
      border-radius:26px;
      padding:24px 20px;
      background:#0b0b0b;
      box-shadow:0 20px 70px rgba(0,0,0,.55);
    }

    h1{
      font-size:22px;
      margin:0 0 10px;
      text-align:center;
    }

    p{
      color:rgba(255,255,255,.56);
      font-size:13px;
      text-align:center;
      line-height:1.45;
      margin:0 0 20px;
    }

    label{
      display:block;
      font-size:12px;
      font-weight:800;
      color:rgba(255,255,255,.45);
      text-transform:uppercase;
      margin-bottom:7px;
    }

    input{
      width:100%;
      box-sizing:border-box;
      min-height:52px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:17px;
      background:rgba(255,255,255,.06);
      color:#fff;
      padding:0 15px;
      font-size:16px;
      font-weight:650;
      outline:none;
    }

    input:focus{
      border-color:rgba(255,255,255,.35);
      background:rgba(255,255,255,.09);
    }

    button{
      width:100%;
      min-height:54px;
      margin-top:16px;
      border:0;
      border-radius:999px;
      background:#f4f4f5;
      color:#000;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .status{
      display:none;
      margin-top:14px;
      border-radius:15px;
      padding:11px 12px;
      font-size:13px;
      line-height:1.38;
    }

    .status.show{ display:block; }

    .status.error{
      color:#ff6b6b;
      background:rgba(255,107,107,.08);
      border:1px solid rgba(255,107,107,.28);
    }

    .status.ok{
      color:#7ee787;
      background:rgba(126,231,135,.07);
      border:1px solid rgba(126,231,135,.26);
    }

    .status.info{
      color:#f2d675;
      background:rgba(242,214,117,.08);
      border:1px solid rgba(242,214,117,.22);
    }

    .version-badge{
      margin:0 auto 14px;
      width:max-content;
      max-width:100%;
      padding:7px 12px;
      border-radius:999px;
      color:#ff7ad9;
      background:rgba(255,122,217,.10);
      border:1px solid rgba(255,122,217,.55);
      font-size:11px;
      font-weight:900;
      letter-spacing:.3px;
      text-align:center;
    }

    .cache-note{
      margin:12px 0 0;
      color:rgba(255,255,255,.45);
      font-size:11px;
      text-align:center;
    }
  </style>
</head>

<body>
  <section class="card">
    <div class="version-badge">VERSÃO v2026-06-14-RESET-04-REST-PINK</div>
    <h1>Redefinir senha</h1>
    <p>Digite sua nova senha para atualizar o acesso à sua conta.</p>

    <form id="resetForm">
      <label for="password">Nova senha</label>
      <input id="password" type="password" minlength="6" required placeholder="Mínimo 6 caracteres" autocomplete="new-password" />

      <label for="confirmPassword" style="margin-top:13px;">Confirmar senha</label>
      <input id="confirmPassword" type="password" minlength="6" required placeholder="Repita a nova senha" autocomplete="new-password" />

      <button id="submitBtn" type="submit">Atualizar senha</button>
    </form>

    <div class="status" id="statusBox"></div>
    <div class="cache-note">Se não aparecer <strong>v2026-06-14-RESET-04-REST-PINK</strong>, atualize a página antes de redefinir.</div>
  </section>

  <script>
    const SUPABASE_URL = "https://rsordtljnvxonaygyuxd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";
    const PAGE_VERSION = "v2026-06-14-RESET-04-REST-PINK";

    const resetForm = document.getElementById("resetForm");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("statusBox");

    const recovery = readRecoveryParams();

    console.log("[RESET PASSWORD PAGE VERSION]", PAGE_VERSION);
    console.log("[RESET PARAMS]", {
      hasAccessToken: !!recovery.accessToken,
      type: recovery.type,
      expiresAt: recovery.expiresAt
    });

    if (!recovery.accessToken || recovery.type !== "recovery") {
      setBusy(false);
      showStatus("Abra esta página usando o link recebido por e-mail.", "error");
    } else if (isExpired(recovery.expiresAt)) {
      setBusy(false);
      showStatus("Link expirado. Solicite um novo link de redefinição.", "error");
    } else {
      setBusy(false);
      showStatus("Link validado. Digite sua nova senha.", "ok");
    }

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const password = passwordEl.value.trim();
      const confirmPassword = confirmPasswordEl.value.trim();

      if (!recovery.accessToken || recovery.type !== "recovery") {
        showStatus("Link inválido. Solicite um novo link de redefinição.", "error");
        return;
      }

      if (isExpired(recovery.expiresAt)) {
        showStatus("Link expirado. Solicite um novo link de redefinição.", "error");
        return;
      }

      if (!password || password.length < 6) {
        showStatus("A senha deve ter pelo menos 6 caracteres.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showStatus("As senhas não coincidem.", "error");
        return;
      }

      setBusy(true);
      showStatus("Atualizando senha...", "info");

      try {
        const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: "PUT",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${recovery.accessToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password })
        });

        const text = await response.text();
        let payload = null;

        try {
          payload = text ? JSON.parse(text) : null;
        } catch (_) {
          payload = text;
        }

        console.log("[SUPABASE UPDATE RESPONSE]", response.status, payload);

        if (!response.ok) {
          const msg = payload && (payload.msg || payload.message || payload.error_description || payload.error);
          throw new Error(msg || `HTTP ${response.status}`);
        }

        clearLocalAuthStorage();
        cleanUrl();

        showStatus("Senha atualizada com sucesso. Redirecionando...", "ok");

        setTimeout(() => {
          window.location.replace("/login.html");
        }, 1200);

      } catch (err) {
        console.error("[RESET PASSWORD ERROR]", err);
        showStatus(`Não foi possível atualizar sua senha. ${err.message || "Solicite um novo link."}`, "error");
      } finally {
        setBusy(false);
      }
    });

    function readRecoveryParams() {
      const hash = window.location.hash.replace(/^#/, "");
      const params = new URLSearchParams(hash);

      return {
        accessToken: params.get("access_token"),
        refreshToken: params.get("refresh_token"),
        expiresAt: params.get("expires_at"),
        expiresIn: params.get("expires_in"),
        tokenType: params.get("token_type"),
        type: params.get("type")
      };
    }

    function isExpired(expiresAt) {
      if (!expiresAt) return false;
      const expiresAtMs = Number(expiresAt) * 1000;
      return Number.isFinite(expiresAtMs) && Date.now() >= expiresAtMs;
    }

    function clearLocalAuthStorage() {
      try {
        Object.keys(localStorage).forEach((key) => {
          if (key.startsWith("sb-") || key.includes("supabase")) {
            localStorage.removeItem(key);
          }
        });
        sessionStorage.clear();
      } catch (err) {
        console.warn("[STORAGE CLEAN WARNING]", err);
      }
    }

    function cleanUrl() {
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    function setBusy(isBusy) {
      submitBtn.disabled = isBusy;
      passwordEl.disabled = isBusy;
      confirmPasswordEl.disabled = isBusy;
      submitBtn.textContent = isBusy ? "Processando..." : "Atualizar senha";
    }

    function showStatus(message, type = "") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`.trim();
    }
  </script>
</body>
</html>
