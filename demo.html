<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Player</title>

  <style>
    :root{
      --bg:#000000;
      --panel:#0b0b0b;
      --panel2:#101010;
      --edge:rgba(255,255,255,0.08);
      --edge2:rgba(255,255,255,0.14);

      --text:rgba(255,255,255,0.75);
      --muted:rgba(255,255,255,0.60);
      --soft:rgba(255,255,255,0.42);

      --shadow: rgba(0,0,0,0.78);
      --accent: rgba(255,255,255,0.10);
      --accent2: rgba(255,255,255,0.16);
    }

    html,body{
      height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .app{
      height:100dvh;
      width:100vw;
      display:flex;
      align-items:stretch;
      justify-content:center;
      padding:0;
    }

    .shell{
      width:min(560px, 100%);
      min-height:100dvh;
      height:100dvh;
      background:#000;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      position:relative;
      isolation:isolate;
    }

    .topbar{
      position:relative;
      padding:10px 14px 4px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
      flex:0 0 auto;
      z-index:1;
    }

    .topbar-nav{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo-center{
      display:flex;
      justify-content:center;
      align-items:center;
      flex:0 0 auto;
    }

    .logo-center img{
      width:75px;
      height:75px;
      object-fit:contain;
      background:transparent;
      box-shadow:none;
      opacity:.92;
    }

    .stage{
      position:relative;
      flex:0 0 43dvh;
      min-height:250px;
      max-height:43dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:6px 18px 0 18px;
      z-index:1;
    }

    .mediaBox{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      border-radius:18px;
      overflow:hidden;
      isolation:isolate;
      background:
        radial-gradient(120% 100% at 50% 20%, rgba(255,255,255,0.07), rgba(255,255,255,0.01) 55%, rgba(255,255,255,0.00) 75%),
        #111;
      box-shadow:
        0 20px 50px rgba(0,0,0,0.55),
        inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .mediaBox img,
    .mediaBox video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#000;
    }

    .mediaBox > img,
    .mediaBox > video,
    .mediaBox > *:not(.sideActions){
      position:relative;
      z-index:1;
      width:100%;
      height:100%;
    }

    .bottom{
      flex:1 1 auto;
      min-height:250px;
      padding:8px 18px calc(24px + env(safe-area-inset-bottom, 0px));
      background:
        linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.55) 18%, rgba(0,0,0,0.92) 100%);
      overflow:auto;
      z-index:1;
    }

    /* ===== MODO DESAFIO: video más alto detrás de controles tipo Spotify ===== */
    .shell.is-challenge .stage{
      flex:0 0 65dvh;
      max-height:65dvh;
      margin-bottom:-110px; /* invade visualmente el panel inferior */
      z-index:0;
    }

    .shell.is-challenge .bottom{
      z-index:2; /* controles y texto por encima del video */
      padding-top:118px; /* compensa el solape */
      background:
        linear-gradient(
          180deg,
          rgba(0,0,0,0.00) 0%,
          rgba(0,0,0,0.22) 14%,
          rgba(0,0,0,0.58) 34%,
          rgba(0,0,0,0.90) 62%,
          rgba(0,0,0,0.96) 100%
        );
    }
    .infoCard{
      background:transparent;
      border:none;
      border-radius:0;
      padding:0;
      box-shadow:none;
    }

    .row1{
      position:relative;
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      padding-right:0px;
      min-height:42px;
    }

    .pTitle{
      font-weight:800;
      letter-spacing:-0.02em;
      font-size:28px;
      text-transform:none;
      line-height:1.08;
      margin:0;
      color:var(--text);
    }

    .pCat{
      margin-top:7px;
      font-size:15px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:42ch;
      font-weight:500;
    }

    .pShort{
      margin-top:14px;
      width:100%;
      max-width:100%;
      overflow:auto;
      padding-right:4px;
    }

    .audioCard{
      border:none;
      background:transparent;
      border-radius:0;
      padding:0;
      box-shadow:none;
    }

    .audioTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .audioLabel{
      font-size:14px;
      font-weight:500;
      line-height:1.45;
      color:var(--muted);
    }

    .descBox{
      margin-top:10px;
      font-size:14px;
      color:var(--muted);
      line-height:1.5;
    }

    .playerWrap{
      margin-top:2px;
      width:100%;
    }

    .progressWrap{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-top:4px;
    }

    .progress{
      -webkit-appearance:none;
      appearance:none;
      width:100%;
      height:4px;
      border-radius:999px;
      background:rgba(255,255,255,0.18);
      outline:none;
      cursor:pointer;
    }

    .progress::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:14px;
      height:14px;
      border-radius:50%;
      background:rgba(255,255,255,0.82);
      border:none;
      box-shadow:none;
    }

    .progress::-moz-range-thumb{
      width:14px;
      height:14px;
      border-radius:50%;
      background:rgba(255,255,255,0.82);
      border:none;
      box-shadow:none;
    }

    .progress::-moz-range-track{
      height:4px;
      border-radius:999px;
      background:rgba(255,255,255,0.18);
    }

    .timeRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      color:var(--soft);
      font-weight:600;
    }

    .mainControls{
      margin-top:16px;
      width:min(320px, 100%);
      margin-left:auto;
      margin-right:auto;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      align-items:center;
      justify-items:center;
    }

    .ctrlBtn{
      border:none;
      background:transparent;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      padding:4px;
    }

    .ctrlBtn svg{
      display:block;
      width:30px;
      height:30px;
      fill:currentColor;
    }

    .ctrlBtn:disabled{
      opacity:.35;
      cursor:not-allowed;
    }

    .playBtn{
      width:72px;
      height:72px;
      border-radius:50%;
      border:none;
      background:rgba(255,255,255,0.82);
      color:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 14px 34px rgba(0,0,0,0.45);
      flex:0 0 auto;
    }

    .playBtn svg{
      width:34px;
      height:34px;
      fill:currentColor;
      margin-left:2px;
    }

    .playBtn.is-playing svg{
      margin-left:0;
    }

    .actions{
      margin-top:calc(18px + 36px);
    }

    .actionBar{
      width:min(320px, 100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      align-items:center;
      justify-items:center;
    }

    .iconBtn{
      position:relative;
      width:48px;
      height:48px;
      min-width:48px;
      min-height:48px;
      padding:0;
      border:none;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      transition: transform .10s ease, color .12s ease, opacity .12s ease;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:none;
    }

    .iconBtn:hover{
      color:var(--text);
      transform:translateY(-1px);
    }

    .iconBtn:active{
      transform:translateY(0);
    }

    .iconBtn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none !important;
    }

    .iconSvg{
      width:33px;
      height:33px;
      display:block;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .iconBtn .lbl{
      display:none;
    }

    .badge{
      position:absolute;
      top:-4px;
      right:-8px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.07);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:9px;
      font-weight:800;
      color:var(--text);
    }

    .sideActions{
      position:absolute;
      right:10px;
      bottom:6%;
      top:auto;
      transform:none;
      z-index:999;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      pointer-events:none;
    }

    .sideAction{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:5px;
      pointer-events:auto;
    }

    .sideActionBtn{
      width:24px;
      height:24px;
      border:none;
      background:transparent;
      padding:0;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      filter:drop-shadow(0 4px 10px rgba(0,0,0,0.70));
      transition:transform .12s ease, opacity .12s ease;
    }

    .sideActionBtn:hover{
      transform:translateY(-1px) scale(1.02);
    }

    .sideActionBtn:active{
      transform:scale(0.98);
    }

    .sideActionBtn[disabled]{
      opacity:.55;
      cursor:not-allowed;
    }

    .sideActionBtn img{
      width:23px;
      height:23px;
      object-fit:contain;
      display:block;
    }

    .sideActionCount{
      min-width:20px;
      text-align:center;
      font-size:9px;
      line-height:1;
      font-weight:800;
      color:#ffffff;
      text-shadow:0 2px 8px rgba(0,0,0,0.9);
      letter-spacing:-0.01em;
    }

    .sideAction.is-hidden{
      display:none;
    }

    #actionContactWrap .sideActionCount{
      display:none !important;
    }

    .toast{
      position:absolute;
      left:14px;
      right:14px;
      bottom:calc(88px + env(safe-area-inset-bottom, 0px));
      padding:11px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(20,20,20,0.92);
      color:var(--text);
      font-size:12px;
      display:none;
      box-shadow:0 16px 38px rgba(0,0,0,0.55);
      z-index:20;
    }

    .toast.show{ display:block; }

    .itemsOverlay{
      position:absolute;
      inset:0;
      z-index:60;
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:0 12px calc(12px + env(safe-area-inset-bottom, 0px));
      background:linear-gradient(180deg, rgba(0,0,0,0.20), rgba(0,0,0,0.58));
    }

    .itemsOverlay.show{
      display:flex;
    }

    .itemsBackdrop{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.28);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
    }

    .itemsPanel{
      position:relative;
      width:100%;
      max-width:100%;
      height:min(86dvh, 920px);
      max-height:min(86dvh, 920px);
      z-index:1;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      background:rgba(0,0,0,0.96);
      box-shadow:0 30px 80px rgba(0,0,0,0.85);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transform:translateY(16px);
      opacity:0;
      transition:transform .20s ease, opacity .20s ease;
    }

    .itemsOverlay.show .itemsPanel{
      transform:translateY(0);
      opacity:1;
    }

    .itemsHeader{
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
    }

    .itemsTitle{
      font-size:13px;
      font-weight:900;
      letter-spacing:.05em;
      text-transform:uppercase;
      color:var(--text);
    }

    .itemsClose{
      width:38px;
      height:38px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.04);
      color:var(--text);
      cursor:pointer;
    }

    .itemsBody{
      flex:1 1 auto;
      overflow:auto;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:14px;
      -webkit-overflow-scrolling:touch;
    }

    .itemCard{
      display:flex;
      align-items:center;
      gap:12px;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:10px;
      background:rgba(255,255,255,0.03);
      cursor:pointer;
      transition: transform .10s ease, border-color .12s ease, background .12s ease;
    }

    .itemCard:hover{
      border-color:rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.05);
      transform:translateY(-1px);
    }

    .itemCard:active{
      transform:scale(0.99);
    }

    .itemMedia{
      flex:0 0 78px;
      width:78px;
      height:78px;
      border-radius:14px;
      background:transparent;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .itemMedia img,
    .itemMedia video{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:transparent;
    }

    .itemContent{
      flex:1 1 auto;
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .itemName{
      font-size:17px;
      font-weight:800;
      letter-spacing:-0.01em;
      line-height:1.15;
      margin:0 0 6px 0;
      color:var(--text);
    }

    .itemCategory{
      font-size:14px;
      font-weight:700;
      color:var(--muted);
      line-height:1.2;
      margin:0 0 6px 0;
    }

    .itemDesc{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
      margin:0;
    }

    .itemMetaRow{
      margin-top:8px;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .itemPill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:24px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.04);
      font-size:11px;
      font-weight:800;
      letter-spacing:.02em;
      text-transform:uppercase;
      color:var(--text);
    }

    .srOnly{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    body.modal-open{
      overflow:hidden;
      touch-action:none;
    }

    @media (max-height: 780px){
      .logo-center img{
        width:68px;
        height:68px;
      }

      .stage{
        flex:0 0 39dvh;
        min-height:220px;
        max-height:39dvh;
        padding:4px 16px 0 16px;
      }

      .pTitle{
        font-size:24px;
      }

      .pCat{
        font-size:14px;
      }

      .mainControls{
        margin-top:14px;
        gap:20px;
      }

      .playBtn{
        width:66px;
        height:66px;
      }

      .playBtn svg{
        width:30px;
        height:30px;
      }

      .ctrlBtn svg{
        width:28px;
        height:28px;
      }

      .actionBar{
        width:min(300px, 100%);
      }

      .iconSvg{
        width:30px;
        height:30px;
      }

      .itemsOverlay{
        padding:0 10px calc(10px + env(safe-area-inset-bottom, 0px));
      }

      .itemsPanel{
        height:min(88dvh, 920px);
        max-height:min(88dvh, 920px);
        border-radius:22px;
      }

      .row1{
        min-height:38px;
      }
    }

    @media (max-width: 390px){
      .bottom{
        padding-left:15px;
        padding-right:15px;
      }

      .stage{
        padding-left:15px;
        padding-right:15px;
      }

      .sideActions{
        right:8px;
        bottom:16%;
        top:auto;
        transform:none;
        gap:10px;
      }

      .sideActionBtn{
        width:34px;
        height:34px;
      }

      .sideActionBtn img{
        width:20px;
        height:20px;
      }

      .sideActionCount{
        min-width:16px;
        font-size:8px;
      }

      .pTitle{
        font-size:22px;
      }

      .pCat{
        font-size:13px;
      }

      .logo-center img{
        width:64px;
        height:64px;
      }

      .itemsOverlay{
        padding-left:8px;
        padding-right:8px;
      }

      .itemsPanel{
        height:min(90dvh, 920px);
        max-height:min(90dvh, 920px);
        border-radius:20px;
      }

      .row1{
        padding-right:0px;
      }

      .shell.is-challenge .stage{
        flex:0 0 50dvh;
        max-height:50dvh;
        margin-bottom:-84px;
      }

      .shell.is-challenge .bottom{
        padding-top:90px;
      }
      
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="shell">

      <div class="topbar">
        <div class="topbar-nav">
          <div class="logo-center">
            <img src="images/logo.png" alt="Innovando Juntos">
          </div>
        </div>
      </div>

      <div class="stage" id="stage">
        <div class="mediaBox" id="mediaBox"></div>

        <div class="sideActions" id="sideActions" aria-label="Acciones rápidas">
          <div class="sideAction" id="actionLikeWrap">
            <button class="sideActionBtn" id="actionLikeBtn" aria-label="Me gusta">
              <img id="actionLikeIcon" src="images/like_01.svg" alt="">
            </button>
            <div class="sideActionCount" id="actionLikeCount">0</div>
          </div>

          <div class="sideAction" id="actionCommentWrap">
            <button class="sideActionBtn" id="actionCommentBtn" aria-label="Comentarios">
              <img id="actionCommentIcon" src="images/comment_01.svg" alt="">
            </button>
            <div class="sideActionCount" id="actionCommentCount">0</div>
          </div>

          <div class="sideAction" id="actionFavoriteWrap">
            <button class="sideActionBtn" id="actionFavoriteBtn" aria-label="Favorito o experimentado">
              <img id="actionFavoriteIcon" src="images/favorite_01.svg" alt="">
            </button>
            <div class="sideActionCount" id="actionFavoriteCount">0</div>
          </div>

          <div class="sideAction" id="actionContactWrap">
            <button class="sideActionBtn" id="actionContactBtn" aria-label="Contacto">
              <img id="actionContactIcon" src="images/contacto_01.svg" alt="">
            </button>
            <div class="sideActionCount" id="actionContactCount">0</div>
          </div>
        </div>

        <div class="toast" id="toast">Acción realizada ✓</div>
      </div>

      <div class="bottom">
        <div class="infoCard">
          <div class="row1">
            <div style="min-width:0; flex:1">
              <p class="pTitle" id="pTitle">Cargando…</p>
              <div class="pCat" id="pCat"></div>
            </div>
          </div>

          <div class="pShort" id="pShort"></div>

          <div class="playerWrap" id="playerWrap" hidden>
            <input
              id="progress"
              class="progress"
              type="range"
              min="0"
              max="100"
              step="0.1"
              value="0"
              aria-label="Progreso"
            />

            <div class="timeRow">
              <span id="currentTime">0:00</span>
              <span id="totalTime">0:00</span>
            </div>

            <div class="mainControls">
              <button class="ctrlBtn" id="prevBtn" aria-label="Anterior">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 5h2v14H6zm3.5 7 8.5 6V6z"></path>
                </svg>
              </button>

              <button class="playBtn" id="playBtn" aria-label="Play">
                <svg id="playIcon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 5v14l11-7z"></path>
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                  <path d="M7 5h4v14H7zm6 0h4v14h-4z"></path>
                </svg>
              </button>

              <button class="ctrlBtn" id="nextBtn" aria-label="Siguiente">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M16 5h2v14h-2zM6 6v12l8.5-6z"></path>
                </svg>
              </button>
            </div>
          </div>

      async function loadTargetStats(target){
        if (!target?.targetId) return null;

        try{
          const { data, error } = await supabase.rpc("get_target_interaction_bundle", {
            p_target_type: target.targetType,
            p_target_id: target.targetId,
            p_user_id: browserUserId

          if (error){

            return null;
          }

          console.log("[RAW RPC DATA]", data);

          // 🔴 SOPORTA ambos formatos
          const result = data?.get_target_interaction_bundle ?? data;

          return result;

        }catch(err){
          console.error("[STATS EXCEPTION]", err);
          return null;
        }
      }
      
      
      
      const targetStatsCache = new Map();
      const TARGET_STATS_TTL_MS = 30000; // ajustable: 15s, 30s, 60s

      function getTargetCacheKey(target){
        if (!target?.targetType || !target?.targetId) return null;
        return `${target.targetType}:${target.targetId}`;
      }

      function getCachedTargetStats(target){
        const key = getTargetCacheKey(target);
        if (!key) return null;

        const entry = targetStatsCache.get(key);
        if (!entry) return null;

        const isExpired = (Date.now() - entry.ts) > TARGET_STATS_TTL_MS;
        if (isExpired){
          targetStatsCache.delete(key);
          return null;
        }

        return entry.data;
      }

      function setCachedTargetStats(target, data){
        const key = getTargetCacheKey(target);
        if (!key) return;

        targetStatsCache.set(key, {
          ts: Date.now(),
          data: {
            like_count: Number(data?.like_count || 0),
            comment_count: Number(data?.comment_count || 0),
            favorite_count: Number(data?.favorite_count || 0),
            liked: !!data?.liked,
            favorited: !!data?.favorited
          }
        });
      }

      function invalidateCachedTargetStats(target){
        const key = getTargetCacheKey(target);
        if (!key) return;
        targetStatsCache.delete(key);
      }

          ? {
              targetType: explicitData.targetType,
              targetId: explicitData.targetId

            explicitData,
            currentMode,
            currentItem,

            actionState.like.count = likeCount;

      function formatActionCount(value){
        const n = Number(value || 0);
        if (!Number.isFinite(n) || n <= 0) return "0";
        if (n >= 1000000) return `${(n / 1000000).toFixed(n >= 10000000 ? 0 : 1).replace(/\.0$/, "")}M`;
        if (n >= 1000) return `${(n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "")}K`;
        return String(Math.round(n));
      }

      function loadActionToggleState(){
        try{
          const raw = localStorage.getItem(ACTION_TOGGLE_STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        }catch{
          return {};
        }
      }

      function getOrCreateClientUuid(storageKey){
        try{
          const existing = localStorage.getItem(storageKey);
          if (existing) return existing;

          const created = crypto.randomUUID();
          localStorage.setItem(storageKey, created);
          return created;
        }catch{
          return crypto.randomUUID();
        }
      }

      const browserUserId = getOrCreateClientUuid(PLAYER_ID_KEY);
      const browserSessionId = getOrCreateClientUuid(SESSION_ID_KEY);

      function saveActionToggleState(){
        try{
          localStorage.setItem(ACTION_TOGGLE_STORAGE_KEY, JSON.stringify(actionToggleState));
        }catch{}
      }

      function getActionStateKey(scope, action){
        if (!scope?.type || !scope?.key) return `unknown:${action}`;
        return `${scope.type}:${scope.key}:${action}`;
      }

      function isActionToggled(scope, action){
        return !!actionToggleState[getActionStateKey(scope, action)];
      }

      function setActionToggled(scope, action, value){
        actionToggleState[getActionStateKey(scope, action)] = !!value;
        saveActionToggleState();
      }

      function updateActionIcons(config){
        ["like", "comment", "favorite", "contact"].forEach((key) => {
          const iconEl = ACTION_ICON_ELEMENTS[key];
          if (!iconEl) return;

          const enabled = config?.[key]?.enabled !== false;
          const isOn = (key === "like" || key === "favorite")
            ? isActionToggled(currentActionScope, key)
            : false;

          const srcMap = ACTION_ICON_SRC[key];
          iconEl.src = isOn ? srcMap.on : srcMap.off;
          iconEl.style.opacity = enabled ? "1" : "0.45";
        });
      }

      function cloneActionEntry(entry, fallback){
        return { ...(fallback || {}), ...(entry || {}) };
      }

      function mergeActionConfigs(base, extra){
        const out = {};
        ["like", "comment", "favorite", "contact"].forEach((key) => {
          out[key] = cloneActionEntry(extra?.[key], base?.[key]);
        });
        return out;
      }

      function getActionScopeFromData(data, mode = currentMode){
        // 1) prioridad máxima: posición individual
        if (mode === "position" && data?.id){
          return {
            type: "position",
            key: String(data.id)
          };
        }

        // 2) item normal
        if (mode === "item" && data?.id){
          return {
            type: "item",
            key: String(data.id)
          };
        }

        // 3) challenge
        if (mode === "challenge" && data?.id){
          return {
            type: "challenge",
            key: String(data.id)
          };
        }

        // 4) fallback por slug
        if (mode === "item" && data?.slug){
          return {
            type: "item",
            key: normalizeSlug(data.slug)
          };
        }

        if (data?.slug){
          return {
            type: "challenge",
            key: normalizeSlug(data.slug)
          };
        }

        return {
          type: "challenge",
          key: "default"
        };
      }

      function resolveActionsForScope(scope){
        const defaults = ACTIONS_CONFIG.defaults;
        if (!scope) return mergeActionConfigs(defaults, null);

        const scoped = ACTIONS_CONFIG[scope.type]?.[scope.key] || null;
        const merged = mergeActionConfigs(defaults, scoped);

        // WhatsApp por defecto solo para productos/item reales
        // Nunca para desafío ni clasificaciones kamasutra/cadeira
        if (
          scope.type === "item" &&
          currentItem &&
          !isInstructionItem(currentItem) &&
          !getKamaMode(currentItem?.video || currentItem?.image || "")
        ){
          merged.contact.enabled = true;

          if (!merged.contact.url){
            merged.contact.url = DEFAULT_WHATSAPP_URL;
          }
        }

        return merged;
      }

      function shouldShowContactButton(scope){
        if (!scope) return false;

        if (scope.type === "challenge") return false;
        if (scope.type === "classification") return false;

        if (scope.type === "item" && currentItem){
          const isInstruction = isInstructionItem(currentItem);
          const mediaMode = getKamaMode(currentItem?.video || currentItem?.image || "");

          if (isInstruction) return false;
          if (mediaMode === "kamasutra" || mediaMode === "cadeira") return false;

          return true;
        }

        return false;
      }

      function renderActionRail(config){
        ["like", "comment", "favorite", "contact"].forEach((key) => {
          const ui = ACTION_ICON_MAP[key];
          const item = config?.[key] || {};

          let enabled = item.enabled !== false;

          if (key === "contact"){
            enabled = enabled && shouldShowContactButton(currentActionScope);
          }

          ui.wrap.classList.toggle("is-hidden", !enabled);
          ui.btn.disabled = !enabled;
          ui.btn.dataset.actionKey = key;

          if (key !== "contact"){
            ui.count.textContent = formatActionCount(item.count || 0);
          } else {
            ui.count.textContent = "";
          }
        });

        updateActionIcons(config);
      }

      async function refreshActionRail(data, mode = currentMode){
        currentActionScope = getActionScopeFromData(data, mode);
        actionState = resolveActionsForScope(currentActionScope);

        renderActionRail(actionState);

        const target = getCurrentTarget();
        const stats = await loadTargetStats(target);

        if (!stats){
          console.warn("[ACTION RAIL] no stats for target", target);
          return;
        }

        if (actionState?.like){
          actionState.like.count = Number(stats.like_count || 0);
        }

        if (actionState?.comment){
          actionState.comment.count = Number(stats.comment_count || 0);
        }

        if (actionState?.favorite){
          actionState.favorite.count = Number(stats.favorite_count || 0);
        }

        setActionToggled(currentActionScope, "like", !!stats.liked);
        setActionToggled(currentActionScope, "favorite", !!stats.favorited);

        renderActionRail(actionState);
      }
      function incrementActionCount(key){
        if (!actionState?.[key]) return;
        actionState[key].count = Number(actionState[key].count || 0) + 1;
        renderActionRail(actionState);
      }

      function toggleAction(key){
        if (key !== "like" && key !== "favorite") return;

        const current = isActionToggled(currentActionScope, key);
        const next = !current;
        setActionToggled(currentActionScope, key, next);

        if (actionState?.[key]){
          const currentCount = Number(actionState[key].count || 0);

          if (next){
            actionState[key].count = currentCount + 1;
          } else {
            actionState[key].count = Math.max(0, currentCount - 1);
          }
        }

        renderActionRail(actionState);
      }

      function executeConfiguredAction(key){
        const cfg = actionState?.[key];
        if (!cfg || cfg.enabled === false) return;

        if (key === "like"){
          handleLikeClick();
          return;
        }

        if (key === "favorite"){
          toggleAction("favorite");
          showToast(isActionToggled(currentActionScope, "favorite") ? "Salvo" : "Removido dos salvos");
          return;
        }

        if (key === "contact"){
          if (cfg.url){
            executeActionLink(cfg.url);
            return;
          }
          if (cfg.toast){
            showToast(cfg.toast);
          }
          return;
        }

        if (cfg.incrementOnTap) incrementActionCount(key);

        if (cfg.url){
          executeActionLink(cfg.url);
          return;
        }

        if (cfg.toast){
          showToast(cfg.toast);
        }
      }

      function clearKamasutraTimer(){
        if (kamasutraTimer){
          clearInterval(kamasutraTimer);
          kamasutraTimer = null;
        }
      }

      function resetKamasutraState(){
        clearKamasutraTimer();
        kamasutraState = null;
      }

      function getKamaMode(src){
        if (!src) return null;

        const value = String(src).trim().toLowerCase();

        if (value.startsWith("kamasutra://")) return "kamasutra";
        if (value.startsWith("cadeira://")) return "cadeira";

        return null;
      }

      function isKamasutraMedia(src){
        return !!getKamaMode(src);
      }

      function getParam(name, fallback = ""){
        const value = new URLSearchParams(window.location.search).get(name);
        return value ? value.trim() : fallback;
      }

      function isVideo(path){
        const p = (path || "").toLowerCase();
        return p.endsWith(".mp4") || p.endsWith(".webm") || p.endsWith(".ogg") || p.includes(".mp4?") || p.includes(".webm?") || p.includes(".ogg?");
      }

      function showToast(msg){
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1600);
      }

      function setLastViewed(data){
        if (!data) return;
        localStorage.setItem(LAST_VIEW_KEY, JSON.stringify({
          slug: data.slug || getParam("id", ""),
          title: data.title || "",
          ts: new Date().toISOString()
        }));
      }

      function formatTime(sec){
        if (!Number.isFinite(sec) || sec < 0) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${String(s).padStart(2, "0")}`;
      }

      function stopCurrentAudio(reset = true){
        try{
          hiddenAudio.pause();
          if (reset) hiddenAudio.currentTime = 0;
        }catch{}
        updatePlayUI();
      }

      function stopCurrentMediaVideo(reset = true){
        clearKamasutraTimer();
        if (!currentMediaVideoEl) return;
        try{
          currentMediaVideoEl.pause();
          if (reset) currentMediaVideoEl.currentTime = 0;
        }catch{}
      }

      function seekCurrentPlayableToStart(){
        if (currentMediaVideoEl){
          try{
            currentMediaVideoEl.currentTime = 0;
          }catch{}
        }

        if (hiddenAudio.src){
          try{
            hiddenAudio.currentTime = 0;
          }catch{}
        }

        currentTimeEl.textContent = "0:00";
        if (!hiddenAudio.loop) {
          progress.value = 0;
        }
      }

      function seekCurrentPlayableToEnd(){
        if (currentMediaVideoEl){
          try{
            const vdur = currentMediaVideoEl.duration;
            if (Number.isFinite(vdur) && vdur > 0){
              currentMediaVideoEl.currentTime = Math.max(0, vdur - 0.05);
            }
          }catch{}
        }

        if (hiddenAudio.src){
          try{
            if (hiddenAudio.loop){
              return;
            }

            const adur = hiddenAudio.duration;
            if (Number.isFinite(adur) && adur > 0){
              hiddenAudio.currentTime = Math.max(0, adur - 0.05);
              progress.value = 100;
              currentTimeEl.textContent = formatTime(adur);
            }
          }catch{}
        }
      }

      function updatePlayUI(){
        const isPlaying = !hiddenAudio.paused && !hiddenAudio.ended;
        playBtn.classList.toggle("is-playing", isPlaying);
        playIcon.style.display = isPlaying ? "none" : "block";
        pauseIcon.style.display = isPlaying ? "block" : "none";
      }

      function syncVideoToAudio(audioEl, videoEl){
        if (!audioEl || !videoEl) return;

        const playVideo = () => {
          videoEl.play().catch(() => {});
        };

        const pauseVideo = () => {
          try { videoEl.pause(); } catch {}
        };

        const resetVideo = () => {
          try {
            videoEl.pause();
            videoEl.currentTime = 0;
          } catch {}
        };

        audioEl.addEventListener("play", playVideo);
        audioEl.addEventListener("pause", pauseVideo);
        audioEl.addEventListener("ended", resetVideo);

        videoEl.addEventListener("ended", () => {
          if (!audioEl.paused && !audioEl.ended) {
            try { videoEl.currentTime = 0; } catch {}
            videoEl.play().catch(() => {});
          }
        });
      }

      function normalizeChallenge(raw, slug){
        if (!raw || typeof raw !== "object") return null;

        return {
          // 🔴 NUEVO: ID DEL DESAFÍO
          id: raw.id ?? null,

          slug,
          title: raw.title ?? "Desafío",
          category: raw.category ?? "",
          description: raw.description ?? "",
          presentation: raw.presentation ?? "",
          sku: raw.sku ?? "",
          media: raw.media ?? "",
          audio: raw.audio ?? "",
          back: raw.back ?? "index.html",
          next: raw.next ?? "",

          items: Array.isArray(raw.items)
            ? raw.items.map(item => ({
                ...item,

                // 🔴 NUEVO: ID DEL ITEM
                id: item?.id ?? null,

                action_link: item?.action_link ?? ""
              }))
            : []
        };
      }

      async function loadChallengeBySlug(slug){
        const { data, error } = await supabase.rpc(RPC_NAME, { p_slug: slug });
        if (error) throw error;
        return normalizeChallenge(data, slug);
      }

      function loadAudio(src, autoplay = true, isLoopMode = false){
        if (!src){
          hiddenAudio.removeAttribute("src");
          hiddenAudio.loop = false;
          hiddenAudio.load();
          playerWrap.hidden = true;
          progress.value = 0;
          currentTimeEl.textContent = "0:00";
          totalTimeEl.textContent = "0:00";
          progress.hidden = false;
          if (timeRow) timeRow.style.display = "";
          updatePlayUI();
          return;
        }

        hiddenAudio.src = src;
        hiddenAudio.loop = isLoopMode;
        hiddenAudio.load();
        playerWrap.hidden = false;
        progress.value = 0;
        currentTimeEl.textContent = "0:00";

        if (isLoopMode){
          totalTimeEl.textContent = "∞";
          progress.hidden = true;
          if (timeRow) timeRow.style.display = "none";
        } else {
          totalTimeEl.textContent = "0:00";
          progress.hidden = false;
          if (timeRow) timeRow.style.display = "";
        }

        updatePlayUI();

        if (autoplay){
          setTimeout(() => {
            hiddenAudio.play().catch(() => {});
          }, 120);
        }
      }

      async function loadKamasutraPositions(nivel){
        const { data, error } = await supabase.rpc(KAMASUTRA_RPC_NAME, {
            p_nivel: nivel,
            p_cadera: null
        });

        if (error){
          console.error("Error loading posiciones:", error);
          showToast("Error cargando posiciones");
          return [];
        }

        return Array.isArray(data?.data) ? data.data : [];
      }

      async function loadSVG(url){
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok){
          throw new Error(`No se pudo cargar SVG: ${url}`);
        }
        return await res.text();
      }

      function parseSVG(txt){
        const parser = new DOMParser();
        const doc = parser.parseFromString(txt, "image/svg+xml");
        const svg = doc.querySelector("svg");
        if (!svg) throw new Error("SVG inválido");
        return svg;
      }

      async function setLayer(layer, file){
        const svgText = await loadSVG(file);
        const svg = parseSVG(svgText);

        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
        svg.style.width = "100%";
        svg.style.height = "100%";
        svg.style.display = "block";
        svg.style.background = "transparent";

        layer.innerHTML = "";
        layer.appendChild(svg);
      }

      function renderKamasutraPlayer(audioSrc = "", mode = "kamasutra"){
        resetKamasutraState();
        mediaBox.innerHTML = "";

        const bgColor = mode === "cadeira" ? "#ffffff" : "#000000";

        const stage = document.createElement("div");
        stage.style.cssText = `
        width:100%;
        height:100%;
        position:relative;
        overflow:hidden;
        display:flex;
        align-items:center;
        justify-content:center;
        background:${bgColor};
        `;

        const layerA = document.createElement("div");
        const layerB = document.createElement("div");

        [layerA, layerB].forEach((layer, index) => {
          layer.style.cssText = `
            position:absolute;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            background:${bgColor};
            opacity:${index === 0 ? "1" : "0"};
            filter:${index === 0 ? "blur(0px)" : "blur(12px)"};
            transition:opacity 1.5s ease, filter 1.5s ease;
          `;
        });

        stage.appendChild(layerA);
        stage.appendChild(layerB);
        mediaBox.appendChild(stage);

        let currentLayer = layerA;
        let nextLayer = layerB;

        function buildGroups(posiciones){
          return [...new Set(posiciones.map(p => (p.grupo || "").trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));
        }

        function swapLayers(){
          currentLayer.innerHTML = "";
          [currentLayer, nextLayer] = [nextLayer, currentLayer];
        }

        async function showPositionInternal(pos){
          if (!pos) return;

          pTitle.textContent = pos.nombre || "";

          // 🔴 importante: esta vista ahora representa una posición individual
          currentMode = "position";

          await refreshActionRail({
            id: pos.id,
            slug: `position_${pos.id}`,
            title: pos.nombre,
            media: null,
            // 🔴 CRÍTICO
            targetType: "position",
            targetId: pos.id
          }, "position");

          try{
            await setLayer(nextLayer, pos.svg);
          }catch(err){
            console.error("Error rendering SVG:", err, pos);
            showToast("Error cargando SVG");
            return;
          }

          nextLayer.style.opacity = "1";
          nextLayer.style.filter = "blur(0px)";

          currentLayer.style.opacity = "0";
          currentLayer.style.filter = "blur(12px)";

          setTimeout(swapLayers, 1500);
        }
        function startLoop(){
          if (!kamasutraState?.isKamasutra) return;
          if (kamasutraTimer) return;

          kamasutraTimer = setInterval(() => {
            kamasutraState.nextRandom(false);
          }, KAMASUTRA_INTERVAL);
        }

        function stopLoop(){
          clearKamasutraTimer();
        }

        function shuffleArray(arr){
          const a = arr.slice();

          for (let i = a.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }

          return a;
        } 

        (async () => {
          const nivel = mode === "cadeira" ? 2 : 1;
          const posiciones = await loadKamasutraPositions(nivel);

          if (!posiciones.length){
            const empty = document.createElement("div");
            empty.style.cssText = `color:${mode === "cadeira" ? "rgba(0,0,0,0.45)" : "rgba(255,255,255,0.45)"};font-size:13px;text-align:center;padding:20px;`;
            empty.textContent = "No hay posiciones disponibles";
            mediaBox.innerHTML = "";
            mediaBox.appendChild(empty);
            if (typeof showKamaEye === "function") showKamaEye(false);
            return;
          }

          const groups = buildGroups(posiciones);

          kamasutraState = {
          isKamasutra: true,
          posiciones,
          filtered: shuffleArray(posiciones.slice()),
          groups,
          activeGroup: null,
          history: [],
          historyIndex: -1,
          playIndex: -1,
          showPosition: showPositionInternal,
          startLoop,
          stopLoop,

          getActiveList(){
            return (this.filtered && this.filtered.length) ? this.filtered : [];
          },

          async goToPosition(pos, pushToHistory = true){
            if (!pos) return;

            if (pushToHistory){
              if (this.historyIndex < this.history.length - 1){
                this.history = this.history.slice(0, this.historyIndex + 1);
              }
              this.history.push(pos);
              this.historyIndex = this.history.length - 1;
            }

            await this.showPosition(pos);
          },

          async nextRandom(fromUser = true){
            const list = this.getActiveList();
            if (!list.length) return;

            this.playIndex++;

            if (this.playIndex >= list.length){
              this.filtered = shuffleArray(list.slice());
              this.playIndex = 0;
            }

            const pos = this.filtered[this.playIndex];
            await this.goToPosition(pos, true);
          },

          async prev(){
            if (this.historyIndex > 0){
              this.historyIndex--;
              await this.showPosition(this.history[this.historyIndex]);
            }
          },

          async filterByGroup(group){
            this.activeGroup = group || null;

            const base = this.activeGroup
              ? this.posiciones.filter(p => (p.grupo || "").trim() === this.activeGroup)
              : this.posiciones.slice();

            this.filtered = shuffleArray(base);
            this.history = [];
            this.historyIndex = -1;
            this.playIndex = -1;

            await this.nextRandom(false);
          }
        };

        // ✅ mostrar primera posición inmediatamente
        await kamasutraState.nextRandom(false);

        // ✅ luego iniciar audio/loop
        if (audioSrc){
          loadAudio(audioSrc, true, true);
        } else {
          playerWrap.hidden = true;
          startLoop();
        }
        })();
      }

      function renderMedia(data){
        resetKamasutraState();
        mediaBox.innerHTML = "";
        currentMediaVideoEl = null;

        const src = data?.media || "";
        if (!src){
          const fallback = document.createElement("div");
          fallback.style.cssText = "width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.45);font-size:12px;";
          fallback.textContent = "Sin media";
          mediaBox.appendChild(fallback);
          return;
        }

        const kamaMode = getKamaMode(src);

        if (kamaMode){
          renderKamasutraPlayer(data?.audio || "", kamaMode);
          return;
        }

        if (isVideo(src)){
          const v = document.createElement("video");
          v.src = src;
          v.muted = true;
          v.autoplay = true;
          v.loop = false;
          v.playsInline = true;
          v.controls = false;
          v.preload = "auto";
          v.setAttribute("controlsList", "nodownload nofullscreen noremoteplayback");
          v.disablePictureInPicture = true;
          mediaBox.appendChild(v);
          currentMediaVideoEl = v;
          syncVideoToAudio(hiddenAudio, currentMediaVideoEl);
          return;
        }

        const img = document.createElement("img");
        img.src = src;
        img.alt = data.title || "Desafío";
        mediaBox.appendChild(img);
      }

      async function renderInfo(data){
        const isKamasutra = isKamasutraMedia(data?.media || "");
        pTitle.textContent = (data.title || "Desafío").toString();

        if (isKamasutra){
          pCat.style.display = "none";
        } else {
          pCat.style.display = "";
          pCat.textContent = (data.category || "").toString();
        }

        await refreshActionRail(data, currentMode);
      }

      function renderDescription(text){
        pShort.innerHTML = "";

        const activeMedia = currentMode === "item"
          ? (currentItem?.video || currentItem?.image || "")
          : (challenge?.media || "");

        const isKamasutra = isKamasutraMedia(activeMedia);

        if (isKamasutra){
          pShort.style.display = "none";
          return;
        }

        pShort.style.display = "";

        if (!text) return;

        const wrap = document.createElement("div");
        wrap.className = "audioCard";

        const audioTop = document.createElement("div");
        audioTop.className = "audioTop";
        audioTop.innerHTML = `<div class="audioLabel">${text}</div>`;

        wrap.appendChild(audioTop);
        pShort.appendChild(wrap);
      }

      function normalizeSlug(value){
        return String(value || "").trim().toLowerCase();
      }

      function isInstructionItem(item){
        const slug = normalizeSlug(item?.slug);
        return slug.startsWith("adicionales_");
      }

      function isInstructionExternalLinkItem(item){
        const slug = normalizeSlug(item?.slug);
        return slug.startsWith("adicionales_link_");
      }

      function getInstructionExternalUrl(item){
        return String(item?.video || "").trim();
      }

      function getAccessoryItems(){
        return Array.isArray(challenge?.items)
          ? challenge.items.filter(item => !isInstructionItem(item))
          : [];
      }

      function getInstructionItems(){
        return Array.isArray(challenge?.items)
          ? challenge.items.filter(item => isInstructionItem(item))
          : [];
      }

      function getOverlayConfig(mode){
        if (mode === "instructions"){
          return {
            title: "",
            emptyText: "No hay instrucciones disponibles",
            items: getInstructionItems()
          };
        }

        return {
          title: "",
          emptyText: "No hay accesorios recomendados",
          items: getAccessoryItems()
        };
      }

      function renderItems(items, emptyText = "No hay elementos disponibles"){
        itemsBody.innerHTML = "";

        if (!Array.isArray(items) || !items.length){
          itemsBody.innerHTML = `<div style="font-size:12px;color:rgba(255,255,255,0.55);">${emptyText}</div>`;
          return;
        }

        const groups = {};
        for (const item of items){
          const cat = item.category || "Otros";
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(item);
        }

        Object.keys(groups).forEach(category => {
          const title = document.createElement("div");
          title.style.cssText = `
            font-size:17px;
            font-weight:800;
            margin-top:10px;
            margin-bottom:2px;
            color:rgba(255,255,255,0.75);
            letter-spacing:-0.01em;
          `;
          title.textContent = category;
          itemsBody.appendChild(title);

          groups[category].forEach(item => {
            const card = document.createElement("div");
            card.className = "itemCard";
            card.addEventListener("click", () => handleOverlayItemSelection(item));

            const media = document.createElement("div");
            media.className = "itemMedia";

            const isExternalInstructionLink = isInstructionExternalLinkItem(item);
            const src = isExternalInstructionLink
              ? (item.image || "")
              : (item.image || item.video || "");

            if (src){
              if (isVideo(src)){
                const v = document.createElement("video");
                v.src = src;
                v.muted = true;
                v.loop = true;
                v.autoplay = true;
                v.playsInline = true;
                media.appendChild(v);
              } else {
                const img = document.createElement("img");
                img.src = src;
                img.alt = item.name || "Item";
                media.appendChild(img);
              }
            }

            const content = document.createElement("div");
            content.className = "itemContent";

            const hasActionLink = !!(item.action_link || "").trim();
            const isInstruction = isInstructionItem(item);

            content.innerHTML = `
              <p class="itemName">${item.name || ""}</p>
              ${isInstruction ? "" : `<p class="itemDesc">${item.description || ""}</p>`}
              <div class="itemMetaRow">
                ${!isExternalInstructionLink && hasActionLink ? '<span class="itemPill">Abrir enlace</span>' : ''}
              </div>
            `;

            card.appendChild(media);
            card.appendChild(content);
            itemsBody.appendChild(card);
          });
        });
      }

      function renderKamasutraGroupFilter(){
        itemsBody.innerHTML = "";

        if (!kamasutraState?.isKamasutra){
          itemsBody.innerHTML = `<div style="font-size:12px;color:rgba(255,255,255,0.55);">Modo no disponible</div>`;
          return;
        }

        const allCard = document.createElement("div");
        allCard.className = "itemCard";
        allCard.innerHTML = `
          <div class="itemContent">
            <p class="itemName">Todos los grupos</p>
            <div class="itemMetaRow">
              <span class="itemPill">${kamasutraState.posiciones.length} posiciones</span>
            </div>
          </div>
        `;
        allCard.addEventListener("click", async () => {
          await kamasutraState.filterByGroup(null);
          closeItemsPanel();
        });
        itemsBody.appendChild(allCard);

        kamasutraState.groups.forEach(group => {
          const count = kamasutraState.posiciones.filter(p => (p.grupo || "").trim() === group).length;

          const card = document.createElement("div");
          card.className = "itemCard";
          card.innerHTML = `
            <div class="itemContent">
              <p class="itemName">${group}</p>
              <div class="itemMetaRow">
                <span class="itemPill">${count} posiciones</span>
              </div>
            </div>
          `;

          card.addEventListener("click", async () => {
            await kamasutraState.filterByGroup(group);
            closeItemsPanel();
          });

          itemsBody.appendChild(card);
        });
      }

      function executeActionLink(url){
        const cleanUrl = (url || "").trim();
        if (!cleanUrl) return false;

        showToast("Abriendo enlace");

        const isExternal = /^(https?:|mailto:|tel:)/i.test(cleanUrl);
        if (isExternal){
          window.open(cleanUrl, "_blank", "noopener,noreferrer");
        } else {
          window.location.href = cleanUrl;
        }

        return true;
      }

      function handleOverlayItemSelection(item){
        closeItemsPanel();

        if (isInstructionExternalLinkItem(item)){
          const externalUrl = getInstructionExternalUrl(item);

          if (!externalUrl){
            showToast("Link no configurado");
            return;
          }

          executeActionLink(externalUrl);
          return;
        }

        const actionLink = (item?.action_link || "").trim();
        const hasPlayableContent = !!(item?.video || item?.image || item?.audio || item?.description);

        if (actionLink && !hasPlayableContent){
          executeActionLink(actionLink);
          return;
        }

        if (actionLink && currentOverlayMode === "instructions"){
          executeActionLink(actionLink);
          return;
        }

        selectItem(item);
      }

      function renderPlayer(data){
        renderDescription(data.description || "");
        loadAudio(data.audio || "", true, false);
      }

      async function selectItem(item){
        closeItemsPanel();
        currentMode = "item";
        currentItem = item;
        syncLayoutMode();
        stopCurrentAudio(false);
        stopCurrentMediaVideo(true);

        const isExternalInstructionLink = isInstructionExternalLinkItem(item);

        const mediaSrc = isExternalInstructionLink
          ? (item.image || "")
          : (item.video || item.image || "");

        const finalMedia = isInstructionItem(item)
          ? mediaSrc
          : mediaSrc;

        renderMedia({
          media: finalMedia,
          title: item.name,
          audio: item.audio || "",
          slug: item.slug || ""
        });

        await renderInfo({
          title: item.name || "Item",
          category: item.category || "",
          media: finalMedia,
          slug: item.slug || ""
        });

        renderPlayer({
          audio: item.audio || "",
          description: item.description || ""
        });
      }

      async function goToChallengeView(showMsg = false){
        if (!challenge) return;

        currentMode = "challenge";
        currentItem = null;
        syncLayoutMode();

        stopCurrentAudio(false);
        stopCurrentMediaVideo(true);

        renderMedia(challenge);
        await renderInfo(challenge);
        renderPlayer(challenge);
        updateBadge();
        closeItemsPanel();

        if (showMsg) showToast("Inicio");
      }

      function openItemsPanel(mode = "accessories"){
        currentOverlayMode = mode;

        if (mode === "kamasutra-groups"){
          document.getElementById("itemsTitle").textContent = "Filtrar por grupo";
          renderKamasutraGroupFilter();
        } else {
          const config = getOverlayConfig(mode);
          document.getElementById("itemsTitle").textContent = config.title;
          renderItems(config.items, config.emptyText);
        }

        itemsOverlay.classList.add("show");
        itemsOverlay.setAttribute("aria-hidden", "false");
        document.body.classList.add("modal-open");
      }

      function closeItemsPanel(){
        itemsOverlay.classList.remove("show");
        itemsOverlay.setAttribute("aria-hidden", "true");
        document.body.classList.remove("modal-open");
      }

      function isItemsPanelOpen(){
        return itemsOverlay.classList.contains("show");
      }

      function updateBadge(){
        const accessoriesCount = getAccessoryItems().length;
        const instructionsCount = getInstructionItems().length;

        cartBadge.textContent = String(accessoriesCount);
        instructionsBadge.textContent = String(instructionsCount);
      }

      function updateNavigation(){
        prevBtn.disabled = false;
        nextBtn.disabled = false;
      }

      function restartKamasutraTimer(){
        clearKamasutraTimer();

        if (kamasutraState?.isKamasutra){
          kamasutraState.startLoop();
        }
      }

      async function renderChallenge(){
        if (!challenge){
          mediaBox.innerHTML = "";
          const fallback = document.createElement("div");
          fallback.style.cssText = "width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.45);font-size:12px;padding:20px;text-align:center;";
          fallback.textContent = "No se pudo cargar el desafío.";
          mediaBox.appendChild(fallback);

          pTitle.textContent = "Sin datos";
          pCat.textContent = "";
          pShort.innerHTML = "";
          cartBadge.textContent = "0";
          instructionsBadge.textContent = "0";
          renderActionRail(resolveActionsForScope({ type: "challenge", key: "default" }));
          nextBtn.disabled = true;
          playerWrap.hidden = true;
          closeItemsPanel();
          if (typeof showKamaEye === "function") showKamaEye(false);
          shell.classList.remove("is-challenge");
          return;
        }

        await goToChallengeView(false);
        updateBadge();
        updateNavigation();
        setLastViewed(challenge);
      }

      [actionLikeBtn, actionCommentBtn, actionFavoriteBtn, actionContactBtn].forEach((btn) => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.actionKey;
          if (!key) return;
          executeConfiguredAction(key);
        });
      });

      hiddenAudio.addEventListener("loadedmetadata", () => {
        if (!hiddenAudio.loop){
          totalTimeEl.textContent = formatTime(hiddenAudio.duration || 0);
        }
        progress.value = 0;
      });

      hiddenAudio.addEventListener("timeupdate", () => {
        if (!isSeeking && !hiddenAudio.loop) {
          const duration = hiddenAudio.duration || 0;
          const current = hiddenAudio.currentTime || 0;
          const pct = duration > 0 ? (current / duration) * 100 : 0;
          progress.value = pct;
        }

        currentTimeEl.textContent = formatTime(hiddenAudio.currentTime || 0);

        if (!hiddenAudio.loop){
          totalTimeEl.textContent = formatTime(hiddenAudio.duration || 0);
        }

        updatePlayUI();
      });

      hiddenAudio.addEventListener("play", () => {
        updatePlayUI();
        if (kamasutraState?.isKamasutra){
          kamasutraState.startLoop();
        }
      });

      hiddenAudio.addEventListener("pause", () => {
        updatePlayUI();
        if (kamasutraState?.isKamasutra){
          kamasutraState.stopLoop();
        }
      });

      hiddenAudio.addEventListener("ended", () => {
        progress.value = 0;
        updatePlayUI();
        if (kamasutraState?.isKamasutra){
          kamasutraState.stopLoop();
        }
      });

      progress.addEventListener("input", () => {
        isSeeking = true;
      });

      progress.addEventListener("change", () => {
        const duration = hiddenAudio.duration || 0;
        if (duration > 0 && !hiddenAudio.loop) {
          hiddenAudio.currentTime = (Number(progress.value) / 100) * duration;
        }
        isSeeking = false;
      });

      playBtn.addEventListener("click", () => {
        if (!hiddenAudio.src) return;

        if (hiddenAudio.paused) {
          hiddenAudio.play().catch(() => {});
        } else {
          hiddenAudio.pause();
        }
      });

      prevBtn.addEventListener("click", async () => {
        if (kamasutraState?.isKamasutra){
          restartKamasutraTimer();
          await kamasutraState.prev();
          return;
        }

        seekCurrentPlayableToStart();
      });

      nextBtn.addEventListener("click", async () => {
        if (kamasutraState?.isKamasutra){
          restartKamasutraTimer();
          await kamasutraState.nextRandom(true);
          return;
        }

        seekCurrentPlayableToEnd();
      });

      cartBtn.addEventListener("click", () => {
        const count = getAccessoryItems().length;
        if (!count){
          showToast("No hay accesorios recomendados");
          return;
        }
        openItemsPanel("accessories");
      });

      instructionsBtn.addEventListener("click", () => {
        const count = getInstructionItems().length;
        if (!count){
          showToast("No hay instrucciones disponibles");
          return;
        }
        openItemsPanel("instructions");
      });

      itemsCloseBtn.addEventListener("click", closeItemsPanel);
      itemsBackdrop.addEventListener("click", closeItemsPanel);

      itemsPanel.addEventListener("click", (e) => {
        e.stopPropagation();
      });

      infoBtn.addEventListener("click", () => {
        if (!challenge) return;
        goToChallengeView(true);
      });

      const stage = document.getElementById("stage");
      let sx = 0, sy = 0, tracking = false;

      stage.addEventListener("touchstart", (e) => {
        if (isItemsPanelOpen()) return;
        if (!e.touches || !e.touches[0]) return;
        tracking = true;
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
      }, { passive: true });

      stage.addEventListener("touchend", (e) => {
        if (isItemsPanelOpen()) return;
        if (!tracking) return;
        tracking = false;

        const t = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
        if (!t) return;

        const dx = t.clientX - sx;
        const dy = t.clientY - sy;

        if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;

        if (kamasutraState?.isKamasutra){
          if (dx < 0){
            restartKamasutraTimer();
            kamasutraState.nextRandom(true);
          } else if (dx > 0){
            restartKamasutraTimer();
            kamasutraState.prev();
          }
          return;
        }

        if (dx < 0 && challenge?.next){
          stopCurrentAudio();
          stopCurrentMediaVideo();
          window.location.href = `player.html?id=${encodeURIComponent(challenge.next)}`;
          return;
        }

        if (dx > 0){
          stopCurrentAudio();
          stopCurrentMediaVideo();
          if (window.history.length > 1) window.history.back();
        }
      }, { passive: true });

      let wheelLock = false;
      stage.addEventListener("wheel", (e) => {
        if (isItemsPanelOpen()) return;

        e.preventDefault();
        if (wheelLock) return;

        const dy = e.deltaY || 0;
        if (Math.abs(dy) < 8) return;

        wheelLock = true;

        if (kamasutraState?.isKamasutra){
          if (dy > 0){
            restartKamasutraTimer();
            kamasutraState.nextRandom(true);
          } else {
            restartKamasutraTimer();
            kamasutraState.prev();
          }
        } else if (dy > 0 && challenge?.next){
          stopCurrentAudio();
          stopCurrentMediaVideo();
          window.location.href = `player.html?id=${encodeURIComponent(challenge.next)}`;
        } else if (dy < 0) {
          stopCurrentAudio();
          stopCurrentMediaVideo();
          if (window.history.length > 1) window.history.back();
        }

        setTimeout(() => {
          wheelLock = false;
        }, 220);
      }, { passive: false });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && isItemsPanelOpen()){
          closeItemsPanel();
          return;
        }

        if (!kamasutraState?.isKamasutra) return;

        if (e.key === "ArrowRight"){
          restartKamasutraTimer();
          kamasutraState.nextRandom(true);
        } else if (e.key === "ArrowLeft"){
          restartKamasutraTimer();
          kamasutraState.prev();
        }
      });

      async function init(){
        try{
          const slug = getParam("id", "");
          if (!slug){
            throw new Error("Falta el parámetro ?id=slug_del_desafio");
          }

          challenge = await loadChallengeBySlug(slug);

          if (!challenge){
            throw new Error(`No se encontró el desafío con slug: ${slug}`);
          }

          await renderChallenge();
        }catch(err){
          console.error("Error loading challenge:", err);
          challenge = null;
          await renderChallenge();
          showToast("Error cargando desafío");
        }
      }

      init();
    })();
  </script>
  
</body>
</html>
