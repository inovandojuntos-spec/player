<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redefinir senha | Inovando Juntos</title>

  <style>
    body{
      margin:0;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      color:rgba(255,255,255,.88);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      padding:20px;
    }

    .card{
      width:min(420px,100%);
      border:1px solid rgba(255,255,255,.12);
      border-radius:26px;
      padding:24px 20px;
      background:#0b0b0b;
      box-shadow:0 20px 70px rgba(0,0,0,.55);
    }

    h1{
      font-size:22px;
      margin:0 0 10px;
      text-align:center;
    }

    p{
      color:rgba(255,255,255,.56);
      font-size:13px;
      text-align:center;
      line-height:1.45;
      margin:0 0 20px;
    }

    label{
      display:block;
      font-size:12px;
      font-weight:800;
      color:rgba(255,255,255,.45);
      text-transform:uppercase;
      margin-bottom:7px;
    }

    input{
      width:100%;
      box-sizing:border-box;
      min-height:52px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:17px;
      background:rgba(255,255,255,.06);
      color:#fff;
      padding:0 15px;
      font-size:16px;
      font-weight:650;
      outline:none;
    }

    input:focus{
      border-color:rgba(255,255,255,.35);
      background:rgba(255,255,255,.09);
    }

    button{
      width:100%;
      min-height:54px;
      margin-top:16px;
      border:0;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      color:#000;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .status{
      display:none;
      margin-top:14px;
      border-radius:15px;
      padding:11px 12px;
      font-size:13px;
      line-height:1.38;
    }

    .status.show{ display:block; }

    .status.error{
      color:#ff6b6b;
      background:rgba(255,107,107,.08);
      border:1px solid rgba(255,107,107,.28);
    }

    .status.ok{
      color:#7ee787;
      background:rgba(126,231,135,.07);
      border:1px solid rgba(126,231,135,.26);
    }

    .status.info{
      color:#f2d675;
      background:rgba(242,214,117,.08);
      border:1px solid rgba(242,214,117,.22);
    }


    .version-badge{
      margin:0 auto 14px;
      width:max-content;
      max-width:100%;
      padding:7px 12px;
      border-radius:999px;
      color:#67e8f9;
      background:rgba(103,232,249,.10);
      border:1px solid rgba(103,232,249,.45);
      font-size:11px;
      font-weight:900;
      letter-spacing:.3px;
      text-align:center;
    }

    .cache-note{
      margin:12px 0 0;
      color:rgba(255,255,255,.45);
      font-size:11px;
      text-align:center;
    }
  </style>
</head>

<body>
  <section class="card">
    <div class="version-badge" id="versionBadge">VERSÃO v2026-06-14-RESET-03-CYAN</div>
    <h1>Redefinir senha</h1>
    <p>Digite sua nova senha para atualizar o acesso à sua conta.</p>

    <form id="resetForm">
      <label for="password">Nova senha</label>
      <input id="password" type="password" minlength="6" required placeholder="Mínimo 6 caracteres" autocomplete="new-password" />

      <label for="confirmPassword" style="margin-top:13px;">Confirmar senha</label>
      <input id="confirmPassword" type="password" minlength="6" required placeholder="Repita a nova senha" autocomplete="new-password" />

      <button id="submitBtn" type="submit">Atualizar senha</button>
    </form>

    <div class="status" id="statusBox"></div>
    <div class="cache-note">Se não aparecer <strong>v2026-06-14-RESET-03-CYAN</strong>, atualize a página antes de redefinir.</div>
  </section>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://rsordtljnvxonaygyuxd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";
    const PAGE_VERSION = "v2026-06-14-RESET-03-CYAN";
    console.log("[RESET PASSWORD PAGE VERSION]", PAGE_VERSION);

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const resetForm = document.getElementById("resetForm");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("statusBox");

    let recoveryReady = false;
    let recoverySource = "none";

    supabase.auth.onAuthStateChange((event, session) => {
      console.log("[AUTH EVENT]", event, !!session);
      if (event === "PASSWORD_RECOVERY" && session){
        recoveryReady = true;
        recoverySource = "PASSWORD_RECOVERY";
        showStatus("Link validado. Digite sua nova senha.", "ok");
      }
    });

    await initRecoverySession();

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const password = passwordEl.value.trim();
      const confirmPassword = confirmPasswordEl.value.trim();

      if (!password || password.length < 6){
        showStatus("A senha deve ter pelo menos 6 caracteres.", "error");
        return;
      }

      if (password !== confirmPassword){
        showStatus("As senhas não coincidem.", "error");
        return;
      }

      setBusy(true);

      try{
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError){
          console.error("[GET SESSION ERROR]", sessionError);
          throw sessionError;
        }

        /*
          Regla simple:
          - El link de Supabase debe producir una session temporal.
          - No validamos manualmente token/type contra Supabase.
          - Si no hay session, no existe autorización para cambiar password.
        */
        if (!session || !recoveryReady){
          showStatus("Link inválido ou expirado. Solicite um novo link de redefinição.", "error");
          return;
        }

        const { error } = await supabase.auth.updateUser({ password });

        if (error){
          console.error("[UPDATE PASSWORD ERROR]", error);
          throw error;
        }

        await supabase.auth.signOut();

        showStatus("Senha atualizada com sucesso. Redirecionando...", "ok");

        setTimeout(() => {
          window.location.replace("/login.html");
        }, 1200);
      }catch(err){
        console.error("[RESET PASSWORD ERROR]", err);
        showStatus("Não foi possível atualizar sua senha. Solicite um novo link.", "error");
      }finally{
        setBusy(false);
      }
    });

    async function initRecoverySession(){
      setBusy(true);
      showStatus(`Validando link de recuperação... ${PAGE_VERSION}`, "info");

      try{
        const url = new URL(window.location.href);
        const code = url.searchParams.get("code");

        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const hashAccessToken = hashParams.get("access_token");
        const hashRefreshToken = hashParams.get("refresh_token");
        const hashType = hashParams.get("type");

        const hasRecoveryMarker =
          !!code ||
          hashType === "recovery" ||
          (!!hashAccessToken && !!hashRefreshToken);

        if (!hasRecoveryMarker){
          recoveryReady = false;
          recoverySource = "missing_recovery_marker";
          showStatus("Abra esta página usando o link recebido por e-mail.", "error");
          return;
        }

        /*
          Caso PKCE: Supabase redireciona para /reset-password.html?code=...
          Usamos exchangeCodeForSession UMA vez. Se o SDK já tiver processado,
          fazemos fallback para getSession em vez de declarar expirado imediatamente.
        */
        if (code){
          const { error } = await supabase.auth.exchangeCodeForSession(code);

          if (error){
            console.warn("[EXCHANGE CODE WARNING - checking session fallback]", error);
          }else{
            recoverySource = "code";
          }
        }

        /*
          Caso implicit/hash: Supabase redireciona com #access_token=...&type=recovery
          detectSessionInUrl:true normalmente monta a sessão automaticamente.
        */
        if (hashAccessToken){
          recoverySource = "hash";
        }

        const session = await waitForSessionFromUrl();

        if (!session){
          recoveryReady = false;
          recoverySource = "no_session";
          showStatus("Link inválido ou expirado. Solicite um novo link de redefinição.", "error");
          return;
        }

        recoveryReady = true;
        cleanUrl();
        showStatus("Link validado. Digite sua nova senha.", "ok");
        console.log("[RECOVERY READY]", recoverySource || "session");
      }catch(err){
        console.error("[INIT RECOVERY ERROR]", err);
        recoveryReady = false;
        showStatus("Link inválido ou expirado. Solicite um novo link de redefinição.", "error");
      }finally{
        setBusy(false);
      }
    }

    async function waitForSessionFromUrl(){
      for (let i = 0; i < 20; i++){
        const { data: { session }, error } = await supabase.auth.getSession();

        if (error){
          console.warn("[WAIT SESSION WARNING]", error);
        }

        if (session) return session;
        await new Promise(resolve => setTimeout(resolve, 150));
      }

      return null;
    }

    function cleanUrl(){
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    function setBusy(isBusy){
      submitBtn.disabled = isBusy;
      passwordEl.disabled = isBusy;
      confirmPasswordEl.disabled = isBusy;
      submitBtn.textContent = isBusy ? "Processando..." : "Atualizar senha";
    }

    function showStatus(message, type = ""){
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`.trim();
    }
  </script>
</body>
</html>
