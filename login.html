<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Login | Inovando Juntos</title>

  <style>
    :root{
      --bg:#000;
      --card:#0b0b0b;
      --edge:rgba(255,255,255,.10);
      --edge2:rgba(255,255,255,.18);
      --text:rgba(255,255,255,.88);
      --muted:rgba(255,255,255,.56);
      --soft:rgba(255,255,255,.36);
      --accent:rgba(255,255,255,.90);
      --danger:#ff6b6b;
      --ok:#7ee787;
      --shadow:rgba(0,0,0,.78);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html,body{
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{ overflow:hidden; }

    .app{
      width:100vw;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px 16px calc(22px + env(safe-area-inset-bottom,0px));
      background:
        radial-gradient(70% 45% at 50% 0%, rgba(255,255,255,.10), rgba(255,255,255,.025) 48%, rgba(0,0,0,0) 78%),
        #000;
    }

    .card{
      width:min(420px,100%);
      border:1px solid var(--edge);
      border-radius:28px;
      padding:24px 20px 20px;
      background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)), var(--card);
      box-shadow:0 28px 80px var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .logoWrap{
      display:flex;
      justify-content:center;
      margin-bottom:18px;
    }

    .logoWrap img{
      width:78px;
      height:78px;
      object-fit:contain;
      opacity:.95;
    }

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      padding:5px;
      border:1px solid var(--edge);
      border-radius:999px;
      background:rgba(255,255,255,.045);
      margin-bottom:20px;
    }

    .tabBtn{
      min-height:43px;
      border:0;
      border-radius:999px;
      background:transparent;
      color:var(--muted);
      font-size:14px;
      font-weight:850;
      cursor:pointer;
    }

    .tabBtn.active{
      background:var(--accent);
      color:#000;
      box-shadow:0 10px 22px rgba(0,0,0,.35);
    }

    .copy{
      margin:0 auto 18px;
      max-width:31ch;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      text-align:center;
    }

    .form{
      display:flex;
      flex-direction:column;
      gap:13px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
    }

    .field.is-hidden{
      display:none;
    }

    #activationCode{
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .label{
      padding-left:2px;
      color:var(--soft);
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .inputWrap{ position:relative; }

    input{
      width:100%;
      min-height:52px;
      border:1px solid var(--edge);
      border-radius:17px;
      outline:none;
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:0 46px 0 15px;
      font-size:16px;
      font-weight:650;
      transition:border-color .14s ease, background .14s ease, box-shadow .14s ease;
    }

    input::placeholder{ color:rgba(255,255,255,.32); font-weight:500; }

    input:focus{
      border-color:rgba(255,255,255,.30);
      background:rgba(255,255,255,.085);
      box-shadow:0 0 0 4px rgba(255,255,255,.055);
    }

    .togglePass{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:38px;
      height:38px;
      border:0;
      border-radius:12px;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .togglePass svg{
      width:22px;
      height:22px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-linejoin:round;
    }


    .checkField{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:2px 2px 0;
      color:var(--muted);
      font-size:12.5px;
      line-height:1.35;
    }

    .checkField.is-hidden{
      display:none;
    }

    .checkField input[type="checkbox"]{
      width:18px;
      min-width:18px;
      height:18px;
      min-height:18px;
      margin:1px 0 0;
      padding:0;
      accent-color:#fff;
      cursor:pointer;
    }

    .checkField label{
      cursor:pointer;
      user-select:none;
    }

    .primaryBtn{
      width:100%;
      min-height:54px;
      margin-top:7px;
      border:0;
      border-radius:999px;
      background:var(--accent);
      color:#000;
      cursor:pointer;
      font-size:15px;
      font-weight:900;
      letter-spacing:-.01em;
      box-shadow:0 16px 34px rgba(0,0,0,.42);
      transition:transform .10s ease, opacity .12s ease;
    }

    .primaryBtn:active{ transform:scale(.99); }
    .primaryBtn:disabled{ opacity:.45; cursor:not-allowed; transform:none; }

    .status{
      display:none;
      margin-top:14px;
      border:1px solid var(--edge);
      border-radius:15px;
      padding:11px 12px;
      background:rgba(255,255,255,.055);
      color:var(--muted);
      font-size:13px;
      line-height:1.38;
    }

    .status.show{ display:block; }
    .status.error{
      border-color:rgba(255,107,107,.28);
      color:var(--danger);
      background:rgba(255,107,107,.08);
    }
    .status.ok{
      border-color:rgba(126,231,135,.26);
      color:var(--ok);
      background:rgba(126,231,135,.07);
    }

    @media (max-width:390px){
      .card{ border-radius:24px; padding:22px 17px 18px; }
      .logoWrap img{ width:70px; height:70px; }
      .copy{ font-size:12.5px; }
    }

    @media (max-height:680px){
      body{ overflow:auto; }
      .app{ align-items:flex-start; }
      .logoWrap{ margin-bottom:12px; }
      .logoWrap img{ width:64px; height:64px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="card" aria-label="Acesso Inovando Juntos">
      <div class="logoWrap">
        <img src="images/logo.png" alt="Inovando Juntos" />
      </div>

      <div class="tabs" role="tablist" aria-label="Modo de acesso">
        <button class="tabBtn active" id="loginTab" type="button" role="tab" aria-selected="true">Entrar</button>
        <button class="tabBtn" id="registerTab" type="button" role="tab" aria-selected="false">Criar conta</button>
      </div>

      <p class="copy" id="modeCopy">Acesse sua conta para continuar.</p>

      <form class="form" id="authForm" novalidate>
        <div class="field">
          <label class="label" for="email">Email</label>
          <div class="inputWrap">
            <input id="email" name="email" type="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>
        </div>

        <div class="field">
          <label class="label" for="password">Senha</label>
          <div class="inputWrap">
            <input id="password" name="password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password" minlength="6" required />
            <button class="togglePass" id="togglePassBtn" type="button" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="field is-hidden" id="activationCodeField">
          <label class="label" for="activationCode">Código de ativação</label>
          <div class="inputWrap">
            <input id="activationCode" name="activationCode" type="text" placeholder="Digite seu código" autocomplete="one-time-code" inputmode="text" />
          </div>
        </div>

        <div class="checkField is-hidden" id="ageConfirmField">
          <input id="ageConfirm" name="ageConfirm" type="checkbox" />
          <label for="ageConfirm">Declaro que tenho 18 anos ou mais e aceito acessar este conteúdo.</label>
        </div>

        <button class="primaryBtn" id="submitBtn" type="submit">Entrar</button>
      </form>

      <div class="status" id="statusBox" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://rsordtljnvxonaygyuxd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const params = new URLSearchParams(window.location.search);
    const redirect = sanitizeRedirect(params.get("redirect") || "/play.html?id=intro");

    const authForm = document.getElementById("authForm");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const activationCodeField = document.getElementById("activationCodeField");
    const activationCodeEl = document.getElementById("activationCode");
    const ageConfirmField = document.getElementById("ageConfirmField");
    const ageConfirmEl = document.getElementById("ageConfirm");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("statusBox");
    const togglePassBtn = document.getElementById("togglePassBtn");
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const modeCopy = document.getElementById("modeCopy");

    let mode = "login";

    init();

    loginTab.addEventListener("click", () => setMode("login"));
    registerTab.addEventListener("click", () => setMode("register"));

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (mode === "register") await register();
      else await login();
    });

    togglePassBtn.addEventListener("click", () => {
      const isPassword = passwordEl.type === "password";
      passwordEl.type = isPassword ? "text" : "password";
      togglePassBtn.setAttribute("aria-label", isPassword ? "Ocultar senha" : "Mostrar senha");
    });

    async function init(){
      setBusy(true, "Verificando sessão...");

      try{
        const { data: sessionData, error: sessionError } = await supabase.auth.getSession();
        if (sessionError) throw sessionError;

        if (sessionData?.session?.user){
          const { data: userData, error: userError } = await supabase.auth.getUser();

          if (userError || !userData?.user){
            console.warn("[AUTH USER INVALID] Limpando sessão local para evitar loop.", userError);
            await supabase.auth.signOut({ scope: "local" }).catch(() => {});
            clearStatus();
            return;
          }

          window.location.replace(redirect);
          return;
        }

        clearStatus();
      }catch(err){
        showStatus("Não foi possível verificar a sessão. Tente novamente.", "error");
        console.error("[AUTH SESSION ERROR]", err);
      }finally{
        setBusy(false);
      }
    }

    function setMode(nextMode){
      mode = nextMode;
      const isRegister = mode === "register";

      loginTab.classList.toggle("active", !isRegister);
      registerTab.classList.toggle("active", isRegister);
      loginTab.setAttribute("aria-selected", String(!isRegister));
      registerTab.setAttribute("aria-selected", String(isRegister));

      submitBtn.textContent = isRegister ? "Criar conta" : "Entrar";
      modeCopy.textContent = isRegister
        ? "Crie sua conta e informe seu código de ativação."
        : "Acesse sua conta para continuar.";

      passwordEl.autocomplete = isRegister ? "new-password" : "current-password";
      activationCodeField.classList.toggle("is-hidden", !isRegister);
      activationCodeEl.required = isRegister;
      activationCodeEl.disabled = !isRegister;

      ageConfirmField.classList.toggle("is-hidden", !isRegister);
      ageConfirmEl.required = isRegister;
      ageConfirmEl.disabled = !isRegister;

      if (!isRegister) {
        activationCodeEl.value = "";
        ageConfirmEl.checked = false;
      }

      clearStatus();
    }

    async function login(){
      const credentials = getCredentials();
      if (!credentials) return;

      setBusy(true, "Entrando...");

      try{
        const { error } = await supabase.auth.signInWithPassword(credentials);
        if (error) throw error;

        showStatus("Acesso realizado. Redirecionando...", "ok");
        window.location.replace(redirect);
      }catch(err){
        showStatus(getFriendlyAuthError(err), "error");
        console.error("[LOGIN ERROR]", err);
      }finally{
        setBusy(false);
      }
    }

    async function register(){
      const credentials = getCredentials();
      if (!credentials) return;

      const activationCode = getActivationCode();
      if (!activationCode) return;

      if (!getAgeConfirmation()) return;

      setBusy(true, "Criando conta...");

      try{
        showStatus("Validando código de ativação...");
        const preCheck = await checkActivationCodeAvailable(activationCode);
        if (!preCheck?.ok){
          throw new Error(preCheck?.message || "Código de ativação inválido.");
        }

        showStatus("Criando conta...");
        const { data, error } = await supabase.auth.signUp({
          ...credentials,
          options: {
            emailRedirectTo: window.location.origin + redirect
          }
        });

        if (error) throw error;

        const userId = data?.user?.id;
        if (!userId){
          throw new Error("Conta criada, mas não foi possível identificar o usuário para ativação.");
        }

        showStatus("Conta criada. Validando código de ativação...");

        const activationResult = await activateProfile(userId, activationCode);
        if (!activationResult?.ok){
          throw new Error(activationResult?.message || "Não foi possível ativar o perfil.");
        }

        emailEl.value = "";
        passwordEl.value = "";
        activationCodeEl.value = "";
        ageConfirmEl.checked = false;

        if (data?.session){
          showStatus("Conta criada e ativada. Redirecionando...", "ok");
          window.location.replace(redirect);
          return;
        }

        showStatus("Conta criada e ativada. Agora entre com seu email e senha.", "ok");
        setMode("login");
      }catch(err){
        showStatus(getFriendlyAuthError(err), "error");
        console.error("[REGISTER ERROR]", err);
      }finally{
        setBusy(false);
      }
    }

    async function activateProfile(userId, activationCode){
      const { data, error } = await supabase.rpc("activate_profile_with_code", {
        p_user_id: userId,
        p_code: activationCode
      });

      if (error) throw error;
      return data;
    }

    async function checkActivationCodeAvailable(activationCode){
      const { data, error } = await supabase.rpc("check_activation_code_available", {
        p_code: activationCode
      });

      if (error) throw error;
      return data;
    }


    function getAgeConfirmation(){
      if (!ageConfirmEl.checked){
        showStatus("Confirme que você tem 18 anos ou mais para criar a conta.", "error");
        ageConfirmEl.focus();
        return false;
      }

      return true;
    }

    function getActivationCode(){
      const activationCode = activationCodeEl.value.trim().toUpperCase();

      if (!activationCode){
        showStatus("Informe um código de ativação.", "error");
        activationCodeEl.focus();
        return null;
      }

      return activationCode;
    }

    function getCredentials(){
      const email = emailEl.value.trim().toLowerCase();
      const password = passwordEl.value;

      if (!email){
        showStatus("Digite seu email.", "error");
        emailEl.focus();
        return null;
      }

      if (!emailEl.validity.valid){
        showStatus("O email informado não é válido.", "error");
        emailEl.focus();
        return null;
      }

      if (!password || password.length < 6){
        showStatus("A senha deve ter pelo menos 6 caracteres.", "error");
        passwordEl.focus();
        return null;
      }

      return { email, password };
    }

    function sanitizeRedirect(value){
      const fallback = "/play.html?id=intro";
      const raw = String(value || "").trim();

      if (!raw) return fallback;

      let clean = raw;

      if (/^https?:\/\//i.test(raw)){
        try{
          const url = new URL(raw);
          if (url.origin !== window.location.origin) return fallback;
          clean = url.pathname + url.search + url.hash;
        }catch{
          return fallback;
        }
      }

      if (!clean.startsWith("/")) return fallback;
      if (clean.startsWith("//")) return fallback;

      // Evita que login se redirija a sí mismo y cree bucle visual.
      const pathOnly = clean.split("?")[0].split("#")[0].toLowerCase();
      if (pathOnly.endsWith("/login.html")){
        return fallback;
      }

      return clean;
    }

    function setBusy(isBusy, message = ""){
      submitBtn.disabled = isBusy;
      emailEl.disabled = isBusy;
      passwordEl.disabled = isBusy;
      activationCodeEl.disabled = isBusy || mode !== "register";
      ageConfirmEl.disabled = isBusy || mode !== "register";
      loginTab.disabled = isBusy;
      registerTab.disabled = isBusy;

      if (isBusy){
        submitBtn.textContent = "Processando...";
      }else{
        submitBtn.textContent = mode === "register" ? "Criar conta" : "Entrar";
      }

      if (message) showStatus(message);
    }

    function showStatus(message, type = ""){
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`.trim();
    }

    function clearStatus(){
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function getFriendlyAuthError(error){
      const msg = String(error?.message || "Erro de autenticação");

      if (/invalid login credentials/i.test(msg)){
        return "Email ou senha incorretos.";
      }

      if (/email not confirmed/i.test(msg)){
        return "Seu email ainda não está liberado para acesso.";
      }

      if (/user already registered|already registered/i.test(msg)){
        setMode("login");
        return "Este email já está registrado. Entre com sua senha.";
      }

      if (/perfil_nao_encontrado/i.test(msg)){
        return "Perfil de usuário não encontrado. Verifique se o gatilho de criação de perfil está ativo.";
      }

      return msg;
    }

    window.login = login;
    window.register = register;
  </script>
</body>
</html>
