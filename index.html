<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Inovando Juntos</title>

<style>
  html, body{
    margin:0;
    padding:0;
    height:100%;
    background:#000;
    overflow:hidden;
  }

  .video-container{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
  }

  video{
    width:100%;
    height:100%;
    object-fit:cover; /* clave para look premium */
  }
</style>
</head>

<body>

<div class="video-container">
  <video 
    src="images/InovandoJuntos.mp4" 
    autoplay 
   
    loop 
    playsinline 
    controls>
  </video>
</div>

</body>
</html>
