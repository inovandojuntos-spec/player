<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Inovando Juntos</title>

  <style>
    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
    }

    .video-container{
      position:fixed;
      inset:0;
      width:100vw;
      height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .start-overlay{
      position:absolute;
      inset:0;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.20);
      cursor:pointer;
    }

    .start-button{
      border:1px solid rgba(255,255,255,0.25);
      background:rgba(0,0,0,0.55);
      color:#fff;
      padding:14px 22px;
      border-radius:999px;
      font-size:16px;
      font-family:Arial, sans-serif;
      letter-spacing:0.4px;
      backdrop-filter:blur(4px);
    }
  </style>
</head>

<body>

  <div class="video-container" id="container">
    <video
      id="vid"
      src="images/InovandoJuntos.mp4"
      loop
      playsinline
      webkit-playsinline
      preload="metadata">
    </video>

    <div class="start-overlay" id="startOverlay" onclick="activarExperiencia()">
      <div class="start-button">Toque para iniciar</div>
    </div>
  </div>

  <script>
    // =========================
    // CONFIG
    // =========================
    const EVENTS_ENDPOINT = "https://rsordtljnvxonaygyuxd.supabase.co/functions/v1/IJ_events";
    const SUPABASE_ANON_KEY = "sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";

    const PROFILE_KEY = "player_profile";
    const SESSION_KEY = "player_session";

    // =========================
    // UTILS
    // =========================
    function uuid() {
      return (crypto.randomUUID
        ? crypto.randomUUID()
        : String(Date.now()) + "-" + Math.random().toString(16).slice(2));
    }

    function safeJSONParse(v){
      try { return JSON.parse(v); } catch { return null; }
    }

    function getProfile(){
      return safeJSONParse(localStorage.getItem(PROFILE_KEY));
    }

    function getSession(){
      return safeJSONParse(sessionStorage.getItem(SESSION_KEY));
    }

    function ensureSession(){
      let s = getSession();
      if (!s || !s.session_id){
        s = {
          session_id: uuid(),
          started_at: new Date().toISOString()
        };
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(s));
      }
      return s;
    }

    function getOrCreatePlayerId(){
      const profile = getProfile();

      if (profile && profile.player_id){
        return profile.player_id;
      }

      let id = localStorage.getItem("ij_player_id");
      if (!id){
        id = uuid();
        localStorage.setItem("ij_player_id", id);
      }

      return id;
    }

    async function sendEvent(eventName, extraPayload = {}) {
      try {
        const profile = getProfile();
        const session = ensureSession();

        const payload = {
          player_id: getOrCreatePlayerId(),
          session_id: session.session_id,

          profile_name: profile?.name || null,
          profile_contact: profile?.contact || null,

          event_type: "video",
          event_name: eventName,

          event_source: "video=index.html",
          event_version: 1,

          page_url: window.location.href,
          referrer: document.referrer || null,

          data1: "inovando_video",
          data2: new Date().toISOString(),

          payload: {
            video_src: document.getElementById("vid").currentSrc,
            ...extraPayload
          }
        };

        const res = await fetch(EVENTS_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok){
          const txt = await res.text();
          console.error("Error backend:", res.status, txt);
        }

      } catch (e) {
        console.error("Error enviando evento:", e);
      }
    }

    // =========================
    // VIDEO LOGIC
    // =========================
    const v = document.getElementById("vid");
    const overlay = document.getElementById("startOverlay");
    const container = document.getElementById("container");

    let playSent = false;

    async function activarExperiencia() {
      try {
        v.muted = false;
        v.volume = 1;

        await v.play();

        overlay.style.display = "none";

        // 🔥 SOLO UNA VEZ
        if (!playSent){
          playSent = true;
          sendEvent("video_play", {
            current_time: v.currentTime,
            duration: v.duration || null
          });
        }

        // fullscreen
        if (container.requestFullscreen) {
          await container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        }

      } catch (error) {
        console.error("No se pudo iniciar la experiencia:", error);

        sendEvent("video_error", {
          message: String(error)
        });
      }
    }

    // =========================
    // EVENTO: VIDEO TERMINADO
    // =========================
    v.addEventListener("ended", () => {
      sendEvent("video_completed", {
        duration: v.duration,
        final_time: v.currentTime
      });
    });

  </script>

</body>
</html>
