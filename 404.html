<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Redirecionando...</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://rsordtljnvxonaygyuxd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const parts = window.location.pathname
      .split("/")
      .map(p => p.trim())
      .filter(Boolean);

    const slug = parts[parts.length - 1];

    const INTRO_URL = "/play.html?id=intro";
    const INTRO_PUBLIC_URL = "/play/intro";

    function goNotFound(){
      document.body.innerHTML = "Página no encontrada";
    }

    // Aceita tanto /play/<slug> (rota antiga) quanto a URL direta da raspadinha /<slug>
    const slugLc = (slug || "").toLowerCase();
    const isIntro = slugLc === "intro";
    const isDesafio = /^desafio[_-]?\w+/i.test(slugLc);

    async function main(){
      if (!slugLc || (!isIntro && !isDesafio)) {
        goNotFound();
        return;
      }

      const targetUrl = `/play.html?id=${encodeURIComponent(slugLc)}`;

      try {
        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;

        const isLogged = !!data?.session?.user;

        // INTRO: se não está logado pode criar conta; login.html devolve a INTRO_URL.
        if (isIntro) {
          if (isLogged) {
            window.location.replace(INTRO_URL);
            return;
          }
          window.location.replace(
            `/login.html?mode=register&redirect=${encodeURIComponent(INTRO_URL)}`
          );
          return;
        }

        // DESAFIO: esta URL só existe a partir do QR da raspadinha.
        // Se já está logado -> marcamos como DESBLOQUEADO (play_count++) e abrimos o player.
        if (isLogged) {
          try {
            await supabase.rpc("mark_desafio_played_by_slug", { p_slug: slugLc });
          } catch (e) {
            console.error("[MARK SCAN ERROR]", e);
          }
          window.location.replace(targetUrl);
          return;
        }

        // Sem login: redireciona para criar conta. Após o cadastro, login.html
        // devolve para a URL do desafio escaneado, que então é liberado.
        window.location.replace(
          `/login.html?mode=register&redirect=${encodeURIComponent("/" + slugLc)}`
        );

      } catch (err) {
        console.error("[404 AUTH CHECK ERROR]", err);
        window.location.replace(INTRO_PUBLIC_URL);
      }
    }

    main();
  </script>
</head>

<body>
  Redirecionando...
</body>
</html>
