<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Inovando Juntos</title>

<style>
  html, body{
    margin:0;
    padding:0;
    height:100%;
    background:#000;
    overflow:hidden;
  }

  .video-container{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100dvh; /* mejor que 100vh en móvil */
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
  }

  video{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  /* overlay invisible para interacción */
  .overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:10;
    cursor:pointer;
  }
</style>
</head>

<body>

<div class="video-container">

  <video 
    id="vid"
    src="images/InovandoJuntos.mp4"
    loop
    playsinline
    webkit-playsinline>
  </video>

  <div class="overlay" onclick="activarExperiencia()"></div>

</div>

<script>
function activarExperiencia(){
  const v = document.getElementById("vid");

  // 🔊 activar sonido
  v.muted = false;
  v.play().catch(()=>{});

  // 🖥 fullscreen (si el navegador lo permite)
  if (v.requestFullscreen) {
    v.requestFullscreen().catch(()=>{});
  } else if (v.webkitRequestFullscreen) { // Safari
    v.webkitRequestFullscreen();
  }
}
</script>

</body>
</html>
