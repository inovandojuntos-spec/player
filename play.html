<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Inovando Juntos — V4</title>
<style>
  :root{
    --bg:#000; --surface:#0b0b0d; --surface2:#141417;
    --line:rgba(255,255,255,0.10); --line2:rgba(255,255,255,0.16);
    --text:#fff; --muted:rgba(255,255,255,0.62); --muted2:rgba(255,255,255,0.42);
    --silver:#c8cdd3; --silver-dim:#8b9097; --silver-bright:#eef1f5;
    --metal:linear-gradient(135deg,#f1f3f6 0%,#aeb4bc 38%,#d7dbe1 60%,#8d9298 100%);
    --glow:rgba(220,226,233,.55);
    --nav-h:64px; --rail-gap:24px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#050506;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  button{font-family:inherit}
  .app{position:relative;width:min(460px,100vw);height:100dvh;max-height:980px;background:var(--bg);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  @media(min-width:480px){.app{border-radius:26px;height:min(900px,96dvh);border:1px solid var(--line)}}

  .topbar{position:absolute;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:center;
    padding:calc(12px + env(safe-area-inset-top,0px)) 14px 12px;background:linear-gradient(180deg,rgba(0,0,0,.8),rgba(0,0,0,0))}
  .logo{height:38px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 10px rgba(0,0,0,.6)) drop-shadow(0 0 14px rgba(220,226,233,.12))}
  .logoFallback{font-weight:800;letter-spacing:.4px;font-size:18px;background:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent}
  .shopBtn{position:absolute;right:12px;top:calc(10px + env(safe-area-inset-top,0px));width:42px;height:42px;border-radius:50%;
    border:1px solid var(--line2);background:rgba(0,0,0,.3);color:var(--silver);display:grid;place-items:center;cursor:pointer}
  .shopBtn:active{transform:scale(.94)}
  .shopBtn .tag{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--metal);color:#0a0a0a;font-size:9px;font-weight:800;display:grid;place-items:center;border:1.5px solid #000}

  .feed{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
  .feed::-webkit-scrollbar{display:none}
  .slide{position:relative;height:100%;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden;background:#000}
  .slide .grad{position:absolute;inset:0;background:radial-gradient(70% 55% at 32% 26%,rgba(150,160,172,.28),transparent 60%),radial-gradient(60% 60% at 78% 82%,rgba(60,64,72,.55),transparent),linear-gradient(160deg,#16171b,#070708)}
  .slide video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:transparent;opacity:0;transition:opacity .5s}
  .slide video.ready{opacity:1}
  .scrim{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 24%,rgba(0,0,0,0) 52%,rgba(0,0,0,.88) 100%)}
  .lockOverlay{position:absolute;inset:0;z-index:36;display:none;align-items:center;justify-content:center;padding:28px;background:radial-gradient(80% 60% at 50% 40%,rgba(10,10,12,.55),rgba(0,0,0,.82));backdrop-filter:blur(3px)}
  .slide.locked .lockOverlay{display:flex}
  .slide.locked .rail,.slide.locked .caption,.slide.locked .playPing{opacity:0;pointer-events:none}
  .lockCard{display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;max-width:300px}
  .lockCard .lkIc{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(120% 120% at 30% 20%,rgba(220,226,233,.20),rgba(20,20,23,.92));border:1px solid var(--line2);color:var(--silver-bright);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 10px 26px rgba(0,0,0,.5);margin-bottom:4px}
  .lockCard .lkTitle{font-size:18px;font-weight:850;letter-spacing:.01em}
  .lockCard .lkSub{font-size:12.5px;color:var(--muted);line-height:1.5}
  .lockCard .lkBtn{margin-top:8px;border:none;background:var(--metal);color:#0a0a0b;border-radius:999px;padding:11px 22px;font-size:13px;font-weight:850;cursor:pointer;box-shadow:0 10px 26px rgba(0,0,0,.45)}
  .lockCard .lkBtn:active{transform:scale(.97)}
  .mutechip{position:absolute;left:14px;top:calc(64px + env(safe-area-inset-top,0px));z-index:6;display:flex;gap:7px;align-items:center;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:11px;color:var(--silver)}
  .mutechip i{width:6px;height:6px;border-radius:50%;background:var(--silver);box-shadow:0 0 8px var(--glow)}
  .playPing{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.6);width:84px;height:84px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid var(--line2);display:grid;place-items:center;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;color:var(--silver-bright)}
  .playPing.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

  .rail{position:absolute;right:10px;bottom:120px;z-index:30;display:flex;flex-direction:column;gap:var(--rail-gap);align-items:center}
  .act{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;border:none;background:none;color:#fff}
  .act svg{filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));transition:transform .15s}
  .act:active svg{transform:scale(.82)}
  .act .cnt{font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.7);font-variant-numeric:tabular-nums}
  .act.liked svg{color:var(--silver-bright);fill:var(--silver-bright);filter:drop-shadow(0 0 10px var(--glow));animation:pop .35s}
  .act.lived.on svg{color:var(--silver-bright);fill:var(--silver-bright);filter:drop-shadow(0 0 12px var(--glow))}
  .act.lived.on .cnt{color:var(--silver-bright)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
  .avatarRail{width:48px;height:48px;border-radius:50%;padding:2px;background:var(--metal);margin-bottom:4px}
  .avatarRail span{display:grid;place-items:center;width:100%;height:100%;border-radius:50%;background:#15161a;font-weight:800;font-size:14px;color:var(--silver-bright)}

  .caption{position:absolute;left:16px;right:84px;bottom:98px;z-index:25}
  .capUser{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
  .capUser .badge{font-size:9.5px;font-weight:800;letter-spacing:.08em;padding:3px 9px;border-radius:999px;background:var(--metal);color:#0b0b0c;text-transform:uppercase}
  .capCat{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--silver-dim);margin:8px 0 4px}
  .capText{font-size:13.5px;line-height:1.45;color:rgba(255,255,255,.9);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .capText.expanded{-webkit-line-clamp:unset}
  .soldline{display:inline-flex;align-items:center;gap:7px;margin-top:10px;font-size:12px;color:var(--silver);font-weight:600;font-variant-numeric:tabular-nums}

  .pbar{position:absolute;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));z-index:35;height:2.5px;background:rgba(255,255,255,.16)}
  .pbar>i{display:block;height:100%;width:0;background:var(--metal);border-radius:2px}

  .nav{position:relative;z-index:40;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);display:flex;align-items:stretch;justify-content:space-around;background:rgba(7,7,9,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line)}
  .tab{flex:1;border:none;background:none;color:var(--muted2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:600;letter-spacing:.2px;position:relative;transition:color .15s}
  .tab .ic{position:relative;display:grid;place-items:center}
  .tab.active{color:var(--silver-bright)} .tab.active .ic svg{stroke:var(--silver-bright)}
  .tab.active::before{content:"";position:absolute;top:0;width:26px;height:2.5px;border-radius:0 0 3px 3px;background:var(--metal)}
  .tab.center .ic{width:46px;height:46px;border-radius:16px;margin-top:-14px;background:var(--metal);box-shadow:0 8px 22px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.5)}
  .tab.center .ic svg{stroke:#0a0a0b} .tab.center{color:var(--silver-bright)} .tab.center.active::before{display:none}
  .tab .badge{position:absolute;top:-5px;right:50%;transform:translateX(20px);min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--metal);color:#0a0a0a;font-size:9px;font-weight:800;display:grid;place-items:center;border:1.5px solid #07070a}
  .ring{--p:0;width:27px;height:27px;border-radius:50%;background:conic-gradient(#dfe3e8 calc(var(--p)*1%),rgba(255,255,255,.16) 0);display:grid;place-items:center}
  .ring i{width:20px;height:20px;border-radius:50%;background:#07070a;display:grid;place-items:center;font-size:8.5px;font-weight:800;color:var(--silver-bright);font-variant-numeric:tabular-nums}

  /* ===== Bottom sheet (comments + generic panel) ===== */
  .sheet{position:absolute;inset:0;z-index:60;display:none} .sheet.open{display:block}
  .sheet .bd{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;transition:opacity .25s} .sheet.open .bd{opacity:1}
  .sheet .panel{position:absolute;left:0;right:0;bottom:0;height:74%;background:var(--surface);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;border-top:1px solid var(--line2)}
  .sheet.tall .panel{height:86%}
  .sheet.open .panel{transform:translateY(0)}
  .grab{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);margin:10px auto}
  .sheetHd{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 12px;border-bottom:1px solid var(--line);font-weight:700}
  .sheetHd .x{font-size:20px;color:var(--muted);cursor:pointer;background:none;border:none}
  .cList{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:16px}
  .cItem{display:flex;gap:10px}
  .cAv{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:700;background:#15161a;color:var(--silver);font-size:13px;border:1px solid var(--line2)}
  .cBody .u{font-size:12.5px;font-weight:700}.cBody .t{font-size:13.5px;line-height:1.35;margin-top:2px}.cBody .m{font-size:11px;color:var(--muted2);margin-top:4px}
  .cForm{display:flex;gap:8px;padding:10px 14px calc(12px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--line);background:var(--surface)}
  .cForm input{flex:1;background:var(--surface2);border:1px solid var(--line2);color:#fff;border-radius:999px;padding:11px 16px;font-size:14px;outline:none}
  .cForm input:focus{border-color:var(--silver-dim)}
  .cForm button{border:none;background:var(--metal);color:#0a0a0b;border-radius:999px;padding:0 18px;font-weight:800;cursor:pointer}

  /* ===== Generic panel body ===== */
  .pBody{flex:1;overflow-y:auto;padding:16px 16px calc(20px + env(safe-area-inset-bottom,0px));scrollbar-width:none}
  .pBody::-webkit-scrollbar{display:none}
  .pSub{font-size:12px;color:var(--muted);line-height:1.5;margin:0 0 14px}
  .grpTitle{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--silver-dim);margin:18px 0 8px;display:flex;align-items:center;gap:8px}
  .grpTitle::after{content:"";flex:1;height:1px;background:var(--line)}
  .grpTitle:first-child{margin-top:2px}

  /* product card */
  .itemCard{display:flex;gap:12px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0));margin-bottom:10px;cursor:pointer;transition:border-color .15s,transform .1s}
  .itemCard:active{transform:scale(.985);border-color:var(--line2)}
  .itemMedia{width:64px;height:64px;border-radius:13px;flex:none;overflow:hidden;background:#15161a;display:grid;place-items:center;border:1px solid var(--line)}
  .itemMedia img,.itemMedia video{width:100%;height:100%;object-fit:cover}
  .itemBody{min-width:0;flex:1}
  .itemName{font-size:14px;font-weight:700;margin:0;line-height:1.25;color:#fff}
  .itemDesc{font-size:11.5px;color:var(--muted);margin:3px 0 0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .itemMetaRow{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
  .itemPrice{font-size:13px;font-weight:800;color:var(--silver-bright);font-variant-numeric:tabular-nums}
  .itemPill{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--silver)}
  .itemPill.solid{background:var(--metal);color:#0a0a0b;border-color:transparent}
  .itemPill.ghost{color:var(--muted)}
  .itemMedia{position:relative}
  .itemPlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.32);color:#fff}
  .itemBar{position:absolute;left:12px;right:12px;top:calc(58px + env(safe-area-inset-top,0px));z-index:45;display:none;align-items:center;gap:10px;background:rgba(10,10,12,.92);backdrop-filter:blur(10px);border:1px solid var(--line2);border-radius:14px;padding:9px 10px 9px 12px;box-shadow:0 10px 28px rgba(0,0,0,.5)}
  .itemBar.show{display:flex}
  .itemBar .nm{flex:1;min-width:0;font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--silver-bright)}
  .itemBar .nm small{display:block;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
  .itemBar .bk{flex:none;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--silver);border-radius:10px;padding:7px 11px;font-size:11.5px;font-weight:700;cursor:pointer}
  .chev{color:var(--muted2);flex:none}

  /* extras card (improved icons) */
  .exCard{display:flex;gap:13px;align-items:center;padding:13px 12px;border:1px solid var(--line);border-radius:16px;margin-bottom:11px;cursor:pointer;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0));transition:border-color .15s,transform .1s}
  .exCard:active{transform:scale(.985)}
  .exIcon{width:54px;height:54px;border-radius:15px;flex:none;display:grid;place-items:center;position:relative;background:radial-gradient(120% 120% at 30% 20%,rgba(220,226,233,.22),rgba(20,20,23,.9));border:1px solid var(--line2);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 6px 16px rgba(0,0,0,.4)}
  .exIcon img{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5))}
  .exIcon svg{width:28px;height:28px;color:var(--silver-bright)}
  .exCard.spotify .exIcon{background:radial-gradient(120% 120% at 30% 20%,rgba(30,215,96,.30),rgba(8,20,12,.92));border-color:rgba(30,215,96,.4)}
  .exBody{min-width:0;flex:1}
  .exName{font-size:14.5px;font-weight:750;margin:0;color:#fff}
  .exDesc{font-size:11.5px;color:var(--muted);margin:3px 0 0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .exTag{display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--silver-dim)}

  /* progress scratch grid */
.pgIntro{display:flex;align-items:center;gap:12px;width:100%;padding:13px 14px;border:1px solid var(--line2);border-radius:16px;background:linear-gradient(135deg,rgba(220,226,233,.12),rgba(255,255,255,.02));margin:2px 0 14px;cursor:pointer;text-align:left;transition:transform .1s}
  .pgIntro:active{transform:scale(.99)}
  .pgIntro .ic{width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;background:var(--metal);color:#0a0a0b;box-shadow:0 6px 16px rgba(0,0,0,.4)}
  .pgIntro .tx{min-width:0}
  .pgIntro .tt{font-size:13.5px;font-weight:850;margin:0;letter-spacing:.04em}
  .pgIntro .ds{font-size:11px;color:var(--muted);margin:2px 0 0}
  .pgGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:6px}
  .pgCard{position:relative;border:1px solid var(--line);border-radius:16px;padding:14px 12px;background:var(--surface2);text-align:left;cursor:default;min-height:92px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .pgCard .num{font-size:12px;font-weight:800;color:var(--muted2);font-variant-numeric:tabular-nums}
  .pgCard .ttl{font-size:13px;font-weight:700;line-height:1.25;color:rgba(255,255,255,.55)}
  .pgCard .st{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2)}
  .pgCard.is-open{cursor:pointer;border-color:var(--line2);background:linear-gradient(180deg,rgba(220,226,233,.10),rgba(255,255,255,.02))}
  .pgCard.is-open .ttl{color:#fff}
  .pgCard.is-open .st{color:var(--silver-bright)}
  .pgCard.is-open::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--metal)}
  .pgCard.is-open:active{transform:scale(.98)}
  .pgHero{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px;border:1px solid var(--line2);border-radius:18px;background:linear-gradient(135deg,rgba(220,226,233,.10),rgba(255,255,255,.02));margin-bottom:8px}
  .pgHeroN{font-size:26px;font-weight:850;font-variant-numeric:tabular-nums;background:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent}
  .pgHeroL{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:700;margin-top:2px}
  .pgRing{--p:0;width:58px;height:58px;border-radius:50%;background:conic-gradient(#dfe3e8 calc(var(--p)*1%),rgba(255,255,255,.14) 0);display:grid;place-items:center;flex:none}
  .pgRing i{width:46px;height:46px;border-radius:50%;background:var(--surface);display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--silver-bright);font-variant-numeric:tabular-nums}

  /* ===== Profile full screen ===== */
  .screen{position:absolute;inset:0;z-index:55;background:#070708;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.22,1,.36,1);visibility:hidden}
  .screen.open{transform:translateY(0);visibility:visible}
  .scHd{display:flex;align-items:center;gap:12px;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;border-bottom:1px solid var(--line)}
  .scHd .back{width:38px;height:38px;border-radius:50%;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--silver);display:grid;place-items:center;cursor:pointer}
  .scHd h2{font-size:17px;font-weight:800;margin:0}
  .scBody{flex:1;overflow-y:auto;padding:22px 18px calc(24px + var(--nav-h) + env(safe-area-inset-bottom,0px));scrollbar-width:none}
  .scBody::-webkit-scrollbar{display:none}
  .prHero{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;margin-bottom:26px}
  .prAv{width:96px;height:96px;border-radius:50%;padding:3px;background:var(--metal);box-shadow:0 12px 34px rgba(0,0,0,.55)}
  .prAv span{display:grid;place-items:center;width:100%;height:100%;border-radius:50%;background:#15161a;font-weight:850;font-size:34px;color:var(--silver-bright);overflow:hidden}
  .prAv img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .prName{font-size:21px;font-weight:800;margin:0}
  .prMail{font-size:12.5px;color:var(--muted);margin:2px 0 0}
  .prCouple{font-size:12.5px;color:var(--silver);margin:5px 0 0;font-weight:650}
  .prCouple b{background:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent}
  .prChip{display:inline-flex;align-items:center;gap:6px;margin-top:4px;font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:999px;background:var(--metal);color:#0b0b0c}
  .prChip.off{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line2)}
  .fGroup{margin-bottom:16px}
  .fLabel{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--silver-dim);margin:0 0 7px;padding-left:2px}

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const SUPABASE_URL="https://rsordtljnvxonaygyuxd.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";
const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const ICON={
  heart:'<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.2C.6 8.9 2 5.5 5.2 5.1 7 4.9 8.6 5.9 12 9c3.4-3.1 5-4.1 6.8-3.9C22 5.5 23.4 8.9 22 11.8 19.5 16.4 12 21 12 21z"/></svg>',

  flame:'<svg width="31" height="31" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1.9 3.2 5.2 4.4 5.2 8.3A5.2 5.2 0 0 1 6.8 11.3c0-1.7.7-3 1.6-4 .6 1 1.6 1.4 2 .2.4-1.2-.2-2.6 1.6-4.5z"/></svg>',
  play:'<svg width="38" height="38" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',

  chev:'<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>',
  link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h13v18H6a2 2 0 0 1-2-2z"/><path d="M19 17H6a2 2 0 0 0-2 2"/></svg>'
};
const $=s=>document.querySelector(s);
const feed=$('#feed'), master=$('#master'), pfill=$('#pfill');
let authUserId=null, authEmail=null, started=false, activeSeq=0, currentSlide=null;
let progressData=null;
const cache={};

function fmt(n){n=+n||0;return n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':n}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
let tt;function toast(m){let e=$('#__t');if(!e){e=document.createElement('div');e.id='__t';e.style.cssText='position:absolute;left:50%;bottom:92px;transform:translateX(-50%);z-index:80;background:rgba(0,0,0,.9);border:1px solid var(--line2);padding:9px 16px;border-radius:999px;font-size:12.5px;transition:opacity .25s';$('#app').appendChild(e)}e.textContent=m;e.style.opacity='1';clearTimeout(tt);tt=setTimeout(()=>e.style.opacity='0',1600)}

async function requireAuth(){
  const {data}=await supabase.auth.getUser();
  if(!data?.user){ location.replace('/login.html?redirect='+encodeURIComponent(location.pathname)); return false; }
  authUserId=data.user.id; authEmail=data.user.email||''; return true;
}

const INTRO_ID='16859d64-1209-4b70-8de4-e8d16f8c8df7';
function getParamSlug(){
  try{ const u=new URL(location.href); return (u.searchParams.get('id')||u.searchParams.get('slug')||'').trim(); }catch(_){ return ''; }
}
async function loadFeed(){
  const {data,error}=await supabase.rpc('get_my_desafios_feed');
  if(error){ $('#loading').innerHTML='Erro ao carregar. Tente novamente.'; return; }
  const res=(data&&data.get_my_desafios_feed)?data.get_my_desafios_feed:data;
  progressData=res||{};
  let list=(res&&res.desafios)||[];
  // INTRODUÇÃO sempre no topo do feed e sempre desbloqueada
  if(!list.some(d=>String(d.slug||'').toLowerCase()==='intro')){
    list=[{slug:'intro',desafio_id:INTRO_ID,title:'INTRODUÇÃO',category:'Introdução',sort_order:0,play_count:1,unlocked:true},...list];
  }
  progressData.desafios=list;
  if(res&&res.summary){ updateRing(res.summary); }
  if(!list.length){ $('#loading').innerHTML='Nenhum desafio disponível.<br><small style="color:var(--muted2)">Ative seu código no perfil.</small>'; return; }
  buildSlides(list, getParamSlug());
}

function updateRing(sm){
  const r=$('#ring'); if(!r)return; r.style.setProperty('--p', sm.percent||0);
  $('#ringTxt').textContent=(sm.done??0)+'/'+(sm.total??0);
}

function buildSlides(list, startSlug){
  const ld=$('#loading'); if(ld) ld.remove();
  list.forEach(it=>{
    const s=document.createElement('div'); s.className='slide';
    const unlocked = (it.unlocked===undefined) ? true : !!it.unlocked;
    if(!unlocked) s.classList.add('locked');
    s.dataset.slug=it.slug; s.dataset.id=it.desafio_id; s.dataset.unlocked=unlocked?'1':'0';
    s.innerHTML=`
      <div class="grad"></div>
      <video muted loop playsinline webkit-playsinline preload="none"></video>
      <div class="scrim"></div>
      <div class="playPing">${ICON.play}</div>
      <div class="rail">
        <div class="avatarRail"><span>IJ</span></div>
        <button class="act likeBtn" aria-label="Curtir">${ICON.heart}<span class="cnt likeCnt">·</span></button>
        <button class="act cmtBtn" aria-label="Comentar">${ICON.comment}<span class="cnt cmtCnt">·</span></button>
        <button class="act livedBtn lived" aria-label="Já vivemos">${ICON.flame}<span class="cnt livedCnt">·</span></button>
      </div>
      <div class="caption">
        <div class="capUser">@inovandojuntos <span class="badge">Premium</span></div>
        <div class="capCat">${esc(it.category||'Desafio')}</div>
        <div class="capText">${esc(it.title||'')}</div>
        <div class="soldline">✦ <span class="soldN">—</span> casais já viveram</div>
      </div>
      <div class="lockOverlay">
        <div class="lockCard">
          <div class="lkIc">${ICON.lock}</div>
          <div class="lkTitle">Desafio bloqueado</div>
          <div class="lkSub">Escaneie a raspadinha para desbloquear esta experiência.</div>
          <button class="lkBtn" type="button">Ver progresso</button>
        </div>
      </div>`;
    feed.appendChild(s);
  });
  const io=new IntersectionObserver((ents)=>{ents.forEach(en=>{if(en.isIntersecting)activate(en.target)})},{root:feed,threshold:.6});
  document.querySelectorAll('.slide').forEach(s=>io.observe(s));
  // Slide inicial: respeita ?id=<slug> (ex: intro); senão o primeiro
  let start=null;
  if(startSlug){ try{ start=document.querySelector(`.slide[data-slug="${CSS.escape(startSlug)}"]`); }catch(_){ } }
  const first=document.querySelector('.slide');
  start=start||first;
  if(start){ if(start!==first){ start.scrollIntoView(); } activate(start); }
}

function stopOthers(except){
  master.pause();
  document.querySelectorAll('.slide video').forEach(v=>{ if(v.closest('.slide')!==except){ try{v.pause()}catch(_){}; if(v._hls){try{v._hls.destroy()}catch(_){}; v._hls=null;} v.classList.remove('ready'); }});
}

function attachHls(v,url){
  if(window.Hls&&window.Hls.isSupported()){ if(v._hls){try{v._hls.destroy()}catch(_){}} const h=new window.Hls({maxBufferLength:30}); h.loadSource(url); h.attachMedia(v); v._hls=h; }
  else { v.src=url; }
  v.addEventListener('loadeddata',()=>v.classList.add('ready'),{once:true});
}

let distributorId=null, distributorLoaded=false;
async function getDistributorId(){
  if(distributorLoaded) return distributorId;
  try{ const {data}=await supabase.from('profiles').select('distributor_id').eq('id',authUserId).maybeSingle(); distributorId=data?.distributor_id||null; }
  catch(e){ console.error('[distributor]',e); }
  distributorLoaded=true; return distributorId;
}
async function getChallenge(slug){
  if(cache[slug]) return cache[slug];
  try{
    const dist=await getDistributorId();
    const args=dist?{p_slug:slug,p_distributor_id:dist}:{p_slug:slug};
    const {data}=await supabase.rpc('get_challenge_full',args);
    cache[slug]=data; return data;
  } catch(e){ console.error('[challenge]',e); return null; }
}

async function activate(slide){
  if(slide===currentSlide) { return; }
  if(itemPlaying){ itemPlaying=false; hideItemBar(); }
  currentSlide=slide;
  const seq=++activeSeq;
  const slug=slide.dataset.slug, id=slide.dataset.id;
  stopOthers(slide);
  bindProgress(slide);

  // Desafio bloqueado: não reproduz, mostra mensagem da raspadinha
  if(slide.dataset.unlocked==='0'){
    master.removeAttribute('src');
    const vv=slide.querySelector('video'); try{ vv.pause(); }catch(_){}
    return;
  }

  const ch=await getChallenge(slug);
  if(seq!==activeSeq) return;
  updateTabBadges(ch);

  const v=slide.querySelector('video');
  if(ch&&ch.media&&String(ch.media).startsWith('bunny:')){
    try{
      const {data:vd}=await supabase.functions.invoke('get-video-url',{body:{guid:String(ch.media).slice(6)}});
      if(seq!==activeSeq||!slide.isConnected) return;
      if(vd&&vd.url){ attachHls(v,vd.url); v.muted=true; v.play().catch(()=>{}); }
    }catch(e){ console.error('[video]',e); }
  }

  if(ch&&ch.audio&&String(ch.audio).startsWith('sbaudio:')){
    try{
      const path=String(ch.audio).slice(8);
      const {data:sd}=await supabase.storage.from('audios').createSignedUrl(path,3600);
      if(seq!==activeSeq) return;
      if(sd&&sd.signedUrl){ master.src=sd.signedUrl; master.load(); if(started){ master.play().catch(()=>{}); } }
    }catch(e){ console.error('[audio]',e); }
  } else { master.removeAttribute('src'); }

  loadBundle(slide,id);
}

function bindProgress(slide){
  pfill.style.width='0%';
  master.ontimeupdate=()=>{ if(master.duration){ pfill.style.width=(master.currentTime/master.duration*100)+'%'; } };
}

async function loadBundle(slide,id){
  try{
    const {data}=await supabase.rpc('get_target_interaction_bundle',{p_target_type:'desafio',p_target_id:id,p_user_id:authUserId});
    applyBundle(slide,data);
  }catch(e){ console.error('[bundle]',e); }
}
function applyBundle(slide,b){
  if(!b)return;
  slide.querySelector('.likeCnt').textContent=fmt(b.like_count);
  slide.querySelector('.cmtCnt').textContent=fmt(b.comment_count);
  slide.querySelector('.livedCnt').textContent=fmt(b.favorite_count);
  slide.querySelector('.soldN').textContent=fmt(b.favorite_count);
  slide.querySelector('.likeBtn').classList.toggle('liked',!!b.liked);
  slide.querySelector('.livedBtn').classList.toggle('on',!!b.favorited);
}

/* ===== Items helpers ===== */
function challengeItems(){
  const ch = currentSlide ? cache[currentSlide.dataset.slug] : null;
  return Array.isArray(ch?.items) ? ch.items : [];
}
function isInstruction(it){
  if(it?.item_type) return it.item_type==='instruction';
  return String(it?.slug||'').startsWith('adicionales_') && !String(it?.slug||'').startsWith('adicionales_link_');
}
function isExternal(it){
  if(it?.item_type) return it.item_type==='external_link';
  return String(it?.slug||'').startsWith('adicionales_link_');
}
function isProduct(it){
  if(it?.item_type) return it.item_type==='product';
  return !isInstruction(it) && !isExternal(it);
}
function getProducts(){ return challengeItems().filter(isProduct); }
function getExtras(){ return challengeItems().filter(it=>isInstruction(it)||isExternal(it)); }

function updateTabBadges(ch){
  const items = Array.isArray(ch?.items) ? ch.items : [];
  const prod = items.filter(isProduct).length;
  const extra = items.filter(it=>isInstruction(it)||isExternal(it)).length;
  const bi=$('#badgeItens'), be=$('#badgeExtras');
  if(bi){ bi.textContent=prod; bi.style.display=prod?'grid':'none'; }
  if(be){ be.textContent=extra; be.style.display=extra?'grid':'none'; }
}

function fmtPrice(it){
  const p=Number(it?.price||0); if(!p) return '';
  const cur=(it?.currency||'').toUpperCase();
  const sym=cur==='BRL'?'R$':cur==='USD'?'$':cur==='EUR'?'€':(cur?cur+' ':'');
  return sym+p.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function openLink(url){
  const u=(url||'').trim(); if(!u) return false;
  if(/^(https?:|mailto:|tel:)/i.test(u)) window.open(u,'_blank','noopener,noreferrer');
  else window.location.href=u;
  return true;
}

/* ===== Generic panel ===== */
const panel=$('#panel'), panelBody=$('#panelBody'), panelTitle=$('#panelTitle');
function openPanel(){ panel.classList.add('open'); document.body.classList.add('modal-open'); }
function closePanel(){ panel.classList.remove('open'); resetTabsToFeed(); }
$('#panelBd').onclick=closePanel; $('#panelX').onclick=closePanel;

function renderItens(){
  panelTitle.textContent='Itens recomendados';
  const products=getProducts();
  if(!products.length){ panelBody.innerHTML='<div class="empty">Nenhum item recomendado para este desafio.</div>'; return; }
  const groups={};
  products.forEach(it=>{ const c=it.category||'Outros'; (groups[c]=groups[c]||[]).push(it); });
  const flat=[];
  let html='<p class="pSub">Toque para reproduzir o vídeo e o áudio de cada item.</p>';
  Object.keys(groups).forEach(cat=>{
    html+=`<div class="grpTitle">${esc(cat)}</div>`;
    groups[cat].forEach(it=>{
      const idx=flat.push(it)-1;
      const img=it.image||'';
      const media= img ? (/\.(mp4|webm|m3u8)$/i.test(img)
          ? `<video src="${esc(img)}" muted loop autoplay playsinline></video>`
          : `<img src="${esc(img)}" alt="" onerror="this.style.display='none'">`) : '';
      const link=(it.external_url||'').trim();
      const playable=!!(it.video||it.audio);
      html+=`<div class="itemCard" data-idx="${idx}">
        <div class="itemMedia">${media}${playable?'<span class="itemPlay">'+ICON.playMini+'</span>':''}</div>
        <div class="itemBody">
          <p class="itemName">${esc(it.name||'Item')}</p>
          ${it.description?`<p class="itemDesc">${esc(it.description)}</p>`:''}
          <div class="itemMetaRow">
            ${playable?'<span class="itemPill solid">▶ Reproduzir</span>':''}
            ${link?`<span class="itemPill ghost" data-link="${esc(link)}">Ver produto</span>`:''}
          </div>
        </div>
        ${ICON.chev}
      </div>`;
    });
  });
  panelBody.innerHTML=html;
  panelBody.querySelectorAll('.itemCard').forEach(c=>{
    c.addEventListener('click',(e)=>{
      const pill=e.target.closest('.itemPill.ghost');
      if(pill){ e.stopPropagation(); openLink(pill.dataset.link); return; }
      const it=flat[Number(c.dataset.idx)];
      if(it&&(it.video||it.audio)) playItem(it);
      else if(it&&(it.external_url||'').trim()) openLink(it.external_url);
      else toast('Sem mídia disponível');
    });
  });
}

/* ===== Reproduzir mídia de um item (vídeo Bunny + áudio sbaudio) ===== */
let itemPlaying=false, itemBarEl=null;
function ensureItemBar(){
  if(itemBarEl) return itemBarEl;
  itemBarEl=document.createElement('div'); itemBarEl.className='itemBar';
  itemBarEl.innerHTML='<div class="nm"><small>Item</small><span id="itemBarNm"></span></div><button class="bk" id="itemBarBk">Voltar</button>';
  $('#app').appendChild(itemBarEl);
  itemBarEl.querySelector('#itemBarBk').addEventListener('click',restoreChallenge);
  return itemBarEl;
}
function showItemBar(item){ const b=ensureItemBar(); b.querySelector('#itemBarNm').textContent=item.name||'Item'; b.querySelector('.nm small').textContent=item.category||'Item'; b.classList.add('show'); }
function hideItemBar(){ if(itemBarEl) itemBarEl.classList.remove('show'); }

async function playItem(item){
  closePanel();
  const slide=currentSlide; if(!slide) return;
  const seq=++activeSeq;
  itemPlaying=true;
  const v=slide.querySelector('video');
  master.pause();
  const vid=String(item.video||'');
  try{
    if(vid.startsWith('bunny:')){
      const {data:vd}=await supabase.functions.invoke('get-video-url',{body:{guid:vid.slice(6)}});
      if(seq!==activeSeq) return;
      if(vd&&vd.url){ attachHls(v,vd.url); v.muted=true; v.play().catch(()=>{}); }
    } else if(/\.(mp4|webm|m3u8)$/i.test(vid)){
      if(v._hls){try{v._hls.destroy()}catch(_){}; v._hls=null;}
      v.src=vid; v.muted=true; v.classList.add('ready'); v.play().catch(()=>{});
    }
  }catch(e){ console.error('[item video]',e); }
  const aud=String(item.audio||'');
  try{
    if(aud.startsWith('sbaudio:')){
      const {data:sd}=await supabase.storage.from('audios').createSignedUrl(aud.slice(8),3600);
      if(seq!==activeSeq) return;
      if(sd&&sd.signedUrl){ master.src=sd.signedUrl; master.load(); master.play().catch(()=>{}); }
    } else if(aud){ master.src=aud; master.load(); master.play().catch(()=>{}); }
    else { master.removeAttribute('src'); }
  }catch(e){ console.error('[item audio]',e); }
  showItemBar(item);
  toast('▶ '+(item.name||'Item'));
}
function restoreChallenge(){
  itemPlaying=false; hideItemBar();
  const slide=currentSlide; if(!slide) return;
  currentSlide=null; activate(slide);
}

function renderExtras(){
  panelTitle.textContent='Extras & material';
  const extras=getExtras();
  if(!extras.length){ panelBody.innerHTML='<div class="empty">Nenhum material extra para este desafio.</div>'; return; }
  let html='<p class="pSub">Guias, posições e playlists para enriquecer a experiência.</p>';
  extras.forEach(it=>{
    const ext=isExternal(it);
    const isSpoty=/spotify/i.test(it.image||'')||/spotify/i.test(it.external_url||'');
    const img=it.image||'';
    let iconHtml;
    if(img && /\.(svg|png|jpe?g|webp)$/i.test(img)){
      iconHtml=`<img src="${esc(img)}" alt="" onerror="this.replaceWith(document.createRange().createContextualFragment('${ext?ICON.link.replace(/'/g,"\\'"):ICON.book.replace(/'/g,"\\'")}'))">`;
    } else {
      iconHtml = ext?ICON.link:ICON.book;
    }
    const link=(it.external_url||'').trim();
    const tag = ext ? (isSpoty?'Ouvir no Spotify':'Abrir link') : 'Ver guia';
    html+=`<div class="exCard ${isSpoty?'spotify':''}" data-link="${esc(link)}" data-ext="${ext?1:0}">
      <div class="exIcon">${iconHtml}</div>
      <div class="exBody">
        <p class="exName">${esc(it.name||'Material')}</p>
        ${it.description?`<p class="exDesc">${esc(it.description)}</p>`:''}
        <span class="exTag">${esc(tag)} ›</span>
      </div>
    </div>`;
  });
  panelBody.innerHTML=html;
  panelBody.querySelectorAll('.exCard').forEach(c=>{
    c.addEventListener('click',()=>{
      const link=c.dataset.link;
      if(link){ openLink(link); }
      else { toast('Conteúdo disponível no player'); }
    });
  });
}

function progressItems(res){
  const cand=[res?.desafios,res?.details,res?.items,res?.data,res?.progress].find(Array.isArray)||[];
  return cand.map((row,i)=>{
    const title=row?.title||row?.titulo||row?.name||`Desafio ${i+1}`;
    const slug=row?.slug||row?.desafio_slug||'';
    const playedAt=row?.last_played||row?.played_at||row?.last_played_at||null;
    const isIntro=String(slug).toLowerCase()==='intro';
    const unlocked = (row?.unlocked!==undefined) ? !!row.unlocked : (Number(row?.play_count||0)>0||!!playedAt||!!row?.is_done);
    const done=isIntro||unlocked;
    const sort=isIntro?-1:Number(row?.sort_order??i+1);
    return {title:String(title).trim(),slug,done,sort,playedAt,isIntro};
  }).filter(x=>x.title && !x.isIntro)
    .sort((a,b)=>a.sort-b.sort);
}

function renderProgresso(){
  panelTitle.textContent='Progresso';
  const res=progressData||{};
  const sm=res.summary||{};
  const TOTAL=20; // sempre 20 desafios (1 a 20)
  const items=progressItems(res).slice(0,TOTAL);
  const unlockedN=items.filter(x=>x.done).length; // liberados (escaneados)
  const done=Number(sm.done||0); // "já vivemos" (favoritados)
  const pct=Math.round(unlockedN/TOTAL*100);
  let html=`<div class="pgHero">
      <div><div class="pgHeroN">${unlockedN}/${TOTAL}</div><div class="pgHeroL">Desbloqueados</div></div>
      <div class="pgRing" style="--p:${pct}"><i>${pct}%</i></div>
    </div>
    <button type="button" class="pgIntro" id="pgIntroBtn">
      <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
      <span class="tx"><p class="tt">INTRODUÇÃO</p><p class="ds">Comece por aqui · conheçam a experiência</p></span>
    </button>
    <p class="pSub">Raspe o QR de cada carta para liberar a próxima experiência. Os desafios já ativados ficam abertos.</p>
    <div class="pgGrid">`;
  for(let i=0;i<TOTAL;i++){
    const it=items[i]||null;
    const open=!!(it&&it.done&&it.slug);
    html+=`<button type="button" class="pgCard${open?' is-open':''}" data-slug="${esc(it?.slug||'')}" ${open?'':'disabled'}>
      <div class="num">${String(i+1).padStart(2,'0')}</div>
      <div class="ttl">${esc(open?it.title:'Bloqueado')}</div>
      <div class="st">${open?'Abrir ›':'Raspe o QR'}</div>
    </button>`;
  }
  html+='</div>';
  panelBody.innerHTML=html;
  const goSlide=(slug)=>{
    const target=document.querySelector(`.slide[data-slug="${slug}"]`);
    closePanel();
    if(target){ target.scrollIntoView({behavior:'smooth'}); }
    else { window.location.href='/play/'+encodeURIComponent(slug); }
  };
  panelBody.querySelector('#pgIntroBtn')?.addEventListener('click',()=>goSlide('intro'));
  panelBody.querySelectorAll('.pgCard.is-open').forEach(b=>{
    b.addEventListener('click',()=>goSlide(b.dataset.slug));
  });
}

/* ===== Profile ===== */
const perfilScreen=$('#perfilScreen'), perfilBody=$('#perfilBody');
function openPerfil(){ perfilScreen.classList.add('open'); perfilScreen.setAttribute('aria-hidden','false'); loadPerfil(); }
function closePerfil(){ perfilScreen.classList.remove('open'); perfilScreen.setAttribute('aria-hidden','true'); resetTabsToFeed(); }
$('#perfilBack').onclick=closePerfil;

async function loadPerfil(){
  perfilBody.innerHTML='<div class="center-msg" style="position:static"><div class="spin"></div></div>';
  let pr={};
  try{
    const {data}=await supabase.from('profiles').select('display_name,avatar_url,country,language,is_activated,activated_at,created_at').eq('id',authUserId).maybeSingle();
    pr=data||{};
  }catch(e){ console.error('[profile]',e); }
  let partner=null;
  try{ const {data:pt}=await supabase.rpc('get_my_partner'); partner=(pt&&pt.display_name)?pt.display_name:null; }catch(e){ console.error('[partner]',e); }
  const name=pr.display_name||'';
  const initial=(name||authEmail||'?').trim()[0]?.toUpperCase()||'?';
  const avatar=pr.avatar_url?`<img src="${esc(pr.avatar_url)}" alt="" onerror="this.replaceWith(document.createTextNode('${esc(initial)}'))">`:esc(initial);
  const active=!!pr.is_activated;
  const countries=['','Brasil','Portugal','España','México','Argentina','Chile','Colombia','United States'];
  const langs=[['pt-BR','Português'],['es','Español'],['en','English']];
  perfilBody.innerHTML=`
    <div class="prHero">
      <div class="prAv"><span>${avatar}</span></div>
      <div>
        <p class="prName">${esc(name||'Sem nome')}</p>
        <p class="prMail">${esc(authEmail||'')}</p>
        ${partner?`<p class="prCouple">♥ Casal com <b>${esc(partner)}</b></p>`:''}
      </div>
      <span class="prChip ${active?'':'off'}">${active?'✓ Conta ativada':'Não ativada'}</span>
    </div>
    <div class="fGroup">
      <p class="fLabel">Nome de exibição</p>
      <input class="fInput" id="pfName" maxlength="60" placeholder="Como querem ser chamados?" value="${esc(name)}">
    </div>
    <div class="fGroup">
      <p class="fLabel">País</p>
      <select class="fSelect" id="pfCountry">
        ${countries.map(c=>`<option value="${esc(c)}" ${(pr.country||'')===c?'selected':''}>${c||'— Selecionar —'}</option>`).join('')}
      </select>
    </div>
    <div class="fGroup">
      <p class="fLabel">Idioma</p>
      <select class="fSelect" id="pfLang">
        ${langs.map(([v,l])=>`<option value="${v}" ${(pr.language||'pt-BR')===v?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    <div class="fGroup">
      <p class="fLabel">Sua parceir@</p>
      <input class="fInput" value="${esc(partner||'—')}" disabled style="opacity:.65">
    </div>
    <button class="prSave" id="pfSave">Salvar alterações</button>
    <button class="prOut" id="pfOut">Sair da conta</button>
    <p class="prMeta">Membro desde ${pr.created_at?new Date(pr.created_at).toLocaleDateString('pt-BR'):'—'}<br>Inovando Juntos · Premium</p>
  `;
  $('#pfSave').addEventListener('click',savePerfil);
  $('#pfOut').addEventListener('click',async()=>{ try{ await supabase.auth.signOut(); }catch(_){} location.replace('/login.html'); });
}
async function savePerfil(){
  const btn=$('#pfSave'); btn.disabled=true; const old=btn.textContent; btn.textContent='Salvando…';
  const payload={ display_name:$('#pfName').value.trim()||null, country:$('#pfCountry').value||null, language:$('#pfLang').value||null, updated_at:new Date().toISOString() };
  try{
    const {error}=await supabase.from('profiles').update(payload).eq('id',authUserId);
    if(error) throw error;
    toast('Perfil atualizado ✓');
    $('.prName').textContent=payload.display_name||'Sem nome';
  }catch(e){ console.error('[save profile]',e); toast('Não foi possível salvar'); }
  btn.disabled=false; btn.textContent=old;
}

/* ===== Play/pause + actions ===== */
feed.addEventListener('click',(e)=>{
  if(e.target.closest('.act')||e.target.closest('.caption')) return;
  const slide=e.target.closest('.slide'); if(!slide)return;
  if(slide.dataset.unlocked==='0'){ if(e.target.closest('.lkBtn')){ setActiveTab('progresso'); renderProgresso(); openPanel(); } else { toast('Desafio bloqueado · escaneie a raspadinha'); } return; }
  const ping=slide.querySelector('.playPing');
  if(master.paused){ master.play().catch(()=>{}); ping.classList.remove('show'); slide.querySelector('video')?.play().catch(()=>{}); }
  else { master.pause(); ping.classList.add('show'); slide.querySelector('video')?.pause(); }
});

feed.addEventListener('click',async(e)=>{
  const slide=e.target.closest('.slide'); if(!slide)return; const id=slide.dataset.id;
  if(e.target.closest('.likeBtn')){
    try{ const {data}=await supabase.rpc('toggle_target_like',{p_user_id:authUserId,p_target_type:'desafio',p_target_id:id}); applyBundle(slide,data); }catch(err){console.error(err)}
  }
  if(e.target.closest('.livedBtn')){
    try{ const {data}=await supabase.rpc('toggle_target_favorite',{p_user_id:authUserId,p_target_type:'desafio',p_target_id:id}); applyBundle(slide,data);
      toast(slide.querySelector('.livedBtn').classList.contains('on')?'Já vivemos ✓':'Removido');
      refreshProgress();
    }catch(err){console.error(err)}
  }
  if(e.target.closest('.cmtBtn')){ openSheet(id); }
  const cap=e.target.closest('.capText'); if(cap) cap.classList.toggle('expanded');
});

async function refreshProgress(){ try{ const {data}=await supabase.rpc('get_my_desafios_feed'); const res=(data&&data.get_my_desafios_feed)?data.get_my_desafios_feed:data; if(res){ if(res.desafios)res.desafios=res.desafios; progressData=res; if(res.summary)updateRing(res.summary);} }catch(_){} }

/* ===== Comments ===== */
const sheet=$('#sheet'); let sheetTargetId=null;
async function openSheet(id){
  sheetTargetId=id; sheet.classList.add('open');
  const list=$('#cList'); list.innerHTML='<div style="color:var(--muted2);font-size:13px">Carregando…</div>';
  try{
    const {data}=await supabase.rpc('get_target_comments',{p_target_type:'desafio',p_target_id:id,p_limit:50,p_offset:0});
    const arr=(data&&data.comments)||[];
    list.innerHTML=arr.length?arr.map(c=>`<div class="cItem"><div class="cAv">${esc((c.display_name||'U')[0])}</div><div class="cBody"><div class="u">${esc(c.display_name||'Usuário')}</div><div class="t">${esc(c.body||'')}</div><div class="m">${esc(new Date(c.created_at).toLocaleDateString())}</div></div></div>`).join(''):'<div style="color:var(--muted2);font-size:13px">Seja o primeiro a comentar.</div>';
  }catch(e){ list.innerHTML='<div style="color:var(--muted2)">Erro ao carregar.</div>'; }
}
$('#sheetBd').onclick=()=>sheet.classList.remove('open');
$('#sheetX').onclick=()=>sheet.classList.remove('open');
$('#cForm').addEventListener('submit',async(e)=>{
  e.preventDefault(); const inp=$('#cInput'); const val=inp.value.trim(); if(!val||!sheetTargetId)return; inp.value='';
  try{ await supabase.rpc('add_target_comment',{p_user_id:authUserId,p_target_type:'desafio',p_target_id:sheetTargetId,p_body:val}); openSheet(sheetTargetId);
    if(currentSlide&&currentSlide.dataset.id===sheetTargetId) loadBundle(currentSlide,sheetTargetId);
  }catch(err){ toast('Não foi possível comentar'); }
});

/* ===== Nav / tabs ===== */
function setActiveTab(name){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x.dataset.tab===name));
}
function resetTabsToFeed(){ setActiveTab('home'); }

$('#shopBtn').addEventListener('click',()=>toast('Loja online — em breve'));
$('#nav').addEventListener('click',(e)=>{
  const t=e.target.closest('.tab'); if(!t)return;
  const tab=t.dataset.tab;
  // close any open surfaces first
  panel.classList.remove('open'); closePerfilSilent();
  if(tab==='home'){ setActiveTab('home'); document.body.classList.remove('modal-open'); return; }
  setActiveTab(tab);
  if(tab==='itens'){ renderItens(); openPanel(); }
  else if(tab==='extras'){ renderExtras(); openPanel(); }
  else if(tab==='progresso'){ renderProgresso(); openPanel(); }
  else if(tab==='perfil'){ document.body.classList.remove('modal-open'); openPerfil(); }
});
function closePerfilSilent(){ perfilScreen.classList.remove('open'); perfilScreen.setAttribute('aria-hidden','true'); }

/* ===== Start gesture ===== */
const startOv=$('#startOverlay');
function beginPlayback(){ started=true; startOv.style.display='none'; master.play().catch(()=>{}); currentSlide?.querySelector('video')?.play().catch(()=>{}); }
startOv.addEventListener('click',beginPlayback);
$('#app').addEventListener('click',function once(){ if(!started){ startOv.style.display='none'; started=true; master.play().catch(()=>{}); } },{once:true});

/* ===== Init ===== */
(async()=>{ if(await requireAuth()){ await loadFeed(); startOv.style.display='flex'; } })();
</script>
