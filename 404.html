<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <script>
    const parts = window.location.pathname
      .split("/")
      .map(p => p.trim())
      .filter(Boolean);

    const slug = parts[parts.length - 1];

    if (parts[0] === "play" && slug) {
      window.location.replace(`/play.html?id=${encodeURIComponent(slug)}`);
    } else {
      document.body.innerHTML = "Página no encontrada";
    }
  </script>
</head>
<body></body>
</html>
