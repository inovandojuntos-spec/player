<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Inovando Juntos — V3</title>
<style>
  :root{
    --bg:#000; --surface:#0b0b0d; --surface2:#141417;
    --line:rgba(255,255,255,0.10); --line2:rgba(255,255,255,0.16);
    --text:#fff; --muted:rgba(255,255,255,0.62); --muted2:rgba(255,255,255,0.42);
    --silver:#c8cdd3; --silver-dim:#8b9097; --silver-bright:#eef1f5;
    --metal:linear-gradient(135deg,#f1f3f6 0%,#aeb4bc 38%,#d7dbe1 60%,#8d9298 100%);
    --glow:rgba(220,226,233,.55);
    --nav-h:64px; --rail-gap:24px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#050506;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  button{font-family:inherit}
  .app{position:relative;width:min(460px,100vw);height:100dvh;max-height:980px;background:var(--bg);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  @media(min-width:480px){.app{border-radius:26px;height:min(900px,96dvh);border:1px solid var(--line)}}

  .topbar{position:absolute;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:center;
    padding:calc(12px + env(safe-area-inset-top,0px)) 14px 12px;background:linear-gradient(180deg,rgba(0,0,0,.8),rgba(0,0,0,0))}
  .logo{height:38px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 10px rgba(0,0,0,.6)) drop-shadow(0 0 14px rgba(220,226,233,.12))}
  .logoFallback{font-weight:800;letter-spacing:.4px;font-size:18px;background:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent}
  .shopBtn{position:absolute;right:12px;top:calc(10px + env(safe-area-inset-top,0px));width:42px;height:42px;border-radius:50%;
    border:1px solid var(--line2);background:rgba(0,0,0,.3);color:var(--silver);display:grid;place-items:center;cursor:pointer}
  .shopBtn:active{transform:scale(.94)}
  .shopBtn .tag{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--metal);color:#0a0a0a;font-size:9px;font-weight:800;display:grid;place-items:center;border:1.5px solid #000}

  .feed{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
  .feed::-webkit-scrollbar{display:none}
  .slide{position:relative;height:100%;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden;background:#000}
  .slide .grad{position:absolute;inset:0;background:radial-gradient(70% 55% at 32% 26%,rgba(150,160,172,.28),transparent 60%),radial-gradient(60% 60% at 78% 82%,rgba(60,64,72,.55),transparent),linear-gradient(160deg,#16171b,#070708)}
  .slide video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:transparent;opacity:0;transition:opacity .5s}
  .slide video.ready{opacity:1}
  .scrim{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 24%,rgba(0,0,0,0) 52%,rgba(0,0,0,.88) 100%)}
  .mutechip{position:absolute;left:14px;top:calc(64px + env(safe-area-inset-top,0px));z-index:6;display:flex;gap:7px;align-items:center;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:11px;color:var(--silver)}
  .mutechip i{width:6px;height:6px;border-radius:50%;background:var(--silver);box-shadow:0 0 8px var(--glow)}
  .playPing{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.6);width:84px;height:84px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid var(--line2);display:grid;place-items:center;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;color:var(--silver-bright)}
  .playPing.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

  .rail{position:absolute;right:10px;bottom:120px;z-index:30;display:flex;flex-direction:column;gap:var(--rail-gap);align-items:center}
  .act{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;border:none;background:none;color:#fff}
  .act svg{filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));transition:transform .15s}
  .act:active svg{transform:scale(.82)}
  .act .cnt{font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.7);font-variant-numeric:tabular-nums}
  .act.liked svg{color:var(--silver-bright);fill:var(--silver-bright);filter:drop-shadow(0 0 10px var(--glow));animation:pop .35s}
  .act.lived.on svg{color:var(--silver-bright);fill:var(--silver-bright);filter:drop-shadow(0 0 12px var(--glow))}
  .act.lived.on .cnt{color:var(--silver-bright)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
  .avatarRail{width:48px;height:48px;border-radius:50%;padding:2px;background:var(--metal);margin-bottom:4px}
  .avatarRail span{display:grid;place-items:center;width:100%;height:100%;border-radius:50%;background:#15161a;font-weight:800;font-size:14px;color:var(--silver-bright)}

  .caption{position:absolute;left:16px;right:84px;bottom:98px;z-index:25}
  .capUser{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
  .capUser .badge{font-size:9.5px;font-weight:800;letter-spacing:.08em;padding:3px 9px;border-radius:999px;background:var(--metal);color:#0b0b0c;text-transform:uppercase}
  .capCat{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--silver-dim);margin:8px 0 4px}
  .capText{font-size:13.5px;line-height:1.45;color:rgba(255,255,255,.9);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .capText.expanded{-webkit-line-clamp:unset}
  .soldline{display:inline-flex;align-items:center;gap:7px;margin-top:10px;font-size:12px;color:var(--silver);font-weight:600;font-variant-numeric:tabular-nums}

  .pbar{position:absolute;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));z-index:35;height:2.5px;background:rgba(255,255,255,.16)}
  .pbar>i{display:block;height:100%;width:0;background:var(--metal);border-radius:2px}

  .nav{position:relative;z-index:40;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);display:flex;align-items:stretch;justify-content:space-around;background:rgba(7,7,9,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line)}
  .tab{flex:1;border:none;background:none;color:var(--muted2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:600;letter-spacing:.2px;position:relative;transition:color .15s}
  .tab .ic{position:relative;display:grid;place-items:center}
  .tab.active{color:var(--silver-bright)} .tab.active .ic svg{stroke:var(--silver-bright)}
  .tab.active::before{content:"";position:absolute;top:0;width:26px;height:2.5px;border-radius:0 0 3px 3px;background:var(--metal)}
  .tab.center .ic{width:46px;height:46px;border-radius:16px;margin-top:-14px;background:var(--metal);box-shadow:0 8px 22px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.5)}
  .tab.center .ic svg{stroke:#0a0a0b} .tab.center{color:var(--silver-bright)} .tab.center.active::before{display:none}
  .tab .badge{position:absolute;top:-5px;right:50%;transform:translateX(20px);min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--metal);color:#0a0a0a;font-size:9px;font-weight:800;display:grid;place-items:center;border:1.5px solid #07070a}
  .ring{--p:0;width:27px;height:27px;border-radius:50%;background:conic-gradient(#dfe3e8 calc(var(--p)*1%),rgba(255,255,255,.16) 0);display:grid;place-items:center}
  .ring i{width:20px;height:20px;border-radius:50%;background:#07070a;display:grid;place-items:center;font-size:8.5px;font-weight:800;color:var(--silver-bright);font-variant-numeric:tabular-nums}

  .sheet{position:absolute;inset:0;z-index:60;display:none} .sheet.open{display:block}
  .sheet .bd{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;transition:opacity .25s} .sheet.open .bd{opacity:1}
  .sheet .panel{position:absolute;left:0;right:0;bottom:0;height:74%;background:var(--surface);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;border-top:1px solid var(--line2)}
  .sheet.open .panel{transform:translateY(0)}
  .grab{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);margin:10px auto}
  .sheetHd{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 12px;border-bottom:1px solid var(--line);font-weight:700}
  .sheetHd .x{font-size:20px;color:var(--muted);cursor:pointer;background:none;border:none}
  .cList{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:16px}
  .cItem{display:flex;gap:10px}
  .cAv{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:700;background:#15161a;color:var(--silver);font-size:13px;border:1px solid var(--line2)}
  .cBody .u{font-size:12.5px;font-weight:700}.cBody .t{font-size:13.5px;line-height:1.35;margin-top:2px}.cBody .m{font-size:11px;color:var(--muted2);margin-top:4px}
  .cForm{display:flex;gap:8px;padding:10px 14px calc(12px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--line);background:var(--surface)}
  .cForm input{flex:1;background:var(--surface2);border:1px solid var(--line2);color:#fff;border-radius:999px;padding:11px 16px;font-size:14px;outline:none}
  .cForm input:focus{border-color:var(--silver-dim)}
  .cForm button{border:none;background:var(--metal);color:#0a0a0b;border-radius:999px;padding:0 18px;font-weight:800;cursor:pointer}

  /* overlays */
  .center-msg{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:30px;color:var(--muted)}
  .start{position:absolute;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);cursor:pointer}
  .start .b{display:flex;flex-direction:column;align-items:center;gap:12px}
  .start .ring2{width:78px;height:78px;border-radius:50%;background:var(--metal);display:grid;place-items:center;box-shadow:0 14px 40px rgba(0,0,0,.6)}
  .start small{color:var(--silver);font-size:13px;letter-spacing:.04em}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.18);border-top-color:var(--silver-bright);animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <img class="logo" src="images/logo.png" alt="Inovando Juntos"
      onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\'logoFallback\'>Inovando Juntos</span>')">
    <button class="shopBtn" id="shopBtn" aria-label="Loja">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="tag" id="cartTag" style="display:none">0</span>
    </button>
  </div>

  <div class="feed" id="feed">
    <div class="center-msg" id="loading"><div class="spin"></div><div>Carregando…</div></div>
  </div>

  <div class="pbar"><i id="pfill"></i></div>

  <div class="start" id="startOverlay" style="display:none">
    <div class="b">
      <div class="ring2"><svg width="34" height="34" viewBox="0 0 24 24" fill="#0a0a0b"><path d="M8 5v14l11-7z"/></svg></div>
      <small>Toque para começar</small>
    </div>
  </div>

  <nav class="nav" id="nav">
    <button class="tab" data-tab="itens"><span class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span>Itens</button>
    <button class="tab" data-tab="extras"><span class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><path d="M17.5 14v7M14 17.5h7"/></svg></span>Extras</button>
    <button class="tab center active" data-tab="home"><span class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.6V21h5v-6h4v6h5V9.6"/></svg></span>Início</button>
    <button class="tab" data-tab="progresso"><span class="ic"><span class="ring" id="ring" style="--p:0"><i id="ringTxt">0/0</i></span></span>Progresso</button>
    <button class="tab" data-tab="perfil"><span class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>Perfil</button>
  </nav>

  <div class="sheet" id="sheet">
    <div class="bd" id="sheetBd"></div>
    <div class="panel">
      <div class="grab"></div>
      <div class="sheetHd"><span>Comentários</span><button class="x" id="sheetX">✕</button></div>
      <div class="cList" id="cList"></div>
      <form class="cForm" id="cForm"><input id="cInput" maxlength="300" placeholder="Adicionar comentário..." /><button type="submit">Enviar</button></form>
    </div>
  </div>

  <audio id="master" preload="auto" playsinline></audio>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const SUPABASE_URL="https://rsordtljnvxonaygyuxd.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_iA35OOvF4WVTKJ4d7G0W7A_TR4FLwf9";
const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const ICON={
  heart:'<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.2C.6 8.9 2 5.5 5.2 5.1 7 4.9 8.6 5.9 12 9c3.4-3.1 5-4.1 6.8-3.9C22 5.5 23.4 8.9 22 11.8 19.5 16.4 12 21 12 21z"/></svg>',
  comment:'<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8 8 0 0 1-11.5 7.2L3 20l1.3-4A8 8 0 1 1 21 11.5z"/></svg>',
  flame:'<svg width="31" height="31" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1.9 3.2 5.2 4.4 5.2 8.3A5.2 5.2 0 0 1 6.8 11.3c0-1.7.7-3 1.6-4 .6 1 1.6 1.4 2 .2.4-1.2-.2-2.6 1.6-4.5z"/></svg>',
  play:'<svg width="38" height="38" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'
};
const $=s=>document.querySelector(s);
const feed=$('#feed'), master=$('#master'), pfill=$('#pfill');
let authUserId=null, started=false, activeSeq=0, currentSlide=null;
const cache={};

function fmt(n){n=+n||0;return n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':n}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
let tt;function toast(m){let e=$('#__t');if(!e){e=document.createElement('div');e.id='__t';e.style.cssText='position:absolute;left:50%;bottom:92px;transform:translateX(-50%);z-index:70;background:rgba(0,0,0,.9);border:1px solid var(--line2);padding:9px 16px;border-radius:999px;font-size:12.5px;transition:opacity .25s';$('#app').appendChild(e)}e.textContent=m;e.style.opacity='1';clearTimeout(tt);tt=setTimeout(()=>e.style.opacity='0',1600)}

async function requireAuth(){
  const {data}=await supabase.auth.getUser();
  if(!data?.user){ location.replace('/login.html?redirect='+encodeURIComponent(location.pathname)); return false; }
  authUserId=data.user.id; return true;
}

async function loadFeed(){
  const {data,error}=await supabase.rpc('get_my_desafios_progress');
  if(error){ $('#loading').innerHTML='Erro ao carregar. Tente novamente.'; return; }
  const res=(data&&data.get_my_desafios_progress)?data.get_my_desafios_progress:data;
  const list=(res&&res.desafios)||[];
  if(res&&res.summary){ updateRing(res.summary); }
  if(!list.length){ $('#loading').innerHTML='Nenhum desafio disponível.<br><small style="color:var(--muted2)">Ative seu código no perfil.</small>'; return; }
  buildSlides(list);
}

function updateRing(sm){
  const r=$('#ring'); if(!r)return; r.style.setProperty('--p', sm.percent||0);
  $('#ringTxt').textContent=(sm.done??0)+'/'+(sm.total??0);
}

function buildSlides(list){
  $('#loading').remove();
  list.forEach(it=>{
    const s=document.createElement('div'); s.className='slide';
    s.dataset.slug=it.slug; s.dataset.id=it.desafio_id;
    s.innerHTML=`
      <div class="grad"></div>
      <video muted loop playsinline webkit-playsinline preload="none"></video>
      <div class="scrim"></div>
      <div class="mutechip"><i></i> vídeo mudo · áudio no comando</div>
      <div class="playPing">${ICON.play}</div>
      <div class="rail">
        <div class="avatarRail"><span>IJ</span></div>
        <button class="act likeBtn" aria-label="Curtir">${ICON.heart}<span class="cnt likeCnt">·</span></button>
        <button class="act cmtBtn" aria-label="Comentar">${ICON.comment}<span class="cnt cmtCnt">·</span></button>
        <button class="act livedBtn lived" aria-label="Já vivemos">${ICON.flame}<span class="cnt livedCnt">·</span></button>
      </div>
      <div class="caption">
        <div class="capUser">@inovandojuntos <span class="badge">Premium</span></div>
        <div class="capCat">${esc(it.category||'Desafio')}</div>
        <div class="capText">${esc(it.title||'')}</div>
        <div class="soldline">✦ <span class="soldN">—</span> casais já viveram</div>
      </div>`;
    feed.appendChild(s);
  });
  // observer
  const io=new IntersectionObserver((ents)=>{ents.forEach(en=>{if(en.isIntersecting)activate(en.target)})},{root:feed,threshold:.6});
  document.querySelectorAll('.slide').forEach(s=>io.observe(s));
  // first slide
  const first=document.querySelector('.slide'); if(first) activate(first);
}

function stopOthers(except){
  master.pause();
  document.querySelectorAll('.slide video').forEach(v=>{ if(v.closest('.slide')!==except){ try{v.pause()}catch(_){}; if(v._hls){try{v._hls.destroy()}catch(_){}; v._hls=null;} v.classList.remove('ready'); }});
}

function attachHls(v,url){
  if(window.Hls&&window.Hls.isSupported()){ if(v._hls){try{v._hls.destroy()}catch(_){}} const h=new window.Hls({maxBufferLength:30}); h.loadSource(url); h.attachMedia(v); v._hls=h; }
  else { v.src=url; }
  v.addEventListener('loadeddata',()=>v.classList.add('ready'),{once:true});
}

async function activate(slide){
  if(slide===currentSlide) { return; }
  currentSlide=slide;
  const seq=++activeSeq;
  const slug=slide.dataset.slug, id=slide.dataset.id;
  stopOthers(slide);
  bindProgress(slide);

  let ch=cache[slug];
  if(!ch){ try{ const {data}=await supabase.rpc('get_challenge_full',{p_slug:slug}); ch=data; cache[slug]=ch; }catch(e){ console.error(e); return; } }
  if(seq!==activeSeq) return;

  // VIDEO (Bunny, mudo)
  const v=slide.querySelector('video');
  if(ch&&ch.media&&String(ch.media).startsWith('bunny:')){
    try{
      const {data:vd}=await supabase.functions.invoke('get-video-url',{body:{guid:String(ch.media).slice(6)}});
      if(seq!==activeSeq||!slide.isConnected) return;
      if(vd&&vd.url){ attachHls(v,vd.url); v.muted=true; v.play().catch(()=>{}); }
    }catch(e){ console.error('[video]',e); }
  }

  // AUDIO mestre (Supabase firmado)
  if(ch&&ch.audio&&String(ch.audio).startsWith('sbaudio:')){
    try{
      const path=String(ch.audio).slice(8);
      const {data:sd}=await supabase.storage.from('audios').createSignedUrl(path,3600);
      if(seq!==activeSeq) return;
      if(sd&&sd.signedUrl){ master.src=sd.signedUrl; master.load(); if(started){ master.play().catch(()=>{}); } }
    }catch(e){ console.error('[audio]',e); }
  } else { master.removeAttribute('src'); }

  // INTERACCIONES
  loadBundle(slide,id);
}

function bindProgress(slide){
  pfill.style.width='0%';
  master.ontimeupdate=()=>{ if(master.duration){ pfill.style.width=(master.currentTime/master.duration*100)+'%'; } };
}

async function loadBundle(slide,id){
  try{
    const {data}=await supabase.rpc('get_target_interaction_bundle',{p_target_type:'desafio',p_target_id:id,p_user_id:authUserId});
    applyBundle(slide,data);
  }catch(e){ console.error('[bundle]',e); }
}
function applyBundle(slide,b){
  if(!b)return;
  slide.querySelector('.likeCnt').textContent=fmt(b.like_count);
  slide.querySelector('.cmtCnt').textContent=fmt(b.comment_count);
  slide.querySelector('.livedCnt').textContent=fmt(b.favorite_count);
  slide.querySelector('.soldN').textContent=fmt(b.favorite_count);
  slide.querySelector('.likeBtn').classList.toggle('liked',!!b.liked);
  slide.querySelector('.livedBtn').classList.toggle('on',!!b.favorited);
}

/* play/pause al tocar */
feed.addEventListener('click',(e)=>{
  if(e.target.closest('.act')||e.target.closest('.caption')) return;
  const slide=e.target.closest('.slide'); if(!slide)return;
  const ping=slide.querySelector('.playPing');
  if(master.paused){ master.play().catch(()=>{}); ping.classList.remove('show'); slide.querySelector('video')?.play().catch(()=>{}); }
  else { master.pause(); ping.classList.add('show'); slide.querySelector('video')?.pause(); }
});

/* acciones */
feed.addEventListener('click',async(e)=>{
  const slide=e.target.closest('.slide'); if(!slide)return; const id=slide.dataset.id;
  if(e.target.closest('.likeBtn')){
    try{ const {data}=await supabase.rpc('toggle_target_like',{p_user_id:authUserId,p_target_type:'desafio',p_target_id:id}); applyBundle(slide,data); }catch(err){console.error(err)}
  }
  if(e.target.closest('.livedBtn')){
    try{ const {data}=await supabase.rpc('toggle_target_favorite',{p_user_id:authUserId,p_target_type:'desafio',p_target_id:id}); applyBundle(slide,data);
      toast(slide.querySelector('.livedBtn').classList.contains('on')?'Já vivemos ✓':'Removido');
      refreshProgress();
    }catch(err){console.error(err)}
  }
  if(e.target.closest('.cmtBtn')){ openSheet(id); }
  const cap=e.target.closest('.capText'); if(cap) cap.classList.toggle('expanded');
});

async function refreshProgress(){ try{ const {data}=await supabase.rpc('get_my_desafios_progress'); const res=(data&&data.get_my_desafios_progress)?data.get_my_desafios_progress:data; if(res&&res.summary)updateRing(res.summary);}catch(_){} }

/* comentarios */
const sheet=$('#sheet'); let sheetTargetId=null;
async function openSheet(id){
  sheetTargetId=id; sheet.classList.add('open');
  const list=$('#cList'); list.innerHTML='<div style="color:var(--muted2);font-size:13px">Carregando…</div>';
  try{
    const {data}=await supabase.rpc('get_target_comments',{p_target_type:'desafio',p_target_id:id,p_limit:50,p_offset:0});
    const arr=(data&&data.comments)||[];
    list.innerHTML=arr.length?arr.map(c=>`<div class="cItem"><div class="cAv">${esc((c.display_name||'U')[0])}</div><div class="cBody"><div class="u">${esc(c.display_name||'Usuário')}</div><div class="t">${esc(c.body||'')}</div><div class="m">${esc(new Date(c.created_at).toLocaleDateString())}</div></div></div>`).join(''):'<div style="color:var(--muted2);font-size:13px">Seja o primeiro a comentar.</div>';
  }catch(e){ list.innerHTML='<div style="color:var(--muted2)">Erro ao carregar.</div>'; }
}
$('#sheetBd').onclick=()=>sheet.classList.remove('open');
$('#sheetX').onclick=()=>sheet.classList.remove('open');
$('#cForm').addEventListener('submit',async(e)=>{
  e.preventDefault(); const inp=$('#cInput'); const val=inp.value.trim(); if(!val||!sheetTargetId)return; inp.value='';
  try{ await supabase.rpc('add_target_comment',{p_user_id:authUserId,p_target_type:'desafio',p_target_id:sheetTargetId,p_body:val}); openSheet(sheetTargetId);
    if(currentSlide&&currentSlide.dataset.id===sheetTargetId) loadBundle(currentSlide,sheetTargetId);
  }catch(err){ toast('Não foi possível comentar'); }
});

/* nav + tienda */
$('#shopBtn').addEventListener('click',()=>toast('Loja online — em breve (passo 2)'));
$('#nav').addEventListener('click',(e)=>{const t=e.target.closest('.tab');if(!t)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');if(t.dataset.tab!=='home')toast('Aba "'+t.textContent.trim()+'" (em construção)')});

/* gesto inicial para habilitar audio */
const startOv=$('#startOverlay');
function beginPlayback(){ started=true; startOv.style.display='none'; master.play().catch(()=>{}); currentSlide?.querySelector('video')?.play().catch(()=>{}); }
startOv.addEventListener('click',beginPlayback);
$('#app').addEventListener('click',function once(){ if(!started){ startOv.style.display='none'; started=true; master.play().catch(()=>{}); } },{once:true});

/* init */
(async()=>{ if(await requireAuth()){ await loadFeed(); startOv.style.display='flex'; } })();
</script>
</body>
</html>
